meta:
  title:
    en: "The LLM Ecosystem Today"
    fr: "L'Écosystème LLM Aujourd'hui"
  description:
    en: "A comprehensive pedagogical map of the LLM and AI ecosystem"
    fr: "Une carte pédagogique complète de l'écosystème LLM et IA"
  version: "2026-Q1"
  date: "2026-04-02"

layers:
  1:
    en: "LAYER 1 · FOUNDATIONS"
    fr: "LAYER 1 · FONDAMENTAUX"
  2:
    en: "LAYER 2 · PROVIDERS & MODELS"
    fr: "LAYER 2 · FOURNISSEURS & MODÈLES"
  3:
    en: "LAYER 3 · INFRASTRUCTURE & ACCESS"
    fr: "LAYER 3 · INFRASTRUCTURE & ACCÈS"
  4:
    en: "LAYER 4 · BUILDING BLOCKS"
    fr: "LAYER 4 · BRIQUES APPLICATIVES"
  5:
    en: "LAYER 5 · DEVELOPER TOOLS"
    fr: "LAYER 5 · OUTILS DÉVELOPPEURS"

# ─────────────────────────────────────────────
# CATEGORIES (visual grouping + color coding)
# ─────────────────────────────────────────────
categories:
  - id: foundations
    label:
      en: "Foundations"
      fr: "Fondamentaux"
    color: "#F4D03F"
    description:
      en: "Core concepts everyone must understand first"
      fr: "Concepts fondamentaux que tout le monde doit comprendre en premier"

  - id: providers
    label:
      en: "Providers"
      fr: "Fournisseurs"
    color: "#F0A500"
    description:
      en: "Companies and organizations that develop AI models"
      fr: "Entreprises et organisations qui développent des modèles IA"

  - id: models
    label:
      en: "Models"
      fr: "Modèles"
    color: "#C39BD3"
    description:
      en: "LLM families — what the providers release"
      fr: "Familles de LLM — ce que les fournisseurs publient"

  - id: infrastructure
    label:
      en: "Infrastructure & Access"
      fr: "Infrastructure & Accès"
    color: "#85929E"
    description:
      en: "How models are hosted and accessed"
      fr: "Comment les modèles sont hébergés et accessibles"

  - id: building_blocks
    label:
      en: "Building Blocks"
      fr: "Briques Applicatives"
    color: "#58D68D"
    description:
      en: "Patterns and techniques to build AI applications"
      fr: "Patterns et techniques pour construire des applications IA"

  - id: dev_tools
    label:
      en: "Developer Tools"
      fr: "Outils Développeurs"
    color: "#5DADE2"
    description:
      en: "Frameworks, libraries and coding tools"
      fr: "Frameworks, bibliothèques et outils de code"

# ─────────────────────────────────────────────
# NODES
# status: stable | evolving | emerging | deprecated
# layer: 1=Foundations, 2=Models, 3=Infrastructure,
#        4=Building Blocks, 5=Dev Tools
# ─────────────────────────────────────────────
nodes:

  # ── LAYER 1 · FOUNDATIONS ───────────────────

  - id: transformer
    label: "Transformer"
    layer: 1
    category: foundations
    status: stable
    since: "2017"
    description: >
      Neural network architecture behind all modern LLMs.
      Introduced in "Attention Is All You Need" (Google, 2017).
      Uses self-attention to process sequences in parallel.

  - id: token
    label: "Token"
    layer: 1
    category: foundations
    status: stable
    since: "2017"
    description: >
      The basic unit of text processed by an LLM.
      1 token ≈ 0.75 words in English.
      Models are billed and limited by token count.

  - id: context_window
    label: "Context Window"
    layer: 1
    category: foundations
    status: evolving
    since: "2017"
    description: >
      Maximum number of tokens a model can process at once (input + output).
      GPT-4: 128K. Claude 3.7: 200K. Gemini 2.0: 1M.
      Larger = more expensive but can handle bigger documents.

  - id: embedding
    label: "Embedding"
    layer: 1
    category: foundations
    status: stable
    since: "2013"
    description: >
      Numerical vector (list of floats) representing text in semantic space.
      Similar meaning → similar vectors. Used for search, RAG, clustering.

  - id: prompt
    label: "Prompt"
    layer: 1
    category: foundations
    status: stable
    since: "2020"
    description: >
      The input text sent to a model to elicit a response.
      Quality of the prompt directly determines quality of the output.

  - id: inference
    label: "Inference"
    layer: 1
    category: foundations
    status: stable
    since: "2017"
    description: >
      The process of running a trained model to generate output from an input.
      Opposite of training. Happens every time you query a model.

  - id: kv_cache
    label: "KV Cache"
    layer: 1
    category: foundations
    status: stable
    since: "2017"
    description: >
      Key-Value Cache: optimization that stores intermediate attention computations
      (Key and Value matrices) during token generation so they don't need to be
      recomputed for every new token.
      Without it: cost grows quadratically with sequence length.
      With it: each new token only requires computing attention for itself.
      Critical for inference latency and throughput — but consumes significant VRAM.
      Managed by serving engines like vLLM (paged attention) and llama.cpp.

  - id: quantization
    label: "Quantization"
    layer: 1
    category: foundations
    status: stable
    since: "2022"
    description: >
      Compression technique that reduces the numerical precision of model weights
      from FP32/BF16 to lower formats (INT8, FP8, INT4).
      Cuts memory footprint 2–8×, speeds up inference, minimal quality loss.
      Enables large models to run on consumer hardware.
      Common formats: INT8 (good balance), INT4 (used by llama.cpp/GGUF),
      FP8 (newer, H100 GPUs, used by vLLM). Can also be applied to the KV cache.

  - id: temperature
    label: "Temperature"
    layer: 1
    category: foundations
    status: stable
    since: "2017"
    description: >
      Parameter controlling output randomness.
      0 = deterministic (same input → same output).
      1+ = creative and varied. Tune based on use case.

  - id: training
    label: "Pre-training"
    layer: 1
    category: foundations
    status: stable
    since: "2018"
    description: >
      Initial phase where a model learns from massive text datasets (terabytes).
      Builds general language understanding. Very expensive (millions of $).

  - id: fine_tuning
    label: "Fine-tuning"
    layer: 1
    category: foundations
    status: stable
    since: "2018"
    description: >
      Additional training on a specific dataset to specialize model behavior.
      Cheaper than pre-training. Used to adapt a base model to a domain or task.

  - id: rlhf
    label: "RLHF"
    layer: 1
    category: foundations
    status: stable
    since: "2022"
    description: >
      Reinforcement Learning from Human Feedback.
      Technique to align LLM outputs with human preferences.
      Used in ChatGPT, Claude, Gemini to make models helpful and safe.

  # ── LAYER 2 · PROVIDERS ─────────────────────
  # node_type: provider → rendered in the right column of layer 2

  - id: p_openai
    label: "OpenAI"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2015"
    description: >
      American AI company, founded 2015. Originally non-profit, now capped-profit.
      Creator of GPT and o-series models. Behind ChatGPT. Backed by Microsoft.

  - id: p_anthropic
    label: "Anthropic"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2021"
    description: >
      AI safety company founded by ex-OpenAI researchers (Dario & Daniela Amodei).
      Creator of Claude. Focus on safe and interpretable AI. Backed by Google & Amazon.

  - id: p_google
    label: "Google DeepMind"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2023"
    description: >
      Merger of Google Brain and DeepMind (2023). Creator of Gemini (proprietary)
      and Gemma (open weights). Integrated into Google Cloud via Vertex AI.

  - id: p_xai
    label: "xAI"
    layer: 2
    node_type: provider
    category: providers
    status: evolving
    since: "2023"
    description: >
      AI company founded by Elon Musk in 2023. Creator of the Grok model family.
      Integrated with the X (Twitter) platform.

  - id: p_meta
    label: "Meta"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2023"
    description: >
      Meta AI (Facebook parent). Creator of the Llama open-weights model family.
      Strong open-source commitment: models freely downloadable and fine-tunable.

  - id: p_mistral_ai
    label: "Mistral AI"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2023"
    description: >
      French AI startup founded in 2023 by ex-Google and ex-Meta researchers.
      Known for efficient open-weights models and a European alternative to US labs.

  - id: p_deepseek
    label: "DeepSeek AI"
    layer: 2
    node_type: provider
    category: providers
    status: evolving
    since: "2023"
    description: >
      Chinese AI research lab. Released powerful open-weights models at very low cost.
      DeepSeek-R1 disrupted the market in Jan 2025 by matching GPT-o1 performance.

  - id: p_alibaba
    label: "Alibaba"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2023"
    description: >
      Chinese tech giant. Creator of the Qwen open-weights model family via DAMO Academy.
      Models available on HuggingFace and integrated in Alibaba Cloud.

  - id: p_microsoft
    label: "Microsoft"
    layer: 2
    node_type: provider
    category: providers
    status: stable
    since: "2023"
    description: >
      Creator of the Phi small model family. Major OpenAI investor and partner.
      Deploys OpenAI models via Azure OpenAI Service.

  # ── LAYER 2 · MODELS ────────────────────────
  # node_type: model → rendered in the left column of layer 2

  # Proprietary
  - id: gpt4o
    label: "GPT-4o"
    layer: 2
    node_type: model
    category: models
    subcategory: proprietary
    status: stable
    since: "2024-05"
    description: >
      OpenAI's flagship multimodal model. Processes text, images and audio natively.
      "o" = omni. Powers ChatGPT. Available via API.

  - id: o3
    label: "o3 / o4-mini"
    layer: 2
    node_type: model
    category: models
    subcategory: proprietary
    status: evolving
    since: "2025-04"
    description: >
      OpenAI's reasoning-focused model family.
      Thinks step-by-step internally before answering (chain-of-thought).
      Best for complex math, coding, logic tasks.

  - id: claude
    label: "Claude 3.5 / 3.7"
    layer: 2
    node_type: model
    category: models
    subcategory: proprietary
    status: evolving
    since: "2024-06"
    description: >
      Anthropic's model family. Known for instruction-following and safety.
      Claude 3.7 Sonnet introduces extended thinking (visible reasoning).
      Sonnet = balanced. Haiku = fast/cheap. Opus = most powerful.

  - id: gemini
    label: "Gemini 2.0"
    layer: 2
    node_type: model
    category: models
    subcategory: proprietary
    status: evolving
    since: "2024-12"
    description: >
      Google's multimodal model family. Native tool use, code execution.
      Gemini 2.0 Flash: 1M token context window. Strong at long documents.

  - id: grok
    label: "Grok 3"
    layer: 2
    node_type: model
    category: models
    subcategory: proprietary
    status: evolving
    since: "2025-02"
    description: >
      xAI's flagship model. Trained on X (Twitter) data.
      Grok 3 features a "Think" reasoning mode similar to o3 and DeepSeek-R1.

  # Open Weights
  - id: llama
    label: "Llama 3.x"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: evolving
    since: "2024-04"
    description: >
      Meta's open-weights model family. Free to download, run and fine-tune.
      Available in multiple sizes (8B, 70B, 405B parameters).
      Foundation of many community fine-tunes and products.

  - id: mistral
    label: "Mistral / Mixtral"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: stable
    since: "2023-09"
    description: >
      Efficient open-weights models from Mistral AI.
      Mixtral uses MoE (Mixture of Experts) architecture for better performance/cost.

  - id: deepseek
    label: "DeepSeek V3 / R1"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: evolving
    since: "2024-12"
    description: >
      Chinese open-weights models rivaling proprietary models at low cost.
      DeepSeek-R1 is a reasoning model (like o3) but fully open weights.
      Caused significant market disruption in early 2025.

  - id: qwen
    label: "Qwen 2.5"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: evolving
    since: "2024-09"
    description: >
      Alibaba's open-weights model family. Strong multilingual and coding performance.
      Qwen2.5-Coder is specialized for code generation.

  - id: gemma
    label: "Gemma 2"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: stable
    since: "2024-06"
    description: >
      Google's open-weights model family. Lightweight (2B, 9B, 27B parameters).
      Optimized to run locally on laptops and phones. Strong instruction-following.

  - id: phi
    label: "Phi-4"
    layer: 2
    node_type: model
    category: models
    subcategory: open_weights
    status: evolving
    since: "2024-12"
    description: >
      Microsoft's small but powerful open-weights model (14B parameters).
      Outperforms much larger models on reasoning tasks. Great for local use.

  # Embedding models
  - id: embed_oai
    label: "text-embedding-3"
    layer: 2
    node_type: model
    category: models
    subcategory: embedding
    status: stable
    since: "2024-01"
    description: >
      OpenAI's embedding model family. Converts text to dense vectors.
      text-embedding-3-small (fast/cheap) and text-embedding-3-large (high quality).
      Used in RAG pipelines to index and search documents.

  - id: embed_voyage
    label: "Voyage-3"
    layer: 2
    node_type: model
    category: models
    subcategory: embedding
    status: stable
    since: "2024-10"
    description: >
      Voyage AI's embedding model. Best-in-class retrieval performance.
      Specialized versions: voyage-code-3 (code), voyage-finance-2 (finance).

  - id: embed_nomic
    label: "nomic-embed"
    layer: 2
    node_type: model
    category: models
    subcategory: embedding
    status: stable
    since: "2024-02"
    description: >
      Open-source embedding model by Nomic AI. Can run locally via Ollama.
      Good balance of performance and privacy (no data sent to external APIs).

  # ── LAYER 3 · INFRASTRUCTURE & ACCESS ───────

  - id: llm_api
    label: "LLM API"
    layer: 3
    category: infrastructure
    status: stable
    since: "2020"
    description: >
      Standard HTTP/REST interface to interact with a model.
      Send a prompt in the request, get a completion in the response.
      Common pattern across all providers (OpenAI, Anthropic, Google...).

  - id: aws_bedrock
    label: "AWS Bedrock"
    layer: 3
    category: infrastructure
    subcategory: cloud
    status: stable
    since: "2023-04"
    description: >
      AWS managed service to access multiple LLMs (Claude, Llama, Mistral...) via a unified API.
      No GPU management. Pay per token. Enterprise-grade security and compliance.

  - id: vertex_ai
    label: "Google Vertex AI"
    layer: 3
    category: infrastructure
    subcategory: cloud
    status: stable
    since: "2023-03"
    description: >
      Google Cloud managed platform for AI model deployment and serving.
      Hosts Gemini natively. Also supports fine-tuning and MLOps pipelines.

  - id: azure_openai
    label: "Azure OpenAI"
    layer: 3
    category: infrastructure
    subcategory: cloud
    status: stable
    since: "2023-01"
    description: >
      Microsoft Azure's managed deployment of OpenAI models.
      Preferred for enterprise: data privacy, compliance (SOC2, HIPAA), SLAs.

  - id: huggingface
    label: "HuggingFace"
    layer: 3
    category: infrastructure
    subcategory: hub
    status: stable
    since: "2018"
    description: >
      The central hub for open-source models, datasets and ML tooling.
      Hosts 500K+ models. Provides Inference API and Spaces for demos.
      The "GitHub of AI models".

  - id: ollama
    label: "Ollama"
    layer: 3
    category: infrastructure
    subcategory: local
    status: evolving
    since: "2023-07"
    description: >
      Run LLMs locally on your own machine. Simple CLI and REST API.
      Supports Llama, Mistral, DeepSeek, Qwen and many more.
      No internet required. Free. Privacy-preserving.

  # ── LAYER 4 · BUILDING BLOCKS ───────────────

  - id: rag
    label: "RAG"
    layer: 4
    category: building_blocks
    status: stable
    since: "2020-05"
    description: >
      Retrieval-Augmented Generation.
      Augments LLM responses with relevant external documents fetched at runtime.
      Solves the knowledge cutoff problem. Avoids hallucinations on specific data.

  - id: vector_db
    label: "Vector Database"
    layer: 4
    category: building_blocks
    status: stable
    since: "2021"
    description: >
      Database optimized for storing and querying embeddings by semantic similarity.
      Examples: Pinecone, Weaviate, Chroma, pgvector.
      Core component of RAG pipelines.

  - id: agent
    label: "Agent"
    layer: 4
    category: building_blocks
    status: evolving
    since: "2023-03"
    description: >
      An LLM that can take actions autonomously: call tools, browse the web,
      write and run code, make decisions in a loop.
      Key shift: from Q&A to autonomous task completion.

  - id: tool_use
    label: "Tool Use / Function Calling"
    layer: 4
    category: building_blocks
    status: stable
    since: "2023-06"
    description: >
      Allows an LLM to call external functions or APIs during generation.
      Example: search the web, query a DB, send an email.
      The model decides when and how to call the tool.

  - id: structured_output
    label: "Structured Output"
    layer: 4
    category: building_blocks
    status: stable
    since: "2023-11"
    description: >
      Forces the model to respond in a defined format (JSON schema).
      Essential for reliable integration in applications.
      Eliminates parsing errors from free-form text responses.

  - id: system_prompt
    label: "System Prompt"
    layer: 4
    category: building_blocks
    status: stable
    since: "2022"
    description: >
      Instructions given to the model before the conversation starts.
      Defines persona, rules, tone, constraints and context.
      Hidden from end users. Controls model behavior globally.

  - id: memory
    label: "Memory"
    layer: 4
    category: building_blocks
    status: evolving
    since: "2023-06"
    description: >
      Mechanisms to persist information across conversations or steps.
      Short-term: conversation history in context window.
      Long-term: summaries or facts stored in a vector DB or key-value store.

  - id: mcp
    label: "MCP"
    layer: 4
    category: building_blocks
    status: emerging
    since: "2024-11"
    description: >
      Model Context Protocol. Open standard by Anthropic (Nov 2024).
      Standardizes how LLMs connect to external tools and data sources.
      Like USB-C for AI: one protocol, many integrations.

  # ── LAYER 5 · DEVELOPER TOOLS ───────────────

  - id: langchain
    label: "LangChain"
    layer: 5
    category: dev_tools
    subcategory: framework
    status: stable
    since: "2022-10"
    description: >
      Most popular framework for building LLM applications.
      Provides chains, retrievers, memory and agent primitives.
      Large ecosystem but sometimes criticized for over-abstraction.

  - id: langgraph
    label: "LangGraph"
    layer: 5
    category: dev_tools
    subcategory: framework
    status: evolving
    since: "2024-01"
    description: >
      Graph-based orchestration for multi-agent and stateful LLM workflows.
      Built on LangChain. Nodes = steps, Edges = transitions.
      Better control flow than simple chains.

  - id: llamaindex
    label: "LlamaIndex"
    layer: 5
    category: dev_tools
    subcategory: framework
    status: stable
    since: "2022-11"
    description: >
      Framework focused on data ingestion and RAG pipelines.
      Great for document Q&A applications.
      Simpler than LangChain for pure retrieval use cases.

  - id: cursor
    label: "Cursor"
    layer: 5
    category: dev_tools
    subcategory: ide
    status: evolving
    since: "2023-03"
    description: >
      AI-first code editor (fork of VS Code).
      Deep LLM integration: code generation, explanation, refactoring, codebase Q&A.
      Uses GPT-4o and Claude under the hood.

  - id: github_copilot
    label: "GitHub Copilot"
    layer: 5
    category: dev_tools
    subcategory: ide
    status: stable
    since: "2021-06"
    description: >
      AI pair programmer by GitHub/Microsoft.
      Integrates in VS Code, JetBrains, Neovim and more.
      Suggests code completions and has a chat mode.

  - id: claude_code
    label: "Claude Code"
    layer: 5
    category: dev_tools
    subcategory: cli
    status: evolving
    since: "2025-02"
    description: >
      Anthropic's agentic CLI tool. Runs in the terminal.
      Can read, write, and execute code across an entire codebase autonomously.
      Uses MCP for tool integrations.

# ─────────────────────────────────────────────
# EDGES (relationships between nodes)
# type: implements | uses | hosts | enables |
#       powers | part_of | standardizes |
#       accesses | orchestrates
# ─────────────────────────────────────────────
edges:

  # Providers → Models (develops)
  - from: p_openai
    to: gpt4o
    label: "develops"
    type: develops
  - from: p_openai
    to: o3
    label: "develops"
    type: develops
  - from: p_openai
    to: embed_oai
    label: "develops"
    type: develops
  - from: p_anthropic
    to: claude
    label: "develops"
    type: develops
  - from: p_google
    to: gemini
    label: "develops"
    type: develops
  - from: p_google
    to: gemma
    label: "develops"
    type: develops
  - from: p_xai
    to: grok
    label: "develops"
    type: develops
  - from: p_meta
    to: llama
    label: "develops"
    type: develops
  - from: p_mistral_ai
    to: mistral
    label: "develops"
    type: develops
  - from: p_deepseek
    to: deepseek
    label: "develops"
    type: develops
  - from: p_alibaba
    to: qwen
    label: "develops"
    type: develops
  - from: p_microsoft
    to: phi
    label: "develops"
    type: develops

  # Foundations → KV Cache
  - from: transformer
    to: kv_cache
    label: "enables"
    type: enables
  - from: inference
    to: kv_cache
    label: "optimized by"
    type: uses

  # Foundations → Quantization
  - from: inference
    to: quantization
    label: "optimized by"
    type: uses
  - from: training
    to: quantization
    label: "post-training step"
    type: enables

  # Foundations → Models
  - from: transformer
    to: gpt4o
    label: "architecture of"
    type: implements
  - from: transformer
    to: claude
    label: "architecture of"
    type: implements
  - from: transformer
    to: gemini
    label: "architecture of"
    type: implements
  - from: transformer
    to: llama
    label: "architecture of"
    type: implements
  - from: transformer
    to: mistral
    label: "architecture of"
    type: implements
  - from: transformer
    to: deepseek
    label: "architecture of"
    type: implements
  - from: rlhf
    to: gpt4o
    label: "aligns"
    type: uses
  - from: rlhf
    to: claude
    label: "aligns"
    type: uses
  - from: fine_tuning
    to: llama
    label: "enables specialization"
    type: enables
  - from: fine_tuning
    to: mistral
    label: "enables specialization"
    type: enables

  # Models → Infrastructure
  - from: gpt4o
    to: azure_openai
    label: "deployed on"
    type: hosts
  - from: gpt4o
    to: llm_api
    label: "accessed via"
    type: accesses
  - from: claude
    to: aws_bedrock
    label: "available on"
    type: hosts
  - from: claude
    to: llm_api
    label: "accessed via"
    type: accesses
  - from: gemini
    to: vertex_ai
    label: "deployed on"
    type: hosts
  - from: llama
    to: huggingface
    label: "distributed via"
    type: hosts
  - from: llama
    to: ollama
    label: "runs locally via"
