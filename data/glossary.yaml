meta:
  title:
    en: "Glossary"
    fr: "Glossaire"
  description:
    en: "Definitions of key terms used across all maps"
    fr: "Définitions des termes clés utilisés dans toutes les cartes"
  version: "2026-Q1"
  date: "2026-04-02"

terms:
  - id: llm
    label:
      en: "Large Language Model"
      fr: "Grand Modèle de Langage"
    aliases: ["LLM", "LLMs", "Large Language Model", "Large Language Models", "grand modèle de langage", "grands modèles de langage"]
    description:
      en: >
        A language model trained on massive text datasets with billions of parameters.
        The "large" refers to both the size of the training data and the number of parameters.
        LLMs can understand and generate coherent text, answer questions, write code, and more.
        Examples: GPT-4, Claude, Gemini, Llama.
      fr: >
        Un modèle de langage entraîné sur d'immenses corpus textuels avec des milliards de paramètres.
        Le "grand" fait référence à la taille des données d'entraînement et au nombre de paramètres.
        Les LLM peuvent comprendre et générer du texte cohérent, répondre à des questions, écrire du code, etc.
        Exemples : GPT-4, Claude, Gemini, Llama.

  - id: weights
    label:
      en: "Weights"
      fr: "Poids"
    aliases: ["weights", "weight", "model weights", "poids", "poids du modèle", "open weights"]
    description:
      en: >
        The numerical parameters learned by a neural network during training.
        Weights encode everything the model has "learned" — grammar, facts, reasoning patterns.
        When a model is said to have billions of parameters, those parameters are its weights.
        "Open weights" means the trained weight files are publicly released, allowing anyone
        to run or fine-tune the model locally — even if the training data or code are not shared.
      fr: >
        Les paramètres numériques appris par un réseau de neurones pendant l'entraînement.
        Les poids encodent tout ce que le modèle a « appris » — grammaire, faits, raisonnement.
        Quand on dit qu'un modèle a des milliards de paramètres, ce sont ses poids.
        « Open weights » signifie que les fichiers de poids entraînés sont publiés publiquement,
        permettant à n'importe qui d'exécuter ou de fine-tuner le modèle localement —
        même si les données d'entraînement ou le code source ne sont pas partagés.

  - id: dense_model
    label:
      en: "Dense Model"
      fr: "Modèle Dense"
    aliases: ["dense model", "dense models", "modèle dense", "modèles denses"]
    see_also: {url: "dense-vs-moe.html", label: {en: "Dense vs MoE diagram", fr: "Diagramme Dense vs MoE"}}
    description:
      en: >
        A neural network architecture where every parameter is activated for every input.
        All weights participate in every forward pass.
        Dense models are simpler to train and reason about, but become expensive at very large scales
        since doubling the parameters doubles the compute required for each inference.
        Examples: GPT-4 (believed to be dense), Llama 3, Mistral 7B.
      fr: >
        Une architecture de réseau de neurones où chaque paramètre est activé pour chaque entrée.
        Tous les poids participent à chaque passe avant.
        Les modèles denses sont plus simples à entraîner, mais deviennent coûteux à très grande échelle :
        doubler les paramètres double le calcul nécessaire pour chaque inférence.
        Exemples : GPT-4 (supposé dense), Llama 3, Mistral 7B.

  - id: moe_model
    label:
      en: "Mixture of Experts"
      fr: "Mélange d'Experts"
    aliases: ["MoE", "Mixture of Experts", "mixture of experts", "mélange d'experts", "Mélange d'Experts"]
    see_also: {url: "dense-vs-moe.html", label: {en: "Dense vs MoE diagram", fr: "Diagramme Dense vs MoE"}}
    description:
      en: >
        An architecture where the model is divided into many specialized sub-networks ("experts").
        For each token, a routing mechanism activates only a small subset of experts (typically 2–8).
        Result: a model can have hundreds of billions of total parameters but use only a fraction
        per inference — achieving high capacity at lower compute cost.
        Examples: GPT-4 (believed MoE), Mixtral 8x7B, Gemini 1.5, DeepSeek-V3.
      fr: >
        Une architecture où le modèle est divisé en nombreux sous-réseaux spécialisés (« experts »).
        Pour chaque token, un mécanisme de routage n'active qu'un petit sous-ensemble d'experts (typiquement 2 à 8).
        Résultat : un modèle peut avoir des centaines de milliards de paramètres au total mais n'en utiliser
        qu'une fraction par inférence — offrant une grande capacité à moindre coût de calcul.
        Exemples : GPT-4 (supposé MoE), Mixtral 8x7B, Gemini 1.5, DeepSeek-V3.

  - id: token
    label:
      en: "Token"
      fr: "Token"
    aliases: ["token", "tokens", "tokenization", "tokenisation"]
    description:
      en: >
        The smallest unit of text a language model processes.
        A token is roughly 0.75 words in English — "tokenization" is typically split into
        ["token", "ization"]. Models don't see raw text: they convert everything into a sequence
        of token IDs before processing. The number of tokens in a request determines its cost and speed.
      fr: >
        La plus petite unité de texte traitée par un modèle de langage.
        Un token correspond environ à 0,75 mot en anglais — « tokenization » est typiquement
        découpé en [« token », « ization »]. Les modèles ne voient pas le texte brut :
        ils convertissent tout en une séquence d'identifiants de tokens. Le nombre de tokens
        d'une requête détermine son coût et sa vitesse.

  - id: context_window
    label:
      en: "Context Window"
      fr: "Fenêtre de Contexte"
    aliases: ["context window", "context length", "fenêtre de contexte", "longueur de contexte", "context"]
    description:
      en: >
        The maximum number of tokens a model can process in a single interaction —
        both the input (prompt + history) and the output combined.
        It defines the model's "working memory": anything outside the window is invisible to it.
        Modern models range from 8k tokens (Llama 3 8B) to 1M+ tokens (Gemini 1.5 Pro).
        A larger context window means the model can read longer documents, hold longer conversations,
        and maintain more context — but also costs more to run.
      fr: >
        Le nombre maximum de tokens qu'un modèle peut traiter en une seule interaction —
        entrée (prompt + historique) et sortie confondus.
        Il définit la « mémoire de travail » du modèle : tout ce qui dépasse cette limite lui est invisible.
        Les modèles modernes vont de 8k tokens (Llama 3 8B) à plus d'1M de tokens (Gemini 1.5 Pro).
        Une fenêtre plus grande permet de lire des documents plus longs et de maintenir plus de contexte,
        mais coûte aussi plus cher à l'exécution.

  - id: rlhf
    label:
      en: "RLHF"
      fr: "RLHF"
    aliases: ["RLHF", "Reinforcement Learning from Human Feedback", "reinforcement learning from human feedback"]
    description:
      en: >
        Reinforcement Learning from Human Feedback. A training technique used to align LLMs
        with human preferences after the initial pre-training phase.
        Human raters compare model outputs and rank them; these preferences train a reward model
        which then guides the LLM via reinforcement learning to produce more helpful, harmless,
        and honest responses. Used by OpenAI (InstructGPT, ChatGPT) and Anthropic (Claude).
      fr: >
        Apprentissage par renforcement à partir des retours humains.
        Une technique d'entraînement utilisée pour aligner les LLM sur les préférences humaines
        après la phase de pré-entraînement.
        Des évaluateurs humains comparent et classent les sorties du modèle ; ces préférences
        entraînent un modèle de récompense qui guide ensuite le LLM par renforcement
        pour produire des réponses plus utiles, inoffensives et honnêtes.
        Utilisé par OpenAI (InstructGPT, ChatGPT) et Anthropic (Claude).

  - id: hallucination
    label:
      en: "Hallucination"
      fr: "Hallucination"
    aliases: ["hallucination", "hallucinations", "hallucinate", "halluciner"]
    description:
      en: >
        When a model generates text that is factually incorrect, fabricated, or inconsistent
        with reality — stated with apparent confidence.
        Hallucinations arise because LLMs predict plausible continuations of text, not verified facts.
        Common examples: invented citations, wrong dates, non-existent people or products.
        Mitigated (but not eliminated) by RAG, grounding, and better alignment.
      fr: >
        Quand un modèle génère du texte factuellement incorrect, inventé, ou incohérent
        avec la réalité — affirmé avec une apparente confiance.
        Les hallucinations surviennent parce que les LLM prédisent des continuations plausibles,
        pas des faits vérifiés.
        Exemples courants : citations inventées, dates erronées, personnes ou produits inexistants.
        Atténuées (mais non éliminées) par le RAG, le grounding et un meilleur alignement.

  - id: rag
    label:
      en: "RAG"
      fr: "RAG"
    aliases: ["RAG", "Retrieval-Augmented Generation", "retrieval augmented generation", "retrieval-augmented generation"]
    see_also:
      url: "ecosystem.html#rag_pattern"
      label:
        en: "RAG on the ecosystem map"
        fr: "RAG sur la carte écosystème"
    description:
      en: >
        Retrieval-Augmented Generation. A pattern that solves the knowledge cutoff and hallucination
        problems by injecting real-time or domain-specific information into the prompt at query time.
        How it works: (1) the user query is converted to a vector, (2) semantically similar documents
        are retrieved from a knowledge base, (3) those documents are added to the prompt,
        (4) the model answers based on the provided context.
        Widely adopted in production — the most reliable way to give an LLM access to specific data.
      fr: >
        Retrieval-Augmented Generation (génération augmentée par récupération).
        Un pattern qui résout les problèmes de date limite de connaissance et d'hallucination
        en injectant des informations actuelles ou spécifiques dans le prompt au moment de la requête.
        Fonctionnement : (1) la requête est convertie en vecteur, (2) les documents sémantiquement
        proches sont récupérés depuis une base de connaissances, (3) ces documents sont ajoutés
        au prompt, (4) le modèle répond en s'appuyant sur le contexte fourni.
        Très largement adopté en production — la méthode la plus fiable pour donner à un LLM
        accès à des données spécifiques.

  - id: agentic
    label:
      en: "Agentic AI"
      fr: "IA Agentique"
    aliases: ["agentic", "agent IA", "AI agent", "AI agents", "agents IA", "agentic AI", "agentic system", "système agentique"]
    description:
      en: >
        A mode of operation where an AI model acts autonomously over multiple steps to complete a goal,
        rather than simply answering a single prompt.
        An agentic system can use tools (web search, code execution, file access), plan a sequence of actions,
        observe the results of each step, and adjust its behaviour accordingly — often without human
        intervention between steps.
        The key properties are: tool use, multi-step reasoning, and a feedback loop between action and observation.
        Examples: Claude Code, OpenAI Operator, AutoGPT, LangChain agents.
      fr: >
        Un mode de fonctionnement où un modèle d'IA agit de façon autonome sur plusieurs étapes
        pour accomplir un objectif, plutôt que de simplement répondre à un prompt unique.
        Un système agentique peut utiliser des outils (recherche web, exécution de code, accès aux fichiers),
        planifier une séquence d'actions, observer les résultats de chaque étape et adapter son comportement
        en conséquence — souvent sans intervention humaine entre les étapes.
        Les propriétés clés sont : utilisation d'outils, raisonnement multi-étapes,
        et boucle de rétroaction entre action et observation.
        Exemples : Claude Code, OpenAI Operator, AutoGPT, agents LangChain.

  - id: mcp
    label:
      en: "MCP"
      fr: "MCP"
    aliases: ["MCP", "Model Context Protocol", "model context protocol"]
    see_also:
      url: "topics/mcp-explained.html"
      label:
        en: "MCP deep dive"
        fr: "Article complet sur MCP"
    description:
      en: >
        Model Context Protocol. An open standard (governed by the Linux Foundation) that defines
        how AI applications connect to external data sources and tools.
        MCP uses a client-server model: the **MCP Host** (your app) contains an **MCP Client**
        that communicates with one or more **MCP Servers**, each exposing three types of capabilities:
        **Resources** (read-only data), **Tools** (functions with side effects), and **Prompts** (reusable templates).
        Before MCP, every AI application had to build custom integrations for every external resource.
        MCP standardizes this layer so that any compliant client can talk to any compliant server.
        Official SDKs exist for 10 languages. A community registry lists hundreds of production servers
        covering filesystems, databases, GitHub, Slack, browser automation, and more.
      fr: >
        Model Context Protocol. Un standard ouvert (gouverné par la Linux Foundation) qui définit
        comment les applications IA se connectent à des sources de données et outils externes.
        MCP utilise un modèle client-serveur : le **MCP Host** (ton application) contient un **MCP Client**
        qui communique avec un ou plusieurs **MCP Servers**, chacun exposant trois types de capacités :
        **Resources** (données en lecture seule), **Tools** (fonctions avec effets de bord), et **Prompts** (templates réutilisables).
        Avant MCP, chaque application IA devait construire des intégrations sur mesure pour chaque ressource.
        MCP standardise cette couche pour que n'importe quel client compatible puisse parler à n'importe quel serveur compatible.
        Des SDKs officiels existent pour 10 langages. Un registry communautaire liste des centaines de serveurs
        couvrant filesystems, bases de données, GitHub, Slack, automatisation navigateur, et plus.

  - id: hipaa
    label:
      en: "HIPAA"
      fr: "HIPAA"
    aliases: ["HIPAA", "Health Insurance Portability and Accountability Act"]
    description:
      en: >
        Health Insurance Portability and Accountability Act. A US federal law (1996) that sets strict
        rules on how health information (medical records, diagnoses, prescriptions…) can be stored,
        shared and processed.
        In the AI context: any cloud platform or application that handles patient data in the US must
        be "HIPAA-compliant" — meaning the vendor signs a Business Associate Agreement (BAA) and
        implements specific technical safeguards (encryption, access controls, audit logs).
        AWS Bedrock, Azure OpenAI and Google Vertex AI all offer HIPAA-eligible configurations.
        Non-compliance can lead to fines up to $1.9M per violation category per year.
      fr: >
        Health Insurance Portability and Accountability Act. Loi fédérale américaine (1996) qui fixe
        des règles strictes sur la façon dont les informations de santé (dossiers médicaux, diagnostics,
        ordonnances…) peuvent être stockées, partagées et traitées.
        Dans le contexte IA : toute plateforme cloud ou application qui traite des données de patients
        aux États-Unis doit être « HIPAA-compliant » — le fournisseur signe un Business Associate Agreement (BAA)
        et met en place des mesures techniques spécifiques (chiffrement, contrôle d'accès, logs d'audit).
        AWS Bedrock, Azure OpenAI et Google Vertex AI proposent tous des configurations éligibles HIPAA.
        Non-conformité : amendes jusqu'à 1,9 M$ par catégorie de violation par an.

  - id: soc2
    label:
      en: "SOC 2"
      fr: "SOC 2"
    aliases: ["SOC 2", "SOC2", "SOC 2 Type II", "SOC 2 Type I", "System and Organization Controls"]
    description:
      en: >
        Service Organization Control 2. An auditing framework created by the AICPA (American Institute
        of CPAs) that evaluates how a cloud service provider manages data security.
        SOC 2 covers five "Trust Service Criteria": Security, Availability, Processing Integrity,
        Confidentiality, and Privacy.
        Two levels: Type I (snapshot audit — controls exist at a point in time),
        Type II (operational audit — controls worked consistently over 6–12 months).
        Type II is the standard enterprise buyers require.
        In the AI context: SOC 2 Type II is the baseline certification expected from any AI API
        provider (OpenAI, Anthropic, Google, AWS…) before enterprise procurement teams will approve it.
      fr: >
        Service Organization Control 2. Un cadre d'audit créé par l'AICPA (Institut américain des CPA)
        qui évalue comment un fournisseur de services cloud gère la sécurité des données.
        SOC 2 couvre cinq « Trust Service Criteria » : Sécurité, Disponibilité, Intégrité de traitement,
        Confidentialité et Vie privée.
        Deux niveaux : Type I (audit instantané — les contrôles existent à un instant T),
        Type II (audit opérationnel — les contrôles ont fonctionné de façon constante sur 6 à 12 mois).
        Le Type II est le standard exigé par les acheteurs entreprises.
        Dans le contexte IA : SOC 2 Type II est la certification de base attendue de tout fournisseur
        d'API IA (OpenAI, Anthropic, Google, AWS…) avant qu'une équipe achats enterprise l'approuve.

  - id: fedramp
    label:
      en: "FedRAMP"
      fr: "FedRAMP"
    aliases: ["FedRAMP", "Federal Risk and Authorization Management Program"]
    description:
      en: >
        Federal Risk and Authorization Management Program. A US government program that standardizes
        security assessment and authorization for cloud services used by federal agencies.
        Any cloud provider wanting to sell to the US federal government must obtain FedRAMP authorization.
        Three impact levels: Low, Moderate (most civilian agencies), High (sensitive government data).
        The process is lengthy (12–18 months) and expensive — effectively a barrier to entry.
        In the AI context: FedRAMP authorization is required for AI platforms used in government
        (defense, healthcare, intelligence). AWS GovCloud and Azure Government have FedRAMP High;
        Google Vertex AI and some OpenAI/Anthropic offerings have Moderate.
        FedRAMP is the AI compliance requirement you hear about in US public sector deals.
      fr: >
        Federal Risk and Authorization Management Program. Un programme du gouvernement américain
        qui standardise l'évaluation et l'autorisation de sécurité des services cloud utilisés
        par les agences fédérales.
        Tout fournisseur cloud souhaitant vendre au gouvernement américain doit obtenir une autorisation FedRAMP.
        Trois niveaux d'impact : Low, Moderate (la plupart des agences civiles), High (données gouvernementales sensibles).
        Le processus est long (12 à 18 mois) et coûteux — une véritable barrière à l'entrée.
        Dans le contexte IA : l'autorisation FedRAMP est requise pour les plateformes IA utilisées
        dans le secteur gouvernemental (défense, santé, renseignement).
        AWS GovCloud et Azure Government ont FedRAMP High ; Google Vertex AI et certaines offres
        OpenAI/Anthropic ont Moderate.

  - id: transformer
    label:
      en: "Transformer"
      fr: "Transformer"
    aliases: ["Transformer", "transformer", "transformers", "attention mechanism", "mécanisme d'attention", "self-attention"]
    description:
      en: >
        The neural network architecture that underpins virtually all modern LLMs.
        Introduced in the 2017 paper ["Attention Is All You Need"](https://arxiv.org/abs/1706.03762) (Vaswani et al., Google).
        Key innovation: the **self-attention mechanism**, which lets the model weigh the relevance
        of every word against every other word in the input simultaneously — instead of processing
        tokens one by one like older RNNs.
        This parallelism made it possible to train on massive datasets using GPUs/TPUs at scale.
        Two variants: **Encoder** (BERT — good for understanding/classification),
        **Decoder** (GPT, Claude, Llama — good for generation), and **Encoder-Decoder** (T5, translation).
        Every LLM you use today — GPT-4, Claude, Gemini, Llama — is a Transformer.
      fr: >
        L'architecture de réseau de neurones qui sous-tend pratiquement tous les LLM modernes.
        Introduite dans le papier ["Attention Is All You Need"](https://arxiv.org/abs/1706.03762) (2017, Vaswani et al., Google).
        Innovation clé : le **mécanisme d'auto-attention**, qui permet au modèle de pondérer la pertinence
        de chaque mot par rapport à tous les autres simultanément — au lieu de traiter les tokens
        un par un comme les anciens RNN.
        Ce parallélisme a rendu possible l'entraînement sur des corpus massifs avec des GPU/TPU.
        Deux variantes principales : **Encoder** (BERT — compréhension/classification),
        **Decoder** (GPT, Claude, Llama — génération), et **Encoder-Decoder** (T5, traduction).
        Chaque LLM que vous utilisez aujourd'hui — GPT-4, Claude, Gemini, Llama — est un Transformer.

  - id: kv_cache
    label:
      en: "KV Cache"
      fr: "Cache KV"
    aliases: ["KV cache", "kv cache", "key-value cache", "key value cache", "cache clé-valeur", "cache KV", "KV Cache"]
    description:
      en: >
        Short for **Key-Value Cache**. A memory optimization used during LLM inference (text generation).

        **How transformers generate text:** they produce tokens one at a time.
        For each new token, the attention mechanism needs the Key (K) and Value (V) matrices
        for *all previous tokens* — to understand what came before.
        Without a cache, those matrices are recomputed from scratch at every step: cost grows
        quadratically with context length.

        **What the KV cache does:** after computing K and V for each token, it stores them.
        When generating the next token, only the new token's K/V are computed — all previous ones
        are read from cache. This reduces per-token cost from O(n²) to O(n).

        **The trade-off:** the cache lives in GPU/CPU memory. For a 70B model with a 128K context,
        the KV cache can consume tens of gigabytes of VRAM — often more than the model weights themselves.

        **Key related concepts:**
        - **GQA / MQA** (Grouped/Multi-Query Attention): architectural variants (Llama 3, Gemma, Mistral)
          that share K/V heads across query heads, shrinking cache size 4–8×.
        - **Paged Attention** (vLLM): manages the cache like OS virtual memory to avoid fragmentation
          and maximize GPU utilization in multi-user serving.
        - **Prefix caching**: reuses the cached K/V of a repeated system prompt across requests —
          saving latency and cost (supported by Anthropic, OpenAI, Google APIs).
      fr: >
        Abréviation de **cache clé-valeur** (Key-Value Cache). Une optimisation mémoire utilisée
        lors de l'inférence (génération de texte) d'un LLM.

        **Comment les transformers génèrent du texte :** token par token.
        À chaque nouveau token, le mécanisme d'attention a besoin des matrices Key (K) et Value (V)
        de *tous les tokens précédents* — pour comprendre le contexte antérieur.
        Sans cache, ces matrices sont recalculées à chaque étape : le coût croît de façon quadratique
        avec la longueur du contexte.

        **Ce que fait le cache KV :** après avoir calculé K et V pour chaque token, il les stocke.
        Lors de la génération du token suivant, seules les matrices K/V du nouveau token sont calculées —
        toutes les précédentes sont lues depuis le cache. Le coût par token passe de O(n²) à O(n).

        **La contrepartie :** le cache réside en mémoire GPU/CPU. Pour un modèle 70B avec un contexte
        de 128K tokens, le cache KV peut consommer des dizaines de gigaoctets de VRAM —
        souvent davantage que les poids du modèle eux-mêmes.

        **Concepts associés :**
        - **GQA / MQA** (Grouped/Multi-Query Attention) : variantes architecturales (Llama 3, Gemma, Mistral)
          qui partagent les têtes K/V entre les têtes de requête, réduisant la taille du cache de 4 à 8×.
        - **Paged Attention** (vLLM) : gère le cache comme la mémoire virtuelle d'un OS pour éviter
          la fragmentation et maximiser l'utilisation GPU en serving multi-utilisateurs.
        - **Prefix caching** : réutilise le cache K/V d'un system prompt répété entre les requêtes —
          économisant latence et coût (supporté par les APIs Anthropic, OpenAI, Google).

  - id: quantization
    label:
      en: "Quantization"
      fr: "Quantisation"
    aliases: ["quantization", "quantisation", "model quantization", "quantisation du modèle", "INT8", "INT4", "FP8", "post-training quantization", "PTQ", "GGUF", "GPTQ", "AWQ"]
    description:
      en: >
        A compression technique that reduces the numerical precision of model weights —
        and sometimes activations — from high-precision formats (FP32, BF16) to lower-precision ones
        (INT8, FP8, INT4). The goal: smaller model, faster inference, less memory, minimal quality loss.

        **Why it matters:** a 70B parameter model in BF16 requires ~140 GB of VRAM.
        In INT4, it fits in ~35 GB — runnable on 2× consumer GPUs or a single high-end one.

        **Common formats:**
        - **FP32** (32-bit float): training reference, rarely used for inference
        - **BF16 / FP16** (16-bit): standard inference today — good quality, half the FP32 size
        - **INT8** (8-bit integer): ~2× smaller than BF16, fast on modern GPUs, minimal degradation
        - **FP8** (8-bit float): newer format (H100 GPUs), better than INT8 for preserving range
        - **INT4** (4-bit integer): aggressive compression, some quality loss, used in consumer setups

        **Popular quantization methods:**
        - **GPTQ**: post-training quantization (PTQ), layer-by-layer, good INT4 quality
        - **AWQ** (Activation-aware Weight Quantization): preserves important weights, better quality than GPTQ
        - **GGUF** (llama.cpp): file format that bundles model + quantization metadata for CPU/GPU inference

        **KV cache quantization:** quantization can also be applied to the KV cache (not just weights),
        reducing its memory footprint for long contexts — distinct from model weight quantization.

        **Not the same as KV cache:** quantization compresses the model itself at load time;
        the KV cache is a runtime optimization for storing attention states during generation.
      fr: >
        Une technique de compression qui réduit la précision numérique des poids du modèle —
        et parfois des activations — depuis des formats haute précision (FP32, BF16) vers des formats
        plus compacts (INT8, FP8, INT4). L'objectif : un modèle plus petit, une inférence plus rapide,
        moins de mémoire, avec une perte de qualité minimale.

        **Pourquoi c'est important :** un modèle 70B en BF16 requiert ~140 Go de VRAM.
        En INT4, il tient dans ~35 Go — utilisable sur 2 GPUs grand public ou un seul GPU haut de gamme.

        **Formats courants :**
        - **FP32** (flottant 32 bits) : référence pour l'entraînement, rarement utilisé pour l'inférence
        - **BF16 / FP16** (16 bits) : standard d'inférence aujourd'hui — bonne qualité, moitié du FP32
        - **INT8** (entier 8 bits) : ~2× plus compact que BF16, rapide sur GPUs modernes, dégradation minime
        - **FP8** (flottant 8 bits) : format récent (GPUs H100), meilleure conservation de la plage que INT8
        - **INT4** (entier 4 bits) : compression agressive, légère perte de qualité, usage grand public

        **Méthodes de quantisation populaires :**
        - **GPTQ** : quantisation post-entraînement (PTQ), couche par couche, bonne qualité en INT4
        - **AWQ** (Activation-aware Weight Quantization) : préserve les poids importants, meilleure qualité
        - **GGUF** (llama.cpp) : format de fichier qui regroupe modèle et métadonnées de quantisation

        **Quantisation du cache KV :** la quantisation peut aussi s'appliquer au cache KV (et pas seulement
        aux poids), réduisant son empreinte mémoire pour les longs contextes — distinct de la quantisation des poids.

        **Différence avec le cache KV :** la quantisation compresse le modèle au chargement ;
        le cache KV est une optimisation d'exécution pour stocker les états d'attention pendant la génération.

  - id: temperature
    label:
      en: "Temperature"
      fr: "Température"
    aliases: ["temperature", "température", "temp", "sampling temperature"]
    description:
      en: >
        A parameter (typically between 0 and 2) that controls how random or deterministic
        a model's outputs are.
        Technically: it scales the probability distribution over the vocabulary before sampling
        the next token. Low temperature → the model concentrates probability on the most likely
        tokens (predictable, repetitive). High temperature → probability is spread more evenly
        (creative, varied, but also more likely to hallucinate).
        **Temperature 0**: near-deterministic — the model almost always picks the highest-probability token.
        Good for: code generation, factual Q&A, structured outputs.
        **Temperature 0.7–1**: balanced creativity. Good for: chat, writing assistance.
        **Temperature > 1**: highly creative/random. Good for: brainstorming, creative writing.
        Often used alongside **top-p** (nucleus sampling) to further control output diversity.
      fr: >
        Un paramètre (typiquement entre 0 et 2) qui contrôle le degré de hasard ou de déterminisme
        dans les sorties du modèle.
        Techniquement : il met à l'échelle la distribution de probabilité sur le vocabulaire avant
        d'échantillonner le prochain token. Température basse → le modèle concentre la probabilité
        sur les tokens les plus probables (prévisible, répétitif). Température haute → la probabilité
        est répartie plus uniformément (créatif, varié, mais aussi plus sujet aux hallucinations).
        **Température 0** : quasi-déterministe. Idéal pour : génération de code, Q&R factuelles, sorties structurées.
        **Température 0,7–1** : créativité équilibrée. Idéal pour : chat, aide à l'écriture.
        **Température > 1** : très créatif/aléatoire. Idéal pour : brainstorming, écriture créative.
        Souvent utilisée avec **top-p** (nucleus sampling) pour contrôler davantage la diversité des sorties.

  - id: machine_learning
    label:
      en: "Machine Learning"
      fr: "Machine Learning"
    aliases: ["ML", "machine learning", "apprentissage automatique"]
    description:
      en: >
        A subfield of artificial intelligence where systems learn from data to improve
        their performance on a task, without being explicitly programmed for each case.
        Deep Learning and LLMs are branches of Machine Learning.
      fr: >
        Un sous-domaine de l'intelligence artificielle où les systèmes apprennent à partir
        de données pour améliorer leurs performances sur une tâche, sans être explicitement
        programmés pour chaque cas. Le Deep Learning et les LLM sont des branches du Machine Learning.
