  - date: 2026-04-17
    type: update
    title:
      en: "Anthropic releases Claude Opus 4.7"
      fr: "Anthropic lance Claude Opus 4.7"
    description:
      en: "Anthropic announces Claude Opus 4.7, a new iteration of its flagship model. Follows the Claude 4 family (Opus 4, Sonnet 4, Haiku 3.5) released earlier in 2026."
      fr: "Anthropic annonce Claude Opus 4.7, une nouvelle itération de son modèle phare. Fait suite à la famille Claude 4 (Opus 4, Sonnet 4, Haiku 3.5) sortie début 2026."
    link: https://x.com/claudeai/status/2044785261393977612?s=20

  - date: 2026-04-13
    type: update
    title:
      en: "Community report: Claude reasoning depth regression (Jan–Mar 2026)"
      fr: "Rapport communautaire : régression de la profondeur de raisonnement de Claude (jan.–mars 2026)"
    description:
      en: "A detailed user analysis documents a sharp drop in Claude's thinking depth between January and March 2026: median reasoning length fell from ~2 200 to ~600 chars, read/edit ratio dropped from 6.6× to 2.0×, and autonomous task completion degraded. The author calls for Anthropic to expose thinking-budget metrics via the API and offer a 'max thinking' tier for heavy engineering workflows."
      fr: "Une analyse utilisateur détaillée documente une chute marquée de la profondeur de raisonnement de Claude entre janvier et mars 2026 : la longueur médiane du raisonnement est passée de ~2 200 à ~600 caractères, le ratio lecture/édition de 6,6× à 2,0×, et la capacité d'exécution autonome s'est dégradée. L'auteur demande à Anthropic d'exposer les métriques de budget de raisonnement via l'API et de proposer un tier 'max thinking' pour les workflows d'ingénierie intensifs."
    link: https://github.com/anthropics/claude-code/issues/42796#issuecomment-4194007103

  - date: 2026-04-08
    type: new-feature
    title:
      en: "Anthropic launches Claude Managed Agents (public beta)"
      fr: "Anthropic lance Claude Managed Agents (bêta publique)"
    description:
      en: "A new suite of composable APIs to build and deploy cloud-hosted AI agents at scale. Features sandboxed execution, checkpointing, multi-agent orchestration, and scoped permissions. Deploy via Console, Claude Code, or CLI."
      fr: "Une nouvelle suite d'API composables pour créer et déployer des agents IA hébergés dans le cloud à grande échelle. Exécution sandboxée, checkpointing, orchestration multi-agents et permissions scopées. Déploiement via Console, Claude Code ou CLI."
    link: https://www.anthropic.com/research/managed-agents

  - date: 2026-04-08
    type: update
    title:
      en: "Meta launches Muse Spark — first model from Superintelligence Labs"
      fr: "Meta lance Muse Spark — premier modèle de Superintelligence Labs"
    description:
      en: "Meta debuts Muse Spark, a proprietary multimodal reasoning model led by Alexandr Wang. Features thought compression (10× less compute than Llama 4 Maverick), multi-agent orchestration, and three reasoning modes. A major pivot away from Meta's open-source Llama strategy."
      fr: "Meta dévoile Muse Spark, un modèle de raisonnement multimodal propriétaire dirigé par Alexandr Wang. Compression de pensée (10× moins de calcul que Llama 4 Maverick), orchestration multi-agents et trois modes de raisonnement. Un virage majeur par rapport à la stratégie open-source Llama."
    link: https://ai.meta.com/blog/introducing-muse-spark-msl/

