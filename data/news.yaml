  - date: 2026-04-08
    type: update
    title:
      en: "Meta launches Muse Spark — first model from Superintelligence Labs"
      fr: "Meta lance Muse Spark — premier modèle de Superintelligence Labs"
    description:
      en: "Meta debuts Muse Spark, a proprietary multimodal reasoning model led by Alexandr Wang. Features thought compression (10× less compute than Llama 4 Maverick), multi-agent orchestration, and three reasoning modes. A major pivot away from Meta's open-source Llama strategy."
      fr: "Meta dévoile Muse Spark, un modèle de raisonnement multimodal propriétaire dirigé par Alexandr Wang. Compression de pensée (10× moins de calcul que Llama 4 Maverick), orchestration multi-agents et trois modes de raisonnement. Un virage majeur par rapport à la stratégie open-source Llama."
    link: https://ai.meta.com/blog/introducing-muse-spark-msl/

  - date: 2026-03-31
    type: update
    title:
      en: "Anthropic hit by two leaks in five days: Claude Mythos model & Claude Code source"
      fr: "Anthropic frappé par deux fuites en cinq jours : modèle Claude Mythos & code source Claude Code"
    description:
      en: "In the span of five days, Anthropic suffered two significant leaks. On March 26, a draft announcement for its next frontier model — codenamed Claude Mythos — was accidentally published. On March 31, the full source code of Claude Code was exposed through an npm package (~512K lines across ~1,900 files), revealing agent orchestration logic, automation pipelines, and internal component structure."
      fr: "En l'espace de cinq jours, Anthropic a subi deux fuites significatives. Le 26 mars, un brouillon d'annonce pour son prochain modèle frontier — baptisé Claude Mythos — a été accidentellement publié. Le 31 mars, le code source complet de Claude Code a été exposé via un paquet npm (~512K lignes dans ~1 900 fichiers), révélant la logique d'orchestration des agents, les pipelines d'automatisation et la structure des composants internes."

