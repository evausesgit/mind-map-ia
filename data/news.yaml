news:
  - date: 2026-05-28
    type: update
    title:
      en: "Anthropic introduces Claude Opus 4.8"
      fr: "Anthropic présente Claude Opus 4.8"
    description:
      en: "Anthropic released Claude Opus 4.8, an upgrade to its Opus model line with stronger coding, agentic-task, and professional-work performance at the same regular price as Opus 4.7 ($5 per million input tokens and $25 per million output tokens). The launch also adds effort control in claude.ai and Cowork, Claude Code dynamic workflows for hundreds of parallel subagents, and a fast mode that runs at 2.5× speed while being three times cheaper than previous fast-mode pricing."
      fr: "Anthropic lance Claude Opus 4.8, une mise à jour de sa gamme Opus avec de meilleures performances en code, tâches agentiques et travail professionnel, au même prix standard qu'Opus 4.7 (5 $ par million de tokens en entrée et 25 $ en sortie). Le lancement ajoute aussi le contrôle d'effort dans claude.ai et Cowork, les dynamic workflows de Claude Code pour orchestrer des centaines de sous-agents en parallèle, et un mode rapide à 2,5× la vitesse dont le prix est divisé par trois par rapport aux précédentes offres fast mode."
    link: https://www.anthropic.com/news/claude-opus-4-8

  - date: 2026-05-18
    type: update
    title:
      en: "Dell and NVIDIA update AI Factory for enterprise agents"
      fr: "Dell et NVIDIA mettent à jour l'AI Factory pour les agents d'entreprise"
    description:
      en: "At Dell Technologies World, Dell and NVIDIA announced updates to the Dell AI Factory with NVIDIA for secure enterprise agentic AI, spanning deskside workstations, on-premises data centers, and confidential computing. Key figures include AI infrastructure spending potentially reaching $3–4T by 2030, token consumption growing 3,400%, a Vera Rubin NVL72-based Dell PowerEdge XE9812 promising up to 10× lower cost per token than Blackwell for large-scale agentic inference, and Vera CPU systems completing agentic workloads 50% faster than x86 processors."
      fr: "Lors de Dell Technologies World, Dell et NVIDIA ont annoncé des mises à jour du Dell AI Factory with NVIDIA pour l'IA agentique sécurisée en entreprise, des stations de travail aux datacenters on-premise en passant par le confidential computing. Les chiffres clés : les dépenses d'infrastructure IA pourraient atteindre 3 à 4 billions de dollars d'ici 2030, la consommation de tokens augmenter de 3 400 %, le Dell PowerEdge XE9812 basé sur Vera Rubin NVL72 promet jusqu'à 10× de coût par token en moins que Blackwell pour l'inférence agentique à grande échelle, et les systèmes Vera CPU exécutent les workloads agentiques 50 % plus vite que les processeurs x86."
    link: https://blogs.nvidia.com/blog/dell-technologies-agent-enterprise-ai/

  - date: 2026-05-17
    type: update
    title:
      en: "OpenAI and Malta bring ChatGPT Plus to all citizens"
      fr: "OpenAI et Malte offrent ChatGPT Plus à tous les citoyens"
    description:
      en: "OpenAI and the Government of Malta announced a partnership to offer ChatGPT Plus for one year at no cost to Maltese citizens who complete the national AI for All literacy course developed by the University of Malta. The first phase launches in May, with the Malta Digital Innovation Authority managing distribution, as part of OpenAI for Countries and a broader national AI adoption push."
      fr: "OpenAI et le gouvernement de Malte annoncent un partenariat pour offrir ChatGPT Plus pendant un an, sans frais, aux citoyens maltais qui terminent le cours national d'initiation AI for All développé par l'Université de Malte. La première phase démarre en mai, avec une distribution gérée par la Malta Digital Innovation Authority, dans le cadre d'OpenAI for Countries et d'une stratégie nationale d'adoption de l'IA."
    link: https://openai.com/index/malta-chatgpt-plus-partnership/

  - date: 2026-05-11
    type: update
    title:
      en: "Artificial Analysis launches Coding Agent Index"
      fr: "Artificial Analysis lance le Coding Agent Index"
    description:
      en: "Artificial Analysis introduced a Coding Agent Index that benchmarks combinations of agent harnesses and models across SWE-bench Pro-Hard, Terminal-Bench v2, and SWE-Lancer. In the first results, Cursor CLI with Opus 4.1 leads with a score of 61, while Codex with GPT-5.5 and Claude Code with Opus 4.1 both score 60. The cost view highlights large efficiency differences: Cursor CLI with Composer 2 scores 48 at roughly $0.10 per task, versus about $2.20 per task for Codex with GPT-5.5."
      fr: "Artificial Analysis présente le Coding Agent Index, un benchmark qui évalue les combinaisons entre harnais d'agent et modèles sur SWE-bench Pro-Hard, Terminal-Bench v2 et SWE-Lancer. Dans les premiers résultats, Cursor CLI avec Opus 4.1 arrive en tête avec un score de 61, tandis que Codex avec GPT-5.5 et Claude Code avec Opus 4.1 atteignent tous deux 60. La vue coût met en évidence de forts écarts d'efficacité : Cursor CLI avec Composer 2 score 48 pour environ 0,10 $ par tâche, contre environ 2,20 $ par tâche pour Codex avec GPT-5.5."
    link: https://x.com/ArtificialAnlys/status/2053865095076438427?s=20
  - date: 2026-04-30
    type: update
    title:
      en: "Google makes Gemini Embedding 2 generally available"
      fr: "Google rend Gemini Embedding 2 disponible au grand public"
    description:
      en: "Google AI says Gemini Embedding 2, its first natively multimodal embedding model, is now available to the general public. Developers are already using it for video analysis tools, visual shopping assistants, and other applications that need to connect text, images, and video in a shared semantic space."
      fr: "Google AI indique que Gemini Embedding 2, son premier modèle d'embedding nativement multimodal, est désormais disponible au grand public. Des développeurs l'utilisent déjà pour créer des outils d'analyse vidéo, des assistants de shopping visuel et d'autres applications qui relient texte, images et vidéo dans un même espace sémantique."
    link: https://x.com/googleai/status/2049903687016063456?s=46

  - date: 2026-04-28
    type: update
    title:
      en: "Symphony: OpenAI's open-source spec for Codex orchestration"
      fr: "Symphony : la spec open-source d'OpenAI pour orchestrer Codex"
    description:
      en: "OpenAI open-sources Symphony, a minimal agent orchestrator that turns a Linear project board into a control plane for Codex coding agents. Every open task gets a dedicated agent that runs continuously; if an agent stalls, Symphony restarts it automatically. Internal teams at OpenAI reported a 500% increase in merged PRs within three weeks. Symphony is released as a reference implementation — not a maintained product — and v1.1.0 adds support for alternative runtimes including Claude Code and Gemini via the Kata CLI."
      fr: "OpenAI publie en open-source Symphony, un orchestrateur d'agents minimal qui transforme un tableau Linear en panneau de contrôle pour les agents de code Codex. Chaque tâche ouverte reçoit un agent dédié qui tourne en continu ; si un agent se bloque, Symphony le redémarre automatiquement. Des équipes internes d'OpenAI ont rapporté +500 % de PRs mergées en trois semaines. Symphony est publié comme implémentation de référence — non maintenu en tant que produit — et la v1.1.0 ajoute le support de runtimes alternatifs dont Claude Code et Gemini via le Kata CLI."
    link: https://openai.com/index/open-source-codex-orchestration-symphony/

  - date: 2026-04-27
    type: update
    title:
      en: "Graphify: turn any codebase into a queryable knowledge graph"
      fr: "Graphify : transformez n'importe quelle base de code en knowledge graph requêtable"
    description:
      en: "Open-source Python tool (36,000 ⭐, MIT) that converts folders of code, docs, papers, images, and video into a queryable NetworkX knowledge graph. Three-pass pipeline: local AST extraction for 25+ languages via tree-sitter, Whisper-based audio/video transcription, and Claude subagents for semantic relationship extraction. Produces an interactive HTML visualization, a queryable JSON graph, and an audit report — with a claimed 71.5× token reduction per query vs. reading raw files. Integrates as a persistent skill with Claude Code, Cursor, Codex, Gemini CLI, and GitHub Copilot."
      fr: "Outil Python open-source (36 000 ⭐, MIT) qui convertit des dossiers de code, docs, papers, images et vidéos en un knowledge graph NetworkX requêtable. Pipeline en trois passes : extraction AST locale pour 25+ langages via tree-sitter, transcription audio/vidéo avec Whisper, et sous-agents Claude pour l'extraction de relations sémantiques. Produit une visualisation HTML interactive, un graphe JSON requêtable et un rapport d'audit — avec une réduction de 71,5× des tokens par requête par rapport à la lecture des fichiers bruts. S'intègre en skill persistant avec Claude Code, Cursor, Codex, Gemini CLI et GitHub Copilot."
    link: https://github.com/safishamsi/graphify

  - date: 2026-04-24
    type: update
    title:
      en: "DeepSeek V4 Pro and V4 Flash: back among the top open-weights models"
      fr: "DeepSeek V4 Pro et V4 Flash : retour parmi les meilleurs modèles open-weights"
    description:
      en: "DeepSeek releases two new MoE models. V4 Pro (1.6T/49B active params) ranks #2 among open-weights reasoning models with a score of 52 on the Artificial Analysis Intelligence Index — a 10-point jump over V3.2 — and leads all open-weights models on agentic tasks. V4 Flash (284B/13B active) scores 47 and targets efficiency. Both support a 1M-token context window (8× V3.2) and are MIT-licensed. Pricing: V4 Pro at $1.74/$3.48 per 1M tokens, V4 Flash at $0.14/$0.28. Major caveat: hallucination rates of 94–96%, meaning the models almost always respond even when they don't know the answer."
      fr: "DeepSeek lance deux nouveaux modèles MoE. V4 Pro (1,6T/49B paramètres actifs) se classe 2ᵉ parmi les modèles open-weights de raisonnement avec un score de 52 à l'Artificial Analysis Intelligence Index — +10 points par rapport à V3.2 — et domine sur les tâches agentives. V4 Flash (284B/13B actifs) score 47 et vise l'efficacité. Les deux supportent une fenêtre de contexte de 1M tokens (×8 vs V3.2) et sont sous licence MIT. Tarifs : V4 Pro à 1,74 $/3,48 $ par million de tokens, V4 Flash à 0,14 $/0,28 $. Bémol majeur : des taux d'hallucination de 94–96 %, les modèles répondant presque toujours même sans connaître la réponse."
    link: https://artificialanalysis.ai/articles/deepseek-is-back-among-the-leading-open-weights-models-with-v4-pro-and-v4-flash

  - date: 2026-04-23
    type: update
    title:
      en: "Anthropic publishes Claude Code post-mortem (March–April 2026)"
      fr: "Anthropic publie un post-mortem Claude Code (mars–avril 2026)"
    description:
      en: "Anthropic publishes Claude Code post-mortem covering three regressions between March and April 2026: reduced reasoning effort (default changed to 'medium'), a cache-clearing bug that caused Claude to forget context, and an over-strict prompt instruction that degraded code quality. Usage limits reset for all subscribers as compensation."
      fr: "Anthropic publie un post-mortem Claude Code couvrant trois régressions entre mars et avril 2026 : effort de raisonnement réduit (défaut passé à 'medium'), un bug de cache qui faisait oublier le contexte à Claude, et une instruction de prompt trop stricte qui dégradait la qualité du code. Les limites d'usage ont été réinitialisées pour tous les abonnés en compensation."
    link: https://www.anthropic.com/engineering/april-23-postmortem

