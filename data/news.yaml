news:
  - date: 2026-04-27
    type: update
    title:
      en: "Graphify: turn any codebase into a queryable knowledge graph"
      fr: "Graphify : transformez n'importe quelle base de code en knowledge graph requêtable"
    description:
      en: "Open-source Python tool (36,000 ⭐, MIT) that converts folders of code, docs, papers, images, and video into a queryable NetworkX knowledge graph. Three-pass pipeline: local AST extraction for 25+ languages via tree-sitter, Whisper-based audio/video transcription, and Claude subagents for semantic relationship extraction. Produces an interactive HTML visualization, a queryable JSON graph, and an audit report — with a claimed 71.5× token reduction per query vs. reading raw files. Integrates as a persistent skill with Claude Code, Cursor, Codex, Gemini CLI, and GitHub Copilot."
      fr: "Outil Python open-source (36 000 ⭐, MIT) qui convertit des dossiers de code, docs, papers, images et vidéos en un knowledge graph NetworkX requêtable. Pipeline en trois passes : extraction AST locale pour 25+ langages via tree-sitter, transcription audio/vidéo avec Whisper, et sous-agents Claude pour l'extraction de relations sémantiques. Produit une visualisation HTML interactive, un graphe JSON requêtable et un rapport d'audit — avec une réduction de 71,5× des tokens par requête par rapport à la lecture des fichiers bruts. S'intègre en skill persistant avec Claude Code, Cursor, Codex, Gemini CLI et GitHub Copilot."
    link: https://github.com/safishamsi/graphify

  - date: 2026-04-24
    type: update
    title:
      en: "DeepSeek V4 Pro and V4 Flash: back among the top open-weights models"
      fr: "DeepSeek V4 Pro et V4 Flash : retour parmi les meilleurs modèles open-weights"
    description:
      en: "DeepSeek releases two new MoE models. V4 Pro (1.6T/49B active params) ranks #2 among open-weights reasoning models with a score of 52 on the Artificial Analysis Intelligence Index — a 10-point jump over V3.2 — and leads all open-weights models on agentic tasks. V4 Flash (284B/13B active) scores 47 and targets efficiency. Both support a 1M-token context window (8× V3.2) and are MIT-licensed. Pricing: V4 Pro at $1.74/$3.48 per 1M tokens, V4 Flash at $0.14/$0.28. Major caveat: hallucination rates of 94–96%, meaning the models almost always respond even when they don't know the answer."
      fr: "DeepSeek lance deux nouveaux modèles MoE. V4 Pro (1,6T/49B paramètres actifs) se classe 2ᵉ parmi les modèles open-weights de raisonnement avec un score de 52 à l'Artificial Analysis Intelligence Index — +10 points par rapport à V3.2 — et domine sur les tâches agentives. V4 Flash (284B/13B actifs) score 47 et vise l'efficacité. Les deux supportent une fenêtre de contexte de 1M tokens (×8 vs V3.2) et sont sous licence MIT. Tarifs : V4 Pro à 1,74 $/3,48 $ par million de tokens, V4 Flash à 0,14 $/0,28 $. Bémol majeur : des taux d'hallucination de 94–96 %, les modèles répondant presque toujours même sans connaître la réponse."
    link: https://artificialanalysis.ai/articles/deepseek-is-back-among-the-leading-open-weights-models-with-v4-pro-and-v4-flash

  - date: 2026-04-23
    type: update
    title:
      en: "Anthropic publishes Claude Code post-mortem (March–April 2026)"
      fr: "Anthropic publie un post-mortem Claude Code (mars–avril 2026)"
    description:
      en: "Anthropic publishes Claude Code post-mortem covering three regressions between March and April 2026: reduced reasoning effort (default changed to 'medium'), a cache-clearing bug that caused Claude to forget context, and an over-strict prompt instruction that degraded code quality. Usage limits reset for all subscribers as compensation."
      fr: "Anthropic publie un post-mortem Claude Code couvrant trois régressions entre mars et avril 2026 : effort de raisonnement réduit (défaut passé à 'medium'), un bug de cache qui faisait oublier le contexte à Claude, et une instruction de prompt trop stricte qui dégradait la qualité du code. Les limites d'usage ont été réinitialisées pour tous les abonnés en compensation."
    link: https://www.anthropic.com/engineering/april-23-postmortem

