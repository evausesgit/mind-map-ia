meta:
  title:
    en: "The LLM Ecosystem — Big Picture"
    fr: "L'Écosystème LLM — Vue d'Ensemble"
  description:
    en: "A macro view of the AI/LLM ecosystem: concepts, categories and building blocks"
    fr: "Vue macro de l'écosystème IA/LLM : concepts, catégories et briques fondamentales"
  version: "2026-Q1"
  date: "2026-04-02"
  node_scale: 2

layers:
  1:
    en: "CORE CONCEPTS"
    fr: "CONCEPTS FONDAMENTAUX"
  2:
    en: "MODEL TAXONOMY"
    fr: "TAXONOMIE DES MODÈLES"
  3:
    en: "ACCESS & DEPLOYMENT"
    fr: "ACCÈS & DÉPLOIEMENT"
  4:
    en: "APPLICATION PATTERNS"
    fr: "PATTERNS APPLICATIFS"
  5:
    en: "TOOLING ECOSYSTEM"
    fr: "ÉCOSYSTÈME D'OUTILS"

categories:
  - id: concepts
    label:
      en: "Core Concepts"
      fr: "Concepts Fondamentaux"
    color: "#F4D03F"
    description:
      en: "Fundamental abstract notions to understand before anything else"
      fr: "Notions abstraites fondamentales à comprendre en premier"

  - id: model_types
    label:
      en: "Model Types"
      fr: "Types de Modèles"
    color: "#C39BD3"
    description:
      en: "The different categories of AI models"
      fr: "Les différentes catégories de modèles IA"

  - id: access
    label:
      en: "Access & Deployment"
      fr: "Accès & Déploiement"
    color: "#85929E"
    description:
      en: "The different ways to access and run a model"
      fr: "Les différentes façons d'accéder à un modèle et de le déployer"

  - id: patterns
    label:
      en: "Application Patterns"
      fr: "Patterns Applicatifs"
    color: "#58D68D"
    description:
      en: "Architectural patterns to build AI-powered applications"
      fr: "Patterns architecturaux pour construire des applications IA"

  - id: tooling
    label:
      en: "Tooling Ecosystem"
      fr: "Écosystème d'Outils"
    color: "#5DADE2"
    description:
      en: "Categories of tools developers use to build with LLMs"
      fr: "Catégories d'outils utilisés par les développeurs pour construire avec les LLM"

nodes:
  # ── LAYER 1 · CORE CONCEPTS ─────────────────

  - id: language_model
    label:
      en: "Language Model"
      fr: "Modèle de Langage"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://en.wikipedia.org/wiki/Large_language_model"
    ref: "https://arxiv.org/abs/1706.03762"
    description:
      en: >
        A model trained on massive text datasets to understand and generate human language.
        The foundation of the entire ecosystem. All LLMs are language models,
        but not all language models are LLMs.
      fr: >
        Un modèle entraîné sur d'immenses corpus textuels pour comprendre et générer du langage humain.
        La brique de base de tout l'écosystème. Tous les LLM sont des modèles de langage,
        mais tous les modèles de langage ne sont pas des LLM.

  - id: token_context
    label:
      en: "Token & Context"
      fr: "Token & Contexte"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://platform.openai.com/tokenizer"
    ref: "https://tiktokenizer.vercel.app/"
    description:
      en: >
        A token is the smallest unit of text a model processes (~0.75 words).
        The context window is the maximum number of tokens a model can handle at once.
        These two notions define the model's "working memory".
      fr: >
        Un token est la plus petite unité de texte traitée par un modèle (~0,75 mot).
        La fenêtre de contexte est le nombre maximum de tokens traités en une seule fois.
        Ces deux notions définissent la "mémoire de travail" du modèle.

  - id: embedding_vectors
    label:
      en: "Embedding & Vectors"
      fr: "Embedding & Vecteurs"
    layer: 1
    category: concepts
    status: stable
    since: "2013"
    link: "https://platform.openai.com/docs/guides/embeddings"
    ref: "https://arxiv.org/abs/1301.3666"
    description:
      en: >
        An embedding is a list of numbers (a vector) that represents the meaning of a text.
        Similar texts produce similar vectors. This enables semantic search,
        clustering, and retrieval — the backbone of RAG.
      fr: >
        Un embedding est une liste de nombres (un vecteur) représentant le sens d'un texte.
        Des textes similaires produisent des vecteurs proches. Cela permet la recherche sémantique,
        le clustering et la récupération de documents — colonne vertébrale du RAG.

  - id: training_alignment
    label:
      en: "Training & Alignment"
      fr: "Entraînement & Alignement"
    layer: 1
    category: concepts
    status: stable
    since: "2018"
    link: "https://www.anthropic.com/research/constitutional-ai-harmlessness-from-ai-feedback"
    ref: "https://arxiv.org/abs/1706.03741"
    description:
      en: >
        Training: teaching a model by exposing it to vast amounts of data.
        Alignment: shaping the model's behavior to be helpful, honest and safe
        (via RLHF, Constitutional AI, etc.). Two distinct but essential phases.
      fr: >
        Entraînement : apprendre à un modèle en le exposant à d'immenses quantités de données.
        Alignement : façonner son comportement pour qu'il soit utile, honnête et sûr
        (via RLHF, Constitutional AI, etc.). Deux phases distinctes mais indispensables.

  - id: inference
    label:
      en: "Inference"
      fr: "Inférence"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://huggingface.co/docs/transformers/main/en/pipeline_tutorial"
    description:
      en: >
        Running a trained model to generate a response from an input.
        Every API call, every chat message is an inference.
        Opposite of training — much cheaper and faster.
      fr: >
        Faire tourner un modèle entraîné pour générer une réponse à partir d'une entrée.
        Chaque appel API, chaque message de chat est une inférence.
        Opposé de l'entraînement — beaucoup moins coûteux et plus rapide.

  - id: reasoning_models
    label:
      en: "Reasoning"
      fr: "Raisonnement"
    layer: 1
    category: concepts
    status: emerging
    since: "2024"
    link: "https://openai.com/o3"
    ref: "https://arxiv.org/abs/2201.11903"
    description:
      en: |
        A paradigm shift in how models respond: instead of answering immediately,
        the model thinks step-by-step before giving its final answer (chain-of-thought).
        Significantly better at complex logic, math and coding.
        Not a separate model type — a capability that can apply to proprietary or open source models.
        Examples: o3, DeepSeek-R1, Claude 3.7 extended thinking.
      fr: |
        Un changement de paradigme dans la façon dont les modèles répondent : au lieu de répondre immédiatement,
        le modèle réfléchit étape par étape avant de donner sa réponse finale (chain-of-thought).
        Bien meilleur sur les tâches de logique complexe, de maths et de code.
        Pas un type de modèle à part — une capacité qui s'applique aux modèles propriétaires ou open source.
        Exemples : o3, DeepSeek-R1, Claude 3.7 extended thinking.

  - id: multimodality
    label:
      en: "Multimodality"
      fr: "Multimodalité"
    layer: 1
    category: concepts
    status: evolving
    since: "2023"
    link: "https://openai.com/index/gpt-4v-system-card"
    ref: "https://arxiv.org/abs/2309.17421"
    description:
      en: |
        The ability of a model to process and generate multiple types of data:
        text,
        images,
        audio,
        video,
        code.
        Modern frontier models are natively multimodal.
        Expands LLMs far beyond text-only interactions.
      fr: |
        La capacité d'un modèle à traiter et générer plusieurs types de données :
        texte,
        images,
        audio,
        vidéo,
        code.
        Les modèles frontier modernes sont nativement multimodaux.
        Étend les LLM bien au-delà des interactions textuelles.

  # ── LAYER 2 · MODEL TAXONOMY ─────────────────

  - id: frontier_models
    label:
      en: "Proprietary Models"
      fr: "Modèles Propriétaires"
    layer: 2
    category: model_types
    status: evolving
    since: "2022"
    link: "https://platform.openai.com/docs/models"
    description:
      en: |
        Models whose weights are PRIVATE, never downloadable.
        Accessible only via API.
        Developed by well-funded labs (OpenAI, Anthropic, Google).
        Often called "Frontier models" in the industry, referring to their position at the cutting edge of AI capabilities.
      fr: |
        Modèles dont les poids sont PRIVES, jamais téléchargeables.
        Accessibles uniquement via API.
        Développés par des laboratoires a gros budget (OpenAI, Anthropic, Google).
        Souvent appelés "Frontier models" dans l'industrie, en référence à leur position à la pointe des capacités IA.

  - id: open_weights
    label:
      en: "Open Source / Weights Models"
      fr: "Open Source / Weights Models"
    layer: 2
    category: model_types
    status: evolving
    since: "2023"
    link: "https://huggingface.co/models"
    ref: "https://arxiv.org/abs/2407.21783"
    description:
      en: |
        Weights are publicly downloadable — you can run, fine-tune and deploy the model yourself.
        Commonly called "open source", though technically more precise to say "open weights":
        training data and full code are usually not published.
        Examples: Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.
      fr: |
        Les poids sont téléchargeables publiquement — vous pouvez exécuter, fine-tuner et déployer le modèle vous-même.
        Souvent appelés "open source" (terme courant), mais plus précisément "open weights" :
        les données d'entraînement et le code complet ne sont généralement pas publiés.
        Exemples : Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.

  - id: embedding_models
    label:
      en: "Embedding Models"
      fr: "Modèles d'Embedding"
    layer: 2
    category: model_types
    status: stable
    since: "2022"
    link: "https://platform.openai.com/docs/guides/embeddings"
    ref: "https://huggingface.co/spaces/mteb/leaderboard"
    description:
      en: >
        Specialized models that convert text into vectors (not text generators).
        Essential building block for semantic search and RAG pipelines.
        Examples: text-embedding-3, Voyage-3, nomic-embed.
      fr: >
        Modèles spécialisés qui convertissent du texte en vecteurs (pas des générateurs de texte).
        Brique indispensable pour la recherche sémantique et les pipelines RAG.
        Exemples : text-embedding-3, Voyage-3, nomic-embed.

  # ── LAYER 3 · ACCESS & DEPLOYMENT ───────────

  - id: public_api
    label:
      en: "Public API"
      fr: "API Publique"
    layer: 3
    category: access
    status: stable
    since: "2020"
    link: "https://platform.openai.com/docs/api-reference"
    description:
      en: >
        Send an HTTP request to a provider's endpoint, get a response.
        The simplest way to use a model. Pay per token.
        No infrastructure to manage. Operated by the model creator.
      fr: >
        Envoyer une requête HTTP à l'endpoint d'un fournisseur, recevoir une réponse.
        La façon la plus simple d'utiliser un modèle. Facturation à la consommation (par token).
        Aucune infrastructure à gérer. Opéré par le créateur du modèle.

  - id: cloud_managed
    label:
      en: "Cloud Managed"
      fr: "Cloud Managé"
    layer: 3
    category: access
    status: stable
    since: "2023"
    link: "https://aws.amazon.com/bedrock/"
    description:
      en: >
        Access models through a major cloud provider (AWS, GCP, Azure).
        Benefits: enterprise compliance, data privacy, multi-model choice,
        integration with existing cloud infra. Managed by the cloud, not the AI lab.
      fr: >
        Accès aux modèles via un grand fournisseur cloud (AWS, GCP, Azure).
        Avantages : conformité entreprise, confidentialité des données, choix multi-modèles,
        intégration avec l'infra cloud existante. Géré par le cloud, pas par le laboratoire IA.

  - id: self_hosted
    label:
      en: "Self-hosted"
      fr: "Auto-hébergé"
    layer: 3
    category: access
    status: stable
    since: "2023"
    link: "https://docs.vllm.ai/en/latest/"
    description:
      en: >
        Deploy the model on your own GPU servers (on-premise or cloud VMs).
        Full control over data and costs at scale.
        Requires ML infrastructure expertise.
      fr: >
        Déployer le modèle sur ses propres serveurs GPU (on-premise ou VMs cloud).
        Contrôle total sur les données et les coûts à grande échelle.
        Nécessite une expertise en infrastructure ML.

  - id: local_edge
    label:
      en: "Local / Edge"
      fr: "Local / Edge"
    layer: 3
    category: access
    status: evolving
    since: "2023"
    link: "https://ollama.com"
    description:
      en: >
        Run a model on a laptop, phone, or edge device. No internet required.
        Maximum privacy. Enabled by smaller, efficient models and tools like Ollama.
        Growing fast as hardware improves.
      fr: >
        Faire tourner un modèle sur un laptop, téléphone ou dispositif edge. Sans internet.
        Confidentialité maximale. Rendu possible par des modèles plus petits et des outils comme Ollama.
        En forte croissance au fil des avancées matérielles.

  # ── LAYER 4 · APPLICATION PATTERNS ──────────

  - id: rag_pattern
    label:
      en: "RAG"
      fr: "RAG"
    layer: 4
    category: patterns
    status: stable
    since: "2023"
    link: "https://aws.amazon.com/what-is/retrieval-augmented-generation/"
    ref: "https://arxiv.org/abs/2005.11401"
    description:
      en: >
        Retrieval-Augmented Generation. At query time, retrieve relevant documents
        from a knowledge base and inject them into the prompt.
        Solves knowledge cutoff and hallucination on specific data. Very widely adopted.
      fr: >
        Retrieval-Augmented Generation. Au moment de la requête, récupérer les documents pertinents
        depuis une base de connaissances et les injecter dans le prompt.
        Résout les problèmes de date limite de connaissance et d'hallucination. Très largement adopté.

  - id: agents_pattern
    label:
      en: "AI Agents"
      fr: "Agents IA"
    layer: 4
    category: patterns
    status: evolving
    since: "2023"
    link: "https://www.anthropic.com/research/building-effective-agents"
    ref: "https://arxiv.org/abs/2309.07864"
    description:
      en: >
        Systems where an LLM autonomously plans, calls tools, and iterates
        until a goal is achieved. Shift from "Q&A" to "autonomous task completion".
        The central paradigm of 2024-2025.
      fr: >
        Systèmes où un LLM planifie de façon autonome, appelle des outils et itère
        jusqu'à atteindre un objectif. Passage du "question-réponse" à l'"exécution autonome de tâches".
        Le paradigme central de 2024-2025.

  - id: tool_use_pattern
    label:
      en: "Tool Use"
      fr: "Utilisation d'Outils"
    layer: 4
    category: patterns
    status: stable
    since: "2023"
    link: "https://docs.anthropic.com/en/docs/build-with-claude/tool-use/overview"
    ref: "https://modelcontextprotocol.io/introduction"
    description:
      en: |
        The model can call external functions during generation: search the web,
        query a database, run code, send an email.
        Core capability that transforms LLMs from chat to action.
      fr: |
        Le modèle peut appeler des fonctions externes pendant la génération : chercher sur le web,
        interroger une base de données, exécuter du code, envoyer un email.
        Capacité fondamentale qui transforme les LLM de chatbots en acteurs.

  - id: finetuning_pattern
    label:
      en: "Fine-tuning"
      fr: "Fine-tuning"
    layer: 4
    category: patterns
    status: stable
    since: "2022"
    link: "https://platform.openai.com/docs/guides/fine-tuning"
    ref: "https://arxiv.org/abs/2106.09685"
    description:
      en: >
        Adapt a pre-trained model to a specific domain or behavior
        by training it further on curated data.
        Only possible with open-weights models. Produces a specialized model.
      fr: >
        Adapter un modèle pré-entraîné à un domaine ou comportement spécifique
        en le ré-entraînant sur des données ciblées.
        Uniquement possible avec les modèles open weights. Produit un modèle spécialisé.

  - id: prompt_eng
    label:
      en: "Prompt Engineering"
      fr: "Prompt Engineering"
    layer: 4
    category: patterns
    status: stable
    since: "2022"
    link: "https://platform.openai.com/docs/guides/prompt-engineering"
    ref: "https://www.promptingguide.ai/"
    description:
      en: |
        The practice of crafting inputs to reliably get the desired output from a model.
        A prompt is the input text sent to the model.
        The system prompt is a special instruction set that defines the model's role, behavior and constraints — it shapes every response before the user even speaks.
        Techniques: few-shot examples, chain-of-thought, role assignment.
        No code required. High-leverage, often underestimated.
      fr: |
        L'art de formuler les entrées pour obtenir de façon fiable la sortie souhaitée d'un modèle.
        Le prompt est le texte d'entrée envoyé au modèle.
        Le system prompt est un ensemble d'instructions spéciales qui définit le rôle, le comportement et les contraintes du modèle — il conditionne chaque réponse avant même que l'utilisateur parle.
        Techniques : few-shot, chain-of-thought, assignation de rôle.
        Sans code. Très impactant, souvent sous-estimé.

  - id: structured_gen
    label:
      en: "Structured Generation"
      fr: "Génération Structurée"
    layer: 4
    category: patterns
    status: stable
    since: "2023"
    link: "https://platform.openai.com/docs/guides/structured-outputs"
    ref: "https://arxiv.org/abs/2307.09702"
    description:
      en: >
        Force the model to respond in a defined format (e.g. JSON schema).
        Makes LLM outputs reliable and directly usable by code.
        Essential for production applications. Also called "structured outputs".
      fr: >
        Forcer le modèle à répondre dans un format défini (ex : schéma JSON).
        Rend les sorties LLM fiables et directement exploitables par du code.
        Indispensable en production. Aussi appelé "structured outputs".

  # ── LAYER 5 · TOOLING ECOSYSTEM ─────────────

  - id: orch_frameworks
    label:
      en: "Orchestration\nFrameworks"
      fr: "Frameworks\nd'Orchestration"
    layer: 5
    category: tooling
    status: evolving
    since: "2022"
    link: "https://www.langchain.com"
    description:
      en: >
        Libraries that help chain LLM calls, manage memory, and build complex pipelines.
        Handle the plumbing so developers focus on logic.
        Examples: LangChain, LlamaIndex, LangGraph, CrewAI.
      fr: >
        Bibliothèques qui permettent d'enchaîner les appels LLM, gérer la mémoire et construire des pipelines complexes.
        Gèrent la plomberie pour que les développeurs se concentrent sur la logique métier.
        Exemples : LangChain, LlamaIndex, LangGraph, CrewAI.

  - id: ai_coding
    label:
      en: "AI Coding\nAssistants"
      fr: "Assistants de Code IA"
    layer: 5
    category: tooling
    status: evolving
    since: "2021"
    link: "https://www.cursor.com"
    description:
      en: >
        Tools that integrate LLMs directly into the development workflow.
        Generate, explain, refactor code. Dramatically boost developer productivity.
        Examples: Cursor, GitHub Copilot, Claude Code.
      fr: >
        Outils qui intègrent les LLM directement dans le workflow de développement.
        Génèrent, expliquent, refactorisent du code. Boostent considérablement la productivité.
        Exemples : Cursor, GitHub Copilot, Claude Code.

  - id: vector_dbs_tool
    label:
      en: "Vector Databases"
      fr: "Bases Vectorielles"
    layer: 5
    category: tooling
    status: stable
    since: "2021"
    link: "https://www.pinecone.io/learn/vector-database/"
    description:
      en: >
        Databases optimized to store and query embeddings by semantic similarity.
        The storage backbone of RAG pipelines.
        Examples: Pinecone, Chroma, Weaviate, pgvector.
      fr: >
        Bases de données optimisées pour stocker et interroger des embeddings par similarité sémantique.
        L'épine dorsale du stockage dans les pipelines RAG.
        Exemples : Pinecone, Chroma, Weaviate, pgvector.

  - id: eval_obs
    label:
      en: "Eval &\nObservability"
      fr: "Éval &\nObservabilité"
    layer: 5
    category: tooling
    status: evolving
    since: "2023"
    link: "https://www.langchain.com/langsmith"
    description:
      en: >
        Tools to monitor, trace, evaluate and debug LLM applications in production.
        Answer: "Is my app actually working well?"
        Examples: LangSmith, Helicone, Arize, Braintrust.
      fr: >
        Outils pour monitorer, tracer, évaluer et déboguer les applications LLM en production.
        Répondent à la question : "Mon application fonctionne-t-elle vraiment bien ?"
        Exemples : LangSmith, Helicone, Arize, Braintrust.

  - id: model_hubs
    label:
      en: "Model Hubs"
      fr: "Hubs de Modèles"
    layer: 5
    category: tooling
    status: stable
    since: "2018"
    link: "https://huggingface.co/models"
    description:
      en: >
        Platforms to discover, download, share and run open models.
        The "GitHub of AI models". Central to the open-weights ecosystem.
        Examples: HuggingFace, Ollama, Replicate.
      fr: >
        Plateformes pour découvrir, télécharger, partager et faire tourner des modèles ouverts.
        Le "GitHub des modèles IA". Central dans l'écosystème open weights.
        Exemples : HuggingFace, Ollama, Replicate.

