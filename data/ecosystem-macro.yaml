      fr: "Concepts Fondamentaux"
    color: "#F4D03F"
    description:
      en: "Fundamental abstract notions to understand before anything else"
      fr: "Notions abstraites fondamentales à comprendre en premier"

  - id: model_types
    label:
      en: "Model Types"
      fr: "Types de Modèles"
    color: "#C39BD3"
    description:
      en: "The different categories of AI models"
      fr: "Les différentes catégories de modèles IA"

  - id: access
    label:
      en: "Access & Deployment"
      fr: "Accès & Déploiement"
    color: "#85929E"
    description:
      en: "The different ways to access and run a model"
      fr: "Les différentes façons d'accéder à un modèle et de le déployer"

  - id: patterns
    label:
      en: "Architecture Patterns"
      fr: "Patterns d'Architecture"
    color: "#58D68D"
    description:
      en: "Architectural patterns to build AI-powered applications"
      fr: "Patterns architecturaux pour construire des applications IA"

  - id: tooling
    label:
      en: "Developer Tools"
      fr: "Outils Développeurs"
    color: "#5DADE2"
    description:
      en: "Categories of tools developers use to build with LLMs"
      fr: "Catégories d'outils utilisés par les développeurs pour construire avec les LLM"

nodes:
  # ── LAYER 1 · CORE CONCEPTS ─────────────────

  - id: language_model
    label:
      en: "Language Model"
      fr: "Modèle de Langage"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://en.wikipedia.org/wiki/Large_language_model"
    ref: "https://arxiv.org/abs/1706.03762"
    description:
      en: >
        A model trained on massive text datasets to understand and generate human language.
        The foundation of the entire ecosystem. All LLMs are language models,
        but not all language models are LLMs.
      fr: >
        Un modèle entraîné sur d'immenses corpus textuels pour comprendre et générer du langage humain.
        La brique de base de tout l'écosystème. Tous les LLM sont des modèles de langage,
        mais tous les modèles de langage ne sont pas des LLM.

  - id: token_context
    label:
      en: "Token & Context"
      fr: "Token & Contexte"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://platform.openai.com/tokenizer"
    ref: "https://tiktokenizer.vercel.app/"
    description:
      en: >
        A token is the smallest unit of text a model processes (~0.75 words).
        The context window is the maximum number of tokens a model can handle at once.
        These two notions define the model's "working memory".
      fr: >
        Un token est la plus petite unité de texte traitée par un modèle (~0,75 mot).
        La fenêtre de contexte est le nombre maximum de tokens traités en une seule fois.
        Ces deux notions définissent la "mémoire de travail" du modèle.

  - id: embedding_vectors
    label:
      en: "Embedding & Vectors"
      fr: "Embedding & Vecteurs"
    layer: 1
    category: concepts
    status: stable
    since: "2013"
    link: "https://platform.openai.com/docs/guides/embeddings"
    ref: "https://arxiv.org/abs/1301.3666"
    description:
      en: >
        An embedding is a list of numbers (a vector) that represents the meaning of a text.
        Similar texts produce similar vectors. This enables semantic search,
        clustering, and retrieval — the backbone of RAG.
      fr: >
        Un embedding est une liste de nombres (un vecteur) représentant le sens d'un texte.
        Des textes similaires produisent des vecteurs proches. Cela permet la recherche sémantique,
        le clustering et la récupération de documents — colonne vertébrale du RAG.

  - id: training_alignment
    label:
      en: "Training & Alignment"
      fr: "Entraînement & Alignement"
    layer: 1
    category: concepts
    status: stable
    since: "2018"
    link: "https://www.anthropic.com/research/constitutional-ai-harmlessness-from-ai-feedback"
    ref: "https://arxiv.org/abs/1706.03741"
    description:
      en: >
        Training: teaching a model by exposing it to vast amounts of data.
        Alignment: shaping the model's behavior to be helpful, honest and safe
        (via RLHF, Constitutional AI, etc.). Two distinct but essential phases.
      fr: >
        Entraînement : apprendre à un modèle en le exposant à d'immenses quantités de données.
        Alignement : façonner son comportement pour qu'il soit utile, honnête et sûr
        (via RLHF, Constitutional AI, etc.). Deux phases distinctes mais indispensables.

  - id: inference
    label:
      en: "Inference"
      fr: "Inférence"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://huggingface.co/docs/transformers/main/en/pipeline_tutorial"
    description:
      en: >
        Running a trained model to generate a response from an input.
        Every API call, every chat message is an inference.
        Opposite of training — much cheaper and faster.
      fr: >
        Faire tourner un modèle entraîné pour générer une réponse à partir d'une entrée.
        Chaque appel API, chaque message de chat est une inférence.
        Opposé de l'entraînement — beaucoup moins coûteux et plus rapide.

  - id: reasoning_models
    label:
      en: "Reasoning"
      fr: "Raisonnement"
    layer: 1
    category: concepts
    status: emerging
    since: "2024"
    link: "https://openai.com/o3"
    ref: "https://arxiv.org/abs/2201.11903"
    description:
      en: |
        A paradigm shift in how models respond: instead of answering immediately,
        the model thinks step-by-step before giving its final answer (chain-of-thought).
        Significantly better at complex logic, math and coding.
        Not a separate model type — a capability that can apply to proprietary or open source models.
        Examples: o3, DeepSeek-R1, Claude 3.7 extended thinking.
      fr: |
        Un changement de paradigme dans la façon dont les modèles répondent : au lieu de répondre immédiatement,
        le modèle réfléchit étape par étape avant de donner sa réponse finale (chain-of-thought).
        Bien meilleur sur les tâches de logique complexe, de maths et de code.
        Pas un type de modèle à part — une capacité qui s'applique aux modèles propriétaires ou open source.
        Exemples : o3, DeepSeek-R1, Claude 3.7 extended thinking.

  - id: kv_cache
    label:
      en: "KV Cache"
      fr: "Cache KV"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    description:
      en: |
        Key-Value Cache: the optimization that makes LLM inference fast.
        Transformers generate text token by token. At each step, attention needs
        the Key (K) and Value (V) matrices for all previous tokens.
        Without cache: recomputed every step → quadratic cost O(n²).
        With cache: stored and reused → linear cost O(n) per new token.
        The trade-off: KV cache consumes significant VRAM (often more than model weights for long contexts).
        Managed by serving engines like vLLM (paged attention) and llama.cpp.
        Related optimizations: GQA/MQA (reduce cache size 4–8×), prefix caching (reuse system prompt cache).
      fr: |
        Cache clé-valeur : l'optimisation qui rend l'inférence des LLM rapide.
        Les transformers génèrent du texte token par token. À chaque étape, l'attention a besoin
        des matrices Key (K) et Value (V) de tous les tokens précédents.
        Sans cache : recalculé à chaque étape → coût quadratique O(n²).
        Avec cache : stocké et réutilisé → coût linéaire O(n) par nouveau token.
        La contrepartie : le cache KV consomme beaucoup de VRAM (souvent plus que les poids du modèle pour les longs contextes).
        Géré par les moteurs de serving comme vLLM (paged attention) et llama.cpp.
        Optimisations associées : GQA/MQA (réduisent la taille du cache de 4 à 8×), prefix caching (réutilise le cache du system prompt).

  - id: transformer
    label:
      en: "Transformer"
      fr: "Transformer"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://arxiv.org/abs/1706.03762"
    description:
      en: |
        The neural network architecture behind every modern LLM.
        Introduced in "Attention Is All You Need" (Google, 2017).
        Key innovation: self-attention — the model weighs the relevance of every word
        against every other word simultaneously, enabling massive parallel training.
        Before Transformers: RNNs processed text sequentially, couldn't scale.
        After: GPT, BERT, Claude, Gemini, Llama — all Transformers.
      fr: |
        L'architecture de réseau de neurones derrière tous les LLM modernes.
        Introduite dans "Attention Is All You Need" (Google, 2017).
        Innovation clé : l'auto-attention — le modèle pondère simultanément la pertinence
        de chaque mot par rapport à tous les autres, permettant un entraînement massivement parallèle.
        Avant les Transformers : les RNN traitaient le texte séquentiellement, ne passaient pas à l'échelle.
        Après : GPT, BERT, Claude, Gemini, Llama — tous des Transformers.

  - id: multimodality
    label:
      en: "Multimodality"
      fr: "Multimodalité"
    layer: 1
    category: concepts
    status: evolving
    since: "2023"
    link: "https://openai.com/index/gpt-4v-system-card"
    ref: "https://arxiv.org/abs/2309.17421"
    description:
      en: |
        The ability of a model to process and generate multiple types of data:
        text,
        images,
        audio,
        video,
        code.
        Modern frontier models are natively multimodal.
        Expands LLMs far beyond text-only interactions.
      fr: |
        La capacité d'un modèle à traiter et générer plusieurs types de données :
        texte,
        images,
        audio,
        vidéo,
        code.
        Les modèles frontier modernes sont nativement multimodaux.
        Étend les LLM bien au-delà des interactions textuelles.

  - id: quantization
    label:
      en: "Quantization"
      fr: "Quantisation"
    layer: 1
    category: concepts
    status: evolving
    since: "2023"
    link: "https://huggingface.co/docs/optimum/concept_guides/quantization"
    description:
      en: |
        Reducing a model's numerical precision (e.g. FP32 → INT8 or INT4) to shrink its size and memory footprint.
        A 70B model at full precision needs ~140 GB VRAM. At 4-bit quantization: ~35 GB — runnable on a single GPU.
        Trade-off: slight quality loss, major hardware savings.
        Key formats: GGUF (llama.cpp), AWQ, GPTQ, bitsandbytes.
      fr: |
        Réduire la précision numérique d'un modèle (ex. FP32 → INT8 ou INT4) pour diminuer sa taille et son empreinte mémoire.
        Un modèle 70B en pleine précision nécessite ~140 Go de VRAM. En quantisation 4 bits : ~35 Go — exécutable sur un seul GPU.
        Compromis : légère perte de qualité, économies matérielles considérables.
        Formats clés : GGUF (llama.cpp), AWQ, GPTQ, bitsandbytes.

  - id: rlhf
    label:
      en: "RLHF"
      fr: "RLHF"
    layer: 1
    category: concepts
    status: stable
    since: "2022"
    ref: "https://arxiv.org/abs/1706.03741"
    description:
      en: |
        Reinforcement Learning from Human Feedback.
        The technique that transforms a raw pre-trained model into a useful assistant.
        Process: human annotators rank model outputs → a reward model learns those preferences → the LLM is fine-tuned to maximise the reward.
        Used to train ChatGPT, Claude, Gemini. The key step that makes models helpful, honest and safe.
        Variants: RLHF, RLAIF (AI feedback), DPO (simpler, no RL loop).
      fr: |
        Apprentissage par renforcement à partir des retours humains.
        La technique qui transforme un modèle pré-entraîné brut en assistant utile.
        Processus : des annotateurs humains classent les sorties du modèle → un modèle de récompense apprend ces préférences → le LLM est fine-tuné pour maximiser la récompense.
        Utilisé pour entraîner ChatGPT, Claude, Gemini. L'étape clé qui rend les modèles utiles, honnêtes et sûrs.
        Variantes : RLHF, RLAIF (feedback IA), DPO (plus simple, sans boucle RL).

  - id: temperature
    label:
      en: "Temperature"
      fr: "Température"
    layer: 1
    category: concepts
    status: stable
    since: "2017"
    link: "https://platform.openai.com/docs/api-reference/chat/create#chat-create-temperature"
    description:
      en: |
        A parameter (0–2) that controls the randomness of model outputs.
        Low (0): deterministic, always the most probable token — good for code, structured data.
        High (1+): creative and varied — good for brainstorming, writing.
        Related parameters: top_p (nucleus sampling), top_k.
        Set at inference time. Has no effect on the model weights.
      fr: |
        Un paramètre (0–2) qui contrôle le caractère aléatoire des sorties du modèle.
        Bas (0) : déterministe, toujours le token le plus probable — idéal pour le code, les données structurées.
        Élevé (1+) : créatif et varié — idéal pour le brainstorming, l'écriture.
        Paramètres associés : top_p (nucleus sampling), top_k.
        Défini au moment de l'inférence. N'affecte pas les poids du modèle.

  # ── LAYER 2 · MODEL TAXONOMY ─────────────────

  - id: frontier_models
    label:
      en: "Proprietary Models"
      fr: "Modèles Propriétaires"
    layer: 2
    category: model_types
    status: evolving
    since: "2022"
    link: "https://platform.openai.com/docs/models"
    drilldown: "proprietary-models.html"
    description:
      en: |
        Models whose weights are PRIVATE, never downloadable.
        Accessible only via API.
        Developed by well-funded labs (OpenAI, Anthropic, Google).
        Often called "Frontier models" in the industry, referring to their position at the cutting edge of AI capabilities.
      fr: |
        Modèles dont les poids sont PRIVES, jamais téléchargeables.
        Accessibles uniquement via API.
        Développés par des laboratoires a gros budget (OpenAI, Anthropic, Google).
        Souvent appelés "Frontier models" dans l'industrie, en référence à leur position à la pointe des capacités IA.

  - id: open_weights
    label:
      en: "Open Source / Weights Models"
      fr: "Open Source / Weights Models"
    layer: 2
    category: model_types
    status: evolving
    since: "2023"
    link: "https://huggingface.co/models"
    ref: "https://arxiv.org/abs/2407.21783"
    drilldown: "open-weights-models.html"
    description:
      en: |
        Weights are publicly downloadable — you can run, fine-tune and deploy the model yourself.
        Commonly called "open source", though technically more precise to say "open weights":
        training data and full code are usually not published.
        Examples: Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.
      fr: |
        Les poids sont téléchargeables publiquement — vous pouvez exécuter, fine-tuner et déployer le modèle vous-même.
        Souvent appelés "open source" (terme courant), mais plus précisément "open weights" :
        les données d'entraînement et le code complet ne sont généralement pas publiés.
        Exemples : Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.

  # ── LAYER 3 · ACCESS & DEPLOYMENT ───────────

  - id: public_api
    label:
      en: "Public API"
      fr: "API Publique"
    layer: 3
    category: access
    status: stable
    since: "2020"
    link: "https://platform.openai.com/docs/api-reference"
    description:
      en: >
        Send an HTTP request to a provider's endpoint, get a response.
        The simplest way to use a model. Pay per token.
        No infrastructure to manage. Operated by the model creator.
      fr: >
        Envoyer une requête HTTP à l'endpoint d'un fournisseur, recevoir une réponse.
        La façon la plus simple d'utiliser un modèle. Facturation à la consommation (par token).
        Aucune infrastructure à gérer. Opéré par le créateur du modèle.

  - id: cloud_managed
    label:
      en: "Cloud Managed"
      fr: "Cloud Managé"
    layer: 3
    drilldown: "cloud-managed.html"
    category: access
    status: stable
    since: "2023"
    link: "https://aws.amazon.com/bedrock/"
    description:
      en: >
        Access models through a major cloud provider (AWS, GCP, Azure).
        Benefits: enterprise compliance, data privacy, multi-model choice,
        integration with existing cloud infra. Managed by the cloud, not the AI lab.
      fr: >
        Accès aux modèles via un grand fournisseur cloud (AWS, GCP, Azure).
        Avantages : conformité entreprise, confidentialité des données, choix multi-modèles,
        intégration avec l'infra cloud existante. Géré par le cloud, pas par le laboratoire IA.

  - id: self_hosted
    label:
      en: "Self-hosted"
      fr: "Auto-hébergé"
    layer: 3
    category: access
    status: stable
    since: "2023"
    link: "https://docs.vllm.ai/en/latest/"
    description:
      en: >
        Deploy the model on your own GPU servers (on-premise or cloud VMs).
        Full control over data and costs at scale.
        Requires ML infrastructure expertise.
      fr: >
        Déployer le modèle sur ses propres serveurs GPU (on-premise ou VMs cloud).
        Contrôle total sur les données et les coûts à grande échelle.
        Nécessite une expertise en infrastructure ML.

  - id: local_edge
    label:
      en: "Local / Edge"
      fr: "Local / Edge"
    layer: 3
    category: access
    status: evolving
    since: "2023"
    link: "https://ollama.com"
    description:
      en: >
        Run a model on a laptop, phone, or edge device. No internet required.
        Maximum privacy. Enabled by smaller, efficient models and tools like Ollama.
        Growing fast as hardware improves.
      fr: >
        Faire tourner un modèle sur un laptop, téléphone ou dispositif edge. Sans internet.
        Confidentialité maximale. Rendu possible par des modèles plus petits et des outils comme Ollama.
        En forte croissance au fil des avancées matérielles.

  # ── LAYER 4 · ARCHITECTURE PATTERNS ────────────
  # Structure: nested taxonomy of container boxes.
  #   arch_patterns (outer)
  #   ├── ctx_knowledge
  #   │    ├── rag_pattern
  #   │    ├── context_engineering
  #   │    └── memory_pattern
  #   ├── action_tools
  #   │    ├── tool_use_pattern
  #   │    └── mcp_pattern
  #   ├── agentic_systems
  #   │    ├── agents_pattern
  #   │    ├── workflows_pattern
  #   │    ├── multi_agent
  #   │    └── hitl_pattern
  #   └── output_control
  #        ├── structured_gen
  #        ├── guardrails_pattern
  #        └── eval_loop

  - id: arch_patterns
    label:
      en: "Architecture Patterns"
      fr: "Patterns d'Architecture"
    layer: 4
    category: patterns
    container: true
    status: stable
    since: "2023"
    description:
      en: >
        The architectural patterns used to build AI-powered applications.
        Organized in four capability groups: context management, tool connectivity,
        agentic systems, and output control.
      fr: >
        Les patterns architecturaux pour construire des applications IA.
        Organisés en quatre groupes : gestion du contexte, connectivité des outils,
        systèmes agentiques et contrôle des sorties.

  - id: ctx_knowledge
    label:
      en: "Context & Knowledge"
      fr: "Contexte & Connaissance"
    layer: 4
    category: patterns
    container: true
    parent: arch_patterns
    status: stable
    since: "2023"
    description:
      en: >
        Patterns for managing what the model knows and remembers:
        retrieving external data, engineering the context window, and persisting memory.
      fr: >
        Patterns pour gérer ce que le modèle sait et retient :
        récupération de données externes, ingénierie du contexte et persistance de la mémoire.

  - id: action_tools
    label:
      en: "Action & Tools"
      fr: "Action & Outils"
    layer: 4
    category: patterns
    container: true
    parent: arch_patterns
    status: stable
    since: "2023"
    description:
      en: >
        Patterns for connecting LLMs to the outside world:
        calling functions, running code, querying databases, browsing the web.
      fr: >
        Patterns pour connecter les LLM au monde extérieur :
        appel de fonctions, exécution de code, requêtes bases de données, navigation web.

  - id: agentic_systems
    label:
      en: "Agentic Systems"
      fr: "Systèmes Agentiques"
    layer: 4
    category: patterns
    container: true
    parent: arch_patterns
    status: evolving
    since: "2023"
    description:
      en: >
        Patterns for building systems that act autonomously:
        single agents, structured workflows, multi-agent coordination, and human oversight.
      fr: >
        Patterns pour construire des systèmes qui agissent de façon autonome :
        agents simples, workflows structurés, coordination multi-agents et supervision humaine.

  - id: output_control
    label:
      en: "Output & Control"
      fr: "Sorties & Contrôle"
    layer: 4
    category: patterns
    container: true
    parent: arch_patterns
    status: evolving
    since: "2023"
    description:
      en: >
        Patterns for making LLM outputs reliable, safe and measurable:
        structured formats, safety guardrails, and continuous evaluation loops.
      fr: >
        Patterns pour rendre les sorties LLM fiables, sûres et mesurables :
        formats structurés, garde-fous de sécurité et boucles d'évaluation continues.

  # ── ctx_knowledge ──

  - id: rag_pattern
    label:
      en: "RAG"
      fr: "RAG"
    layer: 4
    drilldown: "rag-pattern.html"
    category: patterns
    parent: ctx_knowledge
    status: stable
    since: "2023"
    link: "https://aws.amazon.com/what-is/retrieval-augmented-generation/"
    ref: "https://arxiv.org/abs/2005.11401"
    description:
      en: >
        Retrieval-Augmented Generation. At query time, retrieve relevant documents
        from a knowledge base and inject them into the prompt.
        Solves knowledge cutoff and hallucination on specific data. Very widely adopted.
      fr: >
        Retrieval-Augmented Generation. Au moment de la requête, récupérer les documents pertinents
        depuis une base de connaissances et les injecter dans le prompt.
        Résout les problèmes de date limite de connaissance et d'hallucination. Très largement adopté.

  - id: context_engineering
    label:
      en: "Context Engineering"
      fr: "Ingénierie du Contexte"
    layer: 4
    category: patterns
    parent: ctx_knowledge
    status: evolving
    since: "2024"
    link: "https://www.anthropic.com/engineering/context-windows"
    description:
      en: |
        The deliberate practice of managing what goes into the context window.
        As context windows grow (200K–1M tokens), what you put in — and how — becomes
        a key engineering decision.
        Techniques: prompt compression, few-shot selection, conversation summarisation,
        document chunking strategy, system prompt design.
        Distinct from RAG (retrieval) — context engineering is the broader discipline
        that encompasses how all information is structured and prioritised before the model sees it.
      fr: |
        La pratique délibérée de gérer ce qui entre dans la fenêtre de contexte.
        À mesure que les fenêtres de contexte grandissent (200 K–1 M tokens), ce qu'on y met —
        et comment — devient une décision d'ingénierie centrale.
        Techniques : compression de prompt, sélection few-shot, résumé de conversation,
        stratégie de découpage de documents, conception du system prompt.
        Distinct du RAG (récupération) — l'ingénierie du contexte est la discipline plus large
        qui englobe comment toute l'information est structurée et priorisée avant que le modèle ne la voie.

  - id: memory_pattern
    label:
      en: "Memory"
      fr: "Mémoire"
    layer: 4
    category: patterns
    parent: ctx_knowledge
    status: evolving
    since: "2024"
    link: "https://docs.langchain.com/docs/components/memory"
    description:
      en: |
        The ability of an AI system to retain and retrieve information across interactions.
        Three types:
        - In-context (short-term): information injected directly into the prompt window.
        - External (long-term): stored in a database, retrieved when needed (vector store, key-value).
        - Episodic: structured summaries of past sessions, compressed and re-injected.
        Memory is the key differentiator between a stateless chatbot and a persistent AI agent.
      fr: |
        La capacité d'un système IA à conserver et retrouver des informations entre les interactions.
        Trois types :
        - En contexte (court terme) : informations injectées directement dans la fenêtre de prompt.
        - Externe (long terme) : stockées en base de données, récupérées à la demande (vector store, clé-valeur).
        - Épisodique : résumés structurés de sessions passées, compressés et ré-injectés.
        La mémoire est le différenciateur clé entre un chatbot sans état et un agent IA persistant.

  # ── action_tools ──

  - id: tool_use_pattern
    label:
      en: "Tool Use"
      fr: "Utilisation d'Outils"
    layer: 4
    category: patterns
    parent: action_tools
    status: stable
    since: "2023"
    link: "https://docs.anthropic.com/en/docs/build-with-claude/tool-use/overview"
    description:
      en: |
        The ability for a model to call external functions during generation.
        Also called "function calling" (OpenAI terminology).
        How it works: (1) the model decides it needs a tool, (2) it emits a structured
        request, (3) your application executes the function and returns the result,
        (4) the model continues with that information.
        Examples: web search, database query, run code, send email, call any API.
        The bridge between "the model thinks" and "the model acts".
      fr: |
        La capacité d'un modèle à appeler des fonctions externes pendant la génération.
        Aussi appelé "function calling" (terminologie OpenAI).
        Fonctionnement : (1) le modèle décide qu'il a besoin d'un outil, (2) il émet une
        requête structurée, (3) l'application exécute la fonction et renvoie le résultat,
        (4) le modèle continue avec cette information.
        Exemples : recherche web, base de données, exécution de code, envoi d'email, appel d'API.
        Le pont entre "le modèle réfléchit" et "le modèle agit".

  - id: mcp_pattern
    label:
      en: "MCP"
      fr: "MCP"
    layer: 4
    category: patterns
    parent: action_tools
    status: emerging
    since: "2024"
    link: "https://modelcontextprotocol.io"
    description:
      en: |
        Model Context Protocol. An open standard that defines how AI applications
        connect to external tools and data sources.
        Before MCP: every app needed custom integrations for every tool.
        After MCP: any compliant client talks to any compliant server — like USB-C for AI.
        Backed by Anthropic, adopted by OpenAI, Google, Microsoft and hundreds of community servers.
      fr: |
        Model Context Protocol. Un standard ouvert qui définit comment les applications IA
        se connectent à des outils et sources de données externes.
        Avant MCP : chaque app nécessitait des intégrations sur mesure pour chaque outil.
        Après MCP : tout client compatible parle à tout serveur compatible — comme l'USB-C pour l'IA.
        Porté par Anthropic, adopté par OpenAI, Google, Microsoft et des centaines de serveurs communautaires.

  # ── agentic_systems ──

  - id: agents_pattern
    label:
      en: "AI Agents"
      fr: "Agents IA"
    layer: 4
    drilldown: "ai-agents.html"
    category: patterns
    parent: agentic_systems
    status: evolving
    since: "2023"
    link: "https://www.anthropic.com/research/building-effective-agents"
    ref: "https://arxiv.org/abs/2309.07864"
    description:
      en: >
        Systems where an LLM autonomously plans, calls tools, and iterates
        until a goal is achieved. Shift from "Q&A" to "autonomous task completion".
        The LLM dynamically decides its own next steps — distinct from pre-defined workflows.
        The central paradigm of 2024-2025. Still early in production maturity.
      fr: >
        Systèmes où un LLM planifie de façon autonome, appelle des outils et itère
        jusqu'à atteindre un objectif. Passage du "question-réponse" à l'"exécution autonome de tâches".
        Le LLM décide dynamiquement ses propres prochaines étapes — distinct des workflows prédéfinis.
        Le paradigme central de 2024-2025. Encore en phase d'immaturité en production.

  - id: workflows_pattern
    label:
      en: "Workflows"
      fr: "Workflows"
    layer: 4
    category: patterns
    parent: agentic_systems
    status: stable
    since: "2023"
    link: "https://www.anthropic.com/research/building-effective-agents"
    description:
      en: |
        Structured pipelines where LLMs and tools are orchestrated through predefined code paths.
        Unlike agents: the control flow is deterministic and set by the developer.
        When to use: well-understood tasks, reliability requirements, predictable outputs.
        Examples: document summarisation pipeline, classification → routing → response chains.
        Often the right starting point before reaching for full agentic autonomy.
      fr: |
        Pipelines structurés où les LLM et les outils sont orchestrés via des chemins de code prédéfinis.
        Contrairement aux agents : le flux de contrôle est déterministe et défini par le développeur.
        Quand l'utiliser : tâches bien comprises, exigences de fiabilité, sorties prévisibles.
        Exemples : pipeline de résumé de documents, chaînes classification → routage → réponse.
        Souvent le bon point de départ avant de recourir à l'autonomie agentique complète.

  - id: multi_agent
    label:
      en: "Multi-Agent"
      fr: "Multi-Agent"
    layer: 4
    category: patterns
    parent: agentic_systems
    status: emerging
    since: "2024"
    link: "https://arxiv.org/abs/2601.13671"
    description:
      en: |
        Systems where multiple specialized agents collaborate to solve a task.
        Each agent has a defined role; an orchestrator coordinates handoffs.
        Interaction patterns: chain (sequential), star (hub + specialists), mesh (peer-to-peer).
        Key challenges: trust between agents, prompt injection, coordination overhead.
        Frameworks: AutoGen, CrewAI, LangGraph, MetaGPT.
        The evolution from "one smart agent" to "a team of agents".
      fr: |
        Systèmes où plusieurs agents spécialisés collaborent pour résoudre une tâche.
        Chaque agent a un rôle défini ; un orchestrateur coordonne les transferts.
        Patterns d'interaction : chaîne (séquentiel), étoile (hub + spécialistes), maillage (pair à pair).
        Défis clés : confiance entre agents, injection de prompt, surcharge de coordination.
        Frameworks : AutoGen, CrewAI, LangGraph, MetaGPT.
        L'évolution de "un agent intelligent" vers "une équipe d'agents".

  - id: hitl_pattern
    label:
      en: "Human-in-the-Loop"
      fr: "Humain dans la Boucle"
    layer: 4
    category: patterns
    parent: agentic_systems
    status: evolving
    since: "2023"
    link: "https://www.anthropic.com/research/building-effective-agents"
    description:
      en: |
        A control pattern where a human validates or corrects the agent at key decision points
        before it continues — rather than letting it run fully autonomously.
        When to use: high-stakes actions (send email, run code, delete data),
        low-confidence decisions, compliance requirements.
        The practical answer to the reliability problem of agentic systems.
        Spectrum: fully automated → checkpoint approval → step-by-step review.
      fr: |
        Un pattern de contrôle où un humain valide ou corrige l'agent à des points de décision clés
        avant qu'il continue — plutôt que de le laisser tourner de façon totalement autonome.
        Quand l'utiliser : actions à fort enjeu (envoyer un email, exécuter du code, supprimer des données),
        décisions à faible confiance, exigences de conformité.
        La réponse pratique au problème de fiabilité des systèmes agentiques.
        Spectre : entièrement automatisé → approbation par checkpoint → revue étape par étape.

  # ── output_control ──

  - id: structured_gen
    label:
      en: "Structured Generation"
      fr: "Génération Structurée"
    layer: 4
    category: patterns
    parent: output_control
    status: stable
    since: "2023"
    link: "https://platform.openai.com/docs/guides/structured-outputs"
    ref: "https://arxiv.org/abs/2307.09702"
    description:
      en: >
        Force the model to respond in a defined format (e.g. JSON schema).
        Makes LLM outputs reliable and directly usable by code.
        Essential for production applications. Also called "structured outputs".
      fr: >
        Forcer le modèle à répondre dans un format défini (ex : schéma JSON).
        Rend les sorties LLM fiables et directement exploitables par du code.
        Indispensable en production. Aussi appelé "structured outputs".

  - id: guardrails_pattern
    label:
      en: "Guardrails"
      fr: "Guardrails"
    layer: 4
    category: patterns
    parent: output_control
    status: evolving
    since: "2023"
    link: "https://nvidia.github.io/NeMo-Guardrails/"
    description:
      en: |
        Constraints applied to LLM inputs and outputs to enforce safety, relevance and compliance.
        Input guardrails: detect jailbreaks, off-topic requests, PII.
        Output guardrails: filter harmful content, verify factual claims, enforce format.
        Implemented as: rule-based filters, secondary classifier models, constitutional prompts.
        Frameworks: NeMo Guardrails, Guardrails AI, LlamaGuard.
        The production safety layer between the raw model and the end user.
      fr: |
        Contraintes appliquées aux entrées et sorties LLM pour assurer sécurité, pertinence et conformité.
        Guardrails d'entrée : détecter les jailbreaks, requêtes hors sujet, données personnelles.
        Guardrails de sortie : filtrer le contenu nuisible, vérifier les affirmations factuelles, imposer le format.
        Implémentés via : filtres basés sur des règles, modèles classificateurs secondaires, prompts constitutionnels.
        Frameworks : NeMo Guardrails, Guardrails AI, LlamaGuard.
        La couche de sécurité en production entre le modèle brut et l'utilisateur final.

  - id: eval_loop
    label:
      en: "Evaluation Loop"
      fr: "Boucle d'Évaluation"
    layer: 4
    category: patterns
    parent: output_control
    status: evolving
    since: "2023"
    link: "https://www.langchain.com/langsmith"
    description:
      en: |
        The continuous process of measuring LLM application quality in development and production.
        Why it matters: reliability is the #1 challenge of agentic systems — you can't improve
        what you don't measure.
        Components: test datasets (evals), automated scoring, human review, regression tracking.
        Types: task-specific (did the agent complete the goal?), quality (is the output good?),
        safety (did guardrails hold?).
        Tools: LangSmith, Braintrust, Arize, Helicone, PromptFlow.
      fr: |
        Le processus continu de mesure de la qualité des applications LLM en développement et en production.
        Pourquoi c'est important : la fiabilité est le défi n°1 des systèmes agentiques — on ne peut pas
        améliorer ce qu'on ne mesure pas.
        Composants : jeux de tests (evals), scoring automatisé, revue humaine, suivi des régressions.
        Types : spécifique à la tâche (l'agent a-t-il atteint l'objectif ?), qualité (la sortie est-elle bonne ?),
        sécurité (les guardrails ont-ils tenu ?).
        Outils : LangSmith, Braintrust, Arize, Helicone, PromptFlow.

  # ── LAYER 5 · DEVELOPER TOOLS ───────────────
  # Structure: a nested taxonomy of container boxes.
  #   developer_tools (outer)
  #   ├── agentic_coding_assistants (inner)
  #   │    ├── cli_agents
  #   │    └── ide_agents
  #   ├── coding_copilots
  #   └── monitoring

  - id: developer_tools
    label:
      en: "Developer Tools"
      fr: "Outils Développeurs"
    layer: 5
    category: tooling
    container: true
    status: stable
    since: "2023"
    description:
      en: >
        The tooling layer for developers building with LLMs.
        Organized as a capability taxonomy rather than a vendor inventory.
      fr: >
        La couche d'outillage pour les développeurs qui construisent avec des LLM.
        Organisée comme une taxonomie de capacités, pas comme un inventaire de produits.

  - id: agentic_coding_assistants
    label:
      en: "Agentic Coding Assistants"
      fr: "Assistants de Code Agentiques"
    layer: 5
    category: tooling
    container: true
    parent: developer_tools
    status: evolving
    since: "2024"
    description:
      en: >
        Autonomous coding agents that plan, execute and iterate on tasks
        with minimal human intervention — the evolution beyond reactive copilots.
      fr: >
        Agents de code autonomes qui planifient, exécutent et itèrent sur des tâches
        avec une intervention humaine minimale — l'évolution au-delà des copilots réactifs.

  - id: cli_agents
    label:
      en: "CLI Agents"
      fr: "Agents CLI"
    layer: 5
    category: tooling
    parent: agentic_coding_assistants
    status: evolving
    since: "2024"
    link: "https://docs.anthropic.com/en/docs/claude-code/overview"
    description:
      en: >
        Terminal-based autonomous coding agents: Claude Code, Aider, Codex CLI, OpenCode.
        Operate on entire codebases, run commands, manage files autonomously.
      fr: >
        Agents de code autonomes en ligne de commande : Claude Code, Aider, Codex CLI, OpenCode.
        Opèrent sur des bases de code entières, exécutent des commandes, gèrent les fichiers de façon autonome.

  - id: ide_agents
    label:
      en: "IDE Agents"
      fr: "Agents IDE"
    layer: 5
    category: tooling
    parent: agentic_coding_assistants
    status: evolving
    since: "2024"
    link: "https://www.cursor.com"
    description:
      en: >
        Autonomous coding agents embedded directly in the IDE: Cursor, Windsurf.
        Drive multi-step edits across the workspace from natural-language intent.
      fr: >
        Agents de code autonomes intégrés directement dans l'IDE : Cursor, Windsurf.
        Pilotent des éditions multi-étapes à travers le workspace à partir d'une intention en langage naturel.

  - id: coding_copilots
    label:
      en: "Coding Assistants\n(Copilots)"
      fr: "Assistants de Code\n(Copilots)"
    layer: 5
    category: tooling
    parent: developer_tools
    status: stable
    since: "2021"
    link: "https://github.com/features/copilot"
    description:
      en: >
        Reactive IDE-integrated assistants: GitHub Copilot, Amazon Q Developer, Gemini Code Assist.
        Suggest completions and answer inline — the developer stays in the driver seat.
      fr: >
        Assistants réactifs intégrés à l'IDE : GitHub Copilot, Amazon Q Developer, Gemini Code Assist.
        Proposent des complétions et répondent inline — le développeur reste aux commandes.

  - id: monitoring
    label:
      en: "Monitoring /\nEval & Observability"
      fr: "Monitoring /\nÉval & Observabilité"
    layer: 5
    category: tooling
    parent: developer_tools
    status: evolving
    since: "2023"
    link: "https://www.langchain.com/langsmith"
    description:
      en: >
        Tools to trace, evaluate and debug LLM applications in production:
        LangSmith, Helicone, Arize, Braintrust.
      fr: >
        Outils pour tracer, évaluer et déboguer les applications LLM en production :
        LangSmith, Helicone, Arize, Braintrust.

