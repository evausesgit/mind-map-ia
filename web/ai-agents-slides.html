<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>AI Agents</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>FRAMEWORKS</h2><ul><li>\ud83d\udfe1 <strong>LangGraph</strong> \u2014 LangChain's framework for stateful, multi-step agent workflows.\nModels agent logic as a directed graph: nodes are LLM calls or tools, edges are transitions.\nBuilt-in: persistence (checkpoint state), human-in-the-loop, streaming, time-travel debugging.\nBest for complex workflows that need branching, loops and state management.\nThe production-grade choice for teams already using LangChain..</li><li>\ud83d\udfe1 <strong>CrewAI</strong> \u2014 Role-based multi-agent framework.</li><li>\ud83d\udfe1 <strong>AutoGen / AG2</strong> \u2014 Microsoft Research's multi-agent framework.</li><li>\ud83d\udfe1 <strong>Anthropic Agent SDK</strong> \u2014 Anthropic's official Python SDK for building agents with Claude.\nLightweight by design \u2014 close to the raw API, minimal abstraction.\nBuilt-in tool use, streaming, and MCP client integration.\nClaude Code itself is built on this SDK.\nPhilosophy: explicit > magic.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>AGENT PATTERNS</h2><ul><li>\ud83d\udfe2 <strong>ReAct</strong> \u2014 Reasoning + Acting.</li><li>\ud83d\udfe1 <strong>Plan & Execute</strong> \u2014 Separates planning from execution into two distinct phases.\nPhase 1 (Planner): the LLM creates a complete step-by-step plan upfront.\nPhase 2 (Executor): each step is executed in order, with the plan updated if needed.\nBetter for complex, multi-step tasks where a global view improves efficiency.\nMore predictable than ReAct \u2014 easier to debug and interrupt..</li><li>\ud83d\udfe1 <strong>Multi-Agent</strong> \u2014 Multiple specialized agents working together, each handling a specific sub-task.\nPatterns: Supervisor (one agent routes tasks to specialists), Pipeline (sequential handoffs),\nSwarm (peer-to-peer collaboration between agents).\nWhen to use: task exceeds a single context window, parallelizable sub-tasks,\ndifferent sub-tasks need different tools or model strengths.\nChallenge: inter-agent communication errors compound \u2014 keep interfaces simple..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>BUILDING BLOCKS</h2><ul><li>\ud83d\udfe1 <strong>Planning</strong> \u2014 The agent's ability to break a goal into steps before acting.\nApproaches: direct generation (LLM lists steps), tree-of-thought (explores branches),\nReAct (interleaves reasoning and action), Plan-then-Execute (separate planning and execution phases).\nBetter planning = fewer wasted tool calls = lower cost and higher success rate.\nKey insight (Anthropic): simple, explicit prompts often outperform complex planning frameworks..</li><li>\ud83d\udfe1 <strong>Memory</strong> \u2014 How an agent retains and retrieves information across steps and sessions.\nFour types: in-context (in the prompt, temporary), external (vector DB, persistent),\nepisodic (past interactions, retrieved by similarity), semantic (structured facts/knowledge).\nMemory is often the hardest part of building production agents.\nLarge context windows (200k+) reduce the need for explicit memory management..</li><li>\ud83d\udfe2 <strong>Tool Use</strong> \u2014 The agent's ability to call external functions: web search, database queries, code execution,\nAPI calls, file operations, email/calendar\u2026\nTool use is what transforms a chatbot into an agent \u2014 the ability to ACT, not just respond.\nMCP (Model Context Protocol) standardizes how tools are declared and called across models.\nKey design principle: give the agent the minimum set of tools needed for the task..</li><li>\ud83d\udfe1 <strong>Orchestration</strong> \u2014 Managing the flow of execution: which agent runs when, how agents communicate,\nhandling errors, retries and interruptions.\nSingle-agent: one LLM loops until done.</li></ul>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 LangGraph</h2><p class=\"node-desc\">LangChain's framework for stateful, multi-step agent workflows.<br>Models agent logic as a directed graph: nodes are LLM calls or tools, edges are transitions.<br>Built-in: persistence (checkpoint state), human-in-the-loop, streaming, time-travel debugging.<br>Best for complex workflows that need branching, loops and state management.<br>The production-grade choice for teams already using LangChain.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 CrewAI</h2><p class=\"node-desc\">Role-based multi-agent framework. Define agents with roles, goals and backstories;<br>assign tasks; let agents collaborate as a \"crew\".<br>Intuitive abstraction for non-ML teams: think \"hire a team of AI specialists\".<br>Built-in memory, process management (sequential, hierarchical, parallel).<br>Large community, fast-growing ecosystem. Good for business process automation.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 AutoGen / AG2</h2><p class=\"node-desc\">Microsoft Research's multi-agent framework. Agents communicate via a conversational interface \u2014<br>each agent has a role and responds to messages from other agents.<br>Strong for: code generation + execution loops, research tasks, debate-style reasoning.<br>AG2 is the community fork (post-Microsoft). Supports human-in-the-loop naturally.<br>Best for research prototyping and technical automation tasks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 Anthropic Agent SDK</h2><p class=\"node-desc\">Anthropic's official Python SDK for building agents with Claude.<br>Lightweight by design \u2014 close to the raw API, minimal abstraction.<br>Built-in tool use, streaming, and MCP client integration.<br>Claude Code itself is built on this SDK.<br>Philosophy: explicit > magic. You control the loop, the SDK handles API communication.<br>Best for teams who want full control without framework overhead.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">AGENT PATTERNS</div><h2>\ud83d\udfe2 ReAct</h2><p class=\"node-desc\">Reasoning + Acting. The dominant single-agent pattern.<br>Loop: Thought (LLM reasons about what to do) \u2192 Action (call a tool) \u2192 Observation (tool result) \u2192 repeat.<br>Simple, interpretable, works well for tool-using tasks.<br>Limitation: no long-horizon planning, can get stuck in loops.<br>Used by default in most LangChain and LlamaIndex agent implementations.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AGENT PATTERNS</div><h2>\ud83d\udfe1 Plan & Execute</h2><p class=\"node-desc\">Separates planning from execution into two distinct phases.<br>Phase 1 (Planner): the LLM creates a complete step-by-step plan upfront.<br>Phase 2 (Executor): each step is executed in order, with the plan updated if needed.<br>Better for complex, multi-step tasks where a global view improves efficiency.<br>More predictable than ReAct \u2014 easier to debug and interrupt.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">AGENT PATTERNS</div><h2>\ud83d\udfe1 Multi-Agent</h2><p class=\"node-desc\">Multiple specialized agents working together, each handling a specific sub-task.<br>Patterns: Supervisor (one agent routes tasks to specialists), Pipeline (sequential handoffs),<br>Swarm (peer-to-peer collaboration between agents).<br>When to use: task exceeds a single context window, parallelizable sub-tasks,<br>different sub-tasks need different tools or model strengths.<br>Challenge: inter-agent communication errors compound \u2014 keep interfaces simple.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BUILDING BLOCKS</div><h2>\ud83d\udfe1 Planning</h2><p class=\"node-desc\">The agent's ability to break a goal into steps before acting.<br>Approaches: direct generation (LLM lists steps), tree-of-thought (explores branches),<br>ReAct (interleaves reasoning and action), Plan-then-Execute (separate planning and execution phases).<br>Better planning = fewer wasted tool calls = lower cost and higher success rate.<br>Key insight (Anthropic): simple, explicit prompts often outperform complex planning frameworks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BUILDING BLOCKS</div><h2>\ud83d\udfe1 Memory</h2><p class=\"node-desc\">How an agent retains and retrieves information across steps and sessions.<br>Four types: in-context (in the prompt, temporary), external (vector DB, persistent),<br>episodic (past interactions, retrieved by similarity), semantic (structured facts/knowledge).<br>Memory is often the hardest part of building production agents.<br>Large context windows (200k+) reduce the need for explicit memory management.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BUILDING BLOCKS</div><h2>\ud83d\udfe2 Tool Use</h2><p class=\"node-desc\">The agent's ability to call external functions: web search, database queries, code execution,<br>API calls, file operations, email/calendar\u2026<br>Tool use is what transforms a chatbot into an agent \u2014 the ability to ACT, not just respond.<br>MCP (Model Context Protocol) standardizes how tools are declared and called across models.<br>Key design principle: give the agent the minimum set of tools needed for the task.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">BUILDING BLOCKS</div><h2>\ud83d\udfe1 Orchestration</h2><p class=\"node-desc\">Managing the flow of execution: which agent runs when, how agents communicate,<br>handling errors, retries and interruptions.<br>Single-agent: one LLM loops until done. Multi-agent: specialized sub-agents<br>handle different parts of a task, orchestrated by a supervisor agent.<br>Human-in-the-loop: checkpoints where a human approves before the agent continues.<br>The more autonomous the agent, the more critical robust orchestration becomes.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">11 concepts</p><p class=\"stat\">3 layers</p><p class=\"generated-from\">AI Agents</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Agents IA</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>FRAMEWORKS</h2><ul><li>\ud83d\udfe1 <strong>LangGraph</strong> \u2014 Le framework de LangChain pour les workflows d'agents avec \u00e9tat et multi-\u00e9tapes.\nMod\u00e9lise la logique d'agent comme un graphe dirig\u00e9 : les n\u0153uds sont des appels LLM ou outils, les ar\u00eates sont des transitions.\nInt\u00e9gr\u00e9 : persistance (\u00e9tat checkpoint), human-in-the-loop, streaming, d\u00e9bogage time-travel.\nId\u00e9al pour les workflows complexes n\u00e9cessitant des branchements, boucles et gestion d'\u00e9tat..</li><li>\ud83d\udfe1 <strong>CrewAI</strong> \u2014 Framework multi-agents bas\u00e9 sur les r\u00f4les.</li><li>\ud83d\udfe1 <strong>AutoGen / AG2</strong> \u2014 Le framework multi-agents de Microsoft Research.</li><li>\ud83d\udfe1 <strong>SDK Agents Anthropic</strong> \u2014 Le SDK Python officiel d'Anthropic pour construire des agents avec Claude.\nL\u00e9ger par conception \u2014 proche de l'API brute, abstraction minimale.\nUtilisation d'outils, streaming et int\u00e9gration client MCP int\u00e9gr\u00e9s.\nClaude Code lui-m\u00eame est construit sur ce SDK.\nPhilosophie : explicite > magie.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>PATTERNS D'AGENTS</h2><ul><li>\ud83d\udfe2 <strong>ReAct</strong> \u2014 Reasoning + Acting.</li><li>\ud83d\udfe1 <strong>Plan & Execute</strong> \u2014 S\u00e9pare la planification de l'ex\u00e9cution en deux phases distinctes.\nPhase 1 (Planificateur) : le LLM cr\u00e9e un plan complet \u00e9tape par \u00e9tape \u00e0 l'avance.\nPhase 2 (Ex\u00e9cuteur) : chaque \u00e9tape est ex\u00e9cut\u00e9e dans l'ordre, le plan \u00e9tant mis \u00e0 jour si n\u00e9cessaire.\nMeilleur pour les t\u00e2ches complexes multi-\u00e9tapes o\u00f9 une vue globale am\u00e9liore l'efficacit\u00e9.\nPlus pr\u00e9visible que ReAct \u2014 plus facile \u00e0 d\u00e9boguer et \u00e0 interrompre..</li><li>\ud83d\udfe1 <strong>Multi-Agent</strong> \u2014 Plusieurs agents sp\u00e9cialis\u00e9s travaillant ensemble, chacun g\u00e9rant une sous-t\u00e2che sp\u00e9cifique.\nPatterns : Supervisor (un agent route les t\u00e2ches vers des sp\u00e9cialistes), Pipeline (transferts s\u00e9quentiels),\nSwarm (collaboration peer-to-peer entre agents).\nQuand l'utiliser : t\u00e2che d\u00e9passe une fen\u00eatre de contexte, sous-t\u00e2ches parall\u00e9lisables,\ndiff\u00e9rentes sous-t\u00e2ches n\u00e9cessitent diff\u00e9rents outils ou forces de mod\u00e8les..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>BRIQUES FONDAMENTALES</h2><ul><li>\ud83d\udfe1 <strong>Planification</strong> \u2014 La capacit\u00e9 de l'agent \u00e0 d\u00e9composer un objectif en \u00e9tapes avant d'agir.\nApproches : g\u00e9n\u00e9ration directe (le LLM liste les \u00e9tapes), tree-of-thought (exploration de branches),\nReAct (raisonnement et action entrelac\u00e9s), Plan-then-Execute (phases de planification et d'ex\u00e9cution s\u00e9par\u00e9es).\nMeilleure planification = moins d'appels d'outils inutiles = co\u00fbt r\u00e9duit et taux de succ\u00e8s plus \u00e9lev\u00e9..</li><li>\ud83d\udfe1 <strong>M\u00e9moire</strong> \u2014 Comment un agent retient et r\u00e9cup\u00e8re des informations entre les \u00e9tapes et les sessions.\nQuatre types : in-context (dans le prompt, temporaire), externe (DB vectorielle, persistant),\n\u00e9pisodique (interactions pass\u00e9es, r\u00e9cup\u00e9r\u00e9es par similarit\u00e9), s\u00e9mantique (faits/connaissances structur\u00e9s).\nLa m\u00e9moire est souvent la partie la plus difficile des agents en production..</li><li>\ud83d\udfe2 <strong>Utilisation d'Outils</strong> \u2014 La capacit\u00e9 de l'agent \u00e0 appeler des fonctions externes : recherche web, requ\u00eates DB, ex\u00e9cution de code,\nappels API, op\u00e9rations fichiers, email/calendrier\u2026\nL'utilisation d'outils transforme un chatbot en agent \u2014 la capacit\u00e9 d'AGIR, pas seulement de r\u00e9pondre.\nMCP (Model Context Protocol) standardise comment les outils sont d\u00e9clar\u00e9s et appel\u00e9s.\nPrincipe de conception cl\u00e9 : donner \u00e0 l'agent le minimum d'outils n\u00e9cessaires pour la t\u00e2che..</li><li>\ud83d\udfe1 <strong>Orchestration</strong> \u2014 G\u00e9rer le flux d'ex\u00e9cution : quel agent tourne quand, comment les agents communiquent,\ngestion des erreurs, reprises et interruptions.\nMono-agent : un LLM boucle jusqu'\u00e0 la fin.</li></ul>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 LangGraph</h2><p class=\"node-desc\">Le framework de LangChain pour les workflows d'agents avec \u00e9tat et multi-\u00e9tapes.<br>Mod\u00e9lise la logique d'agent comme un graphe dirig\u00e9 : les n\u0153uds sont des appels LLM ou outils, les ar\u00eates sont des transitions.<br>Int\u00e9gr\u00e9 : persistance (\u00e9tat checkpoint), human-in-the-loop, streaming, d\u00e9bogage time-travel.<br>Id\u00e9al pour les workflows complexes n\u00e9cessitant des branchements, boucles et gestion d'\u00e9tat.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 CrewAI</h2><p class=\"node-desc\">Framework multi-agents bas\u00e9 sur les r\u00f4les. D\u00e9finissez des agents avec des r\u00f4les, objectifs et historiques ;<br>assignez des t\u00e2ches ; laissez les agents collaborer comme une \"\u00e9quipe\".<br>Abstraction intuitive pour les \u00e9quipes non-ML : pensez \"embaucher une \u00e9quipe de sp\u00e9cialistes IA\".<br>M\u00e9moire int\u00e9gr\u00e9e, gestion de processus (s\u00e9quentiel, hi\u00e9rarchique, parall\u00e8le).</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 AutoGen / AG2</h2><p class=\"node-desc\">Le framework multi-agents de Microsoft Research. Les agents communiquent via une interface conversationnelle \u2014<br>chaque agent a un r\u00f4le et r\u00e9pond aux messages des autres agents.<br>Solide pour : boucles de g\u00e9n\u00e9ration + ex\u00e9cution de code, t\u00e2ches de recherche, raisonnement par d\u00e9bat.<br>AG2 est le fork communautaire (post-Microsoft). Supporte le human-in-the-loop naturellement.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FRAMEWORKS</div><h2>\ud83d\udfe1 SDK Agents Anthropic</h2><p class=\"node-desc\">Le SDK Python officiel d'Anthropic pour construire des agents avec Claude.<br>L\u00e9ger par conception \u2014 proche de l'API brute, abstraction minimale.<br>Utilisation d'outils, streaming et int\u00e9gration client MCP int\u00e9gr\u00e9s.<br>Claude Code lui-m\u00eame est construit sur ce SDK.<br>Philosophie : explicite > magie. Vous contr\u00f4lez la boucle, le SDK g\u00e8re la communication API.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PATTERNS D'AGENTS</div><h2>\ud83d\udfe2 ReAct</h2><p class=\"node-desc\">Reasoning + Acting. Le pattern mono-agent dominant.<br>Boucle : Thought (le LLM raisonne sur quoi faire) \u2192 Action (appel d'outil) \u2192 Observation (r\u00e9sultat) \u2192 r\u00e9p\u00e9ter.<br>Simple, interpr\u00e9table, fonctionne bien pour les t\u00e2ches utilisant des outils.<br>Limitation : pas de planification \u00e0 long horizon, peut se bloquer en boucles.<br>Utilis\u00e9 par d\u00e9faut dans la plupart des impl\u00e9mentations d'agents LangChain et LlamaIndex.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'AGENTS</div><h2>\ud83d\udfe1 Plan & Execute</h2><p class=\"node-desc\">S\u00e9pare la planification de l'ex\u00e9cution en deux phases distinctes.<br>Phase 1 (Planificateur) : le LLM cr\u00e9e un plan complet \u00e9tape par \u00e9tape \u00e0 l'avance.<br>Phase 2 (Ex\u00e9cuteur) : chaque \u00e9tape est ex\u00e9cut\u00e9e dans l'ordre, le plan \u00e9tant mis \u00e0 jour si n\u00e9cessaire.<br>Meilleur pour les t\u00e2ches complexes multi-\u00e9tapes o\u00f9 une vue globale am\u00e9liore l'efficacit\u00e9.<br>Plus pr\u00e9visible que ReAct \u2014 plus facile \u00e0 d\u00e9boguer et \u00e0 interrompre.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PATTERNS D'AGENTS</div><h2>\ud83d\udfe1 Multi-Agent</h2><p class=\"node-desc\">Plusieurs agents sp\u00e9cialis\u00e9s travaillant ensemble, chacun g\u00e9rant une sous-t\u00e2che sp\u00e9cifique.<br>Patterns : Supervisor (un agent route les t\u00e2ches vers des sp\u00e9cialistes), Pipeline (transferts s\u00e9quentiels),<br>Swarm (collaboration peer-to-peer entre agents).<br>Quand l'utiliser : t\u00e2che d\u00e9passe une fen\u00eatre de contexte, sous-t\u00e2ches parall\u00e9lisables,<br>diff\u00e9rentes sous-t\u00e2ches n\u00e9cessitent diff\u00e9rents outils ou forces de mod\u00e8les.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BRIQUES FONDAMENTALES</div><h2>\ud83d\udfe1 Planification</h2><p class=\"node-desc\">La capacit\u00e9 de l'agent \u00e0 d\u00e9composer un objectif en \u00e9tapes avant d'agir.<br>Approches : g\u00e9n\u00e9ration directe (le LLM liste les \u00e9tapes), tree-of-thought (exploration de branches),<br>ReAct (raisonnement et action entrelac\u00e9s), Plan-then-Execute (phases de planification et d'ex\u00e9cution s\u00e9par\u00e9es).<br>Meilleure planification = moins d'appels d'outils inutiles = co\u00fbt r\u00e9duit et taux de succ\u00e8s plus \u00e9lev\u00e9.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BRIQUES FONDAMENTALES</div><h2>\ud83d\udfe1 M\u00e9moire</h2><p class=\"node-desc\">Comment un agent retient et r\u00e9cup\u00e8re des informations entre les \u00e9tapes et les sessions.<br>Quatre types : in-context (dans le prompt, temporaire), externe (DB vectorielle, persistant),<br>\u00e9pisodique (interactions pass\u00e9es, r\u00e9cup\u00e9r\u00e9es par similarit\u00e9), s\u00e9mantique (faits/connaissances structur\u00e9s).<br>La m\u00e9moire est souvent la partie la plus difficile des agents en production.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">BRIQUES FONDAMENTALES</div><h2>\ud83d\udfe2 Utilisation d'Outils</h2><p class=\"node-desc\">La capacit\u00e9 de l'agent \u00e0 appeler des fonctions externes : recherche web, requ\u00eates DB, ex\u00e9cution de code,<br>appels API, op\u00e9rations fichiers, email/calendrier\u2026<br>L'utilisation d'outils transforme un chatbot en agent \u2014 la capacit\u00e9 d'AGIR, pas seulement de r\u00e9pondre.<br>MCP (Model Context Protocol) standardise comment les outils sont d\u00e9clar\u00e9s et appel\u00e9s.<br>Principe de conception cl\u00e9 : donner \u00e0 l'agent le minimum d'outils n\u00e9cessaires pour la t\u00e2che.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">BRIQUES FONDAMENTALES</div><h2>\ud83d\udfe1 Orchestration</h2><p class=\"node-desc\">G\u00e9rer le flux d'ex\u00e9cution : quel agent tourne quand, comment les agents communiquent,<br>gestion des erreurs, reprises et interruptions.<br>Mono-agent : un LLM boucle jusqu'\u00e0 la fin. Multi-agents : des sous-agents sp\u00e9cialis\u00e9s<br>g\u00e8rent diff\u00e9rentes parties d'une t\u00e2che, orchestr\u00e9s par un agent superviseur.<br>Human-in-the-loop : points de contr\u00f4le o\u00f9 un humain approuve avant que l'agent continue.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">11 concepts</p><p class=\"stat\">3 couches</p><p class=\"generated-from\">Agents IA</p></div></div>"] };
let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
