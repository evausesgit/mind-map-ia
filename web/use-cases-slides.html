<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>AI Use Cases</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 4</div><h2>KEY STACK</h2><ul><li>\ud83d\udfe2 <strong>LLM</strong> \u2014 The large language model at the core of every use case.\nChoice depends on latency, cost, capability, and data privacy requirements.\nExamples: GPT-4o, Claude 3.5/4, Gemini 2.0, Llama 3.3 (self-hosted)..</li><li>\ud83d\udfe2 <strong>Vector DB</strong> \u2014 Stores and indexes document embeddings for fast semantic search.\nReturns top-k most similar chunks for a given query vector.\nExamples: Pinecone, Weaviate, Qdrant, pgvector, ChromaDB..</li><li>\ud83d\udfe1 <strong>Tools / MCP</strong> \u2014 Executable functions the LLM can call: APIs, file system, databases, code runner.\nMCP (Model Context Protocol) is the emerging standard for tool connectivity.\nThe agent loop depends on tools to take real-world actions..</li><li>\ud83d\udfe1 <strong>Memory / State</strong> \u2014 Persistence layer for conversation history, user preferences, and intermediate agent state.\nTypes: in-context (in the prompt), external (DB/vector store), cached (KV cache).\nCritical for multi-turn conversations and long-running agent tasks..</li><li>\ud83d\udfe1 <strong>Orchestrator</strong> \u2014 The coordination layer that routes tasks between agents, manages retry logic,\ntracks state, and enforces guardrails in a multi-agent system.\nExamples: LangGraph, CrewAI, AutoGen, custom state machines..</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>AI PATTERNS</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation: retrieve relevant chunks from a knowledge base\nand inject them into the LLM's context window before generation.\nGrounds the answer in verifiable source documents.\n\u2192 See the RAG pattern map for full detail..</li><li>\ud83d\udfe2 <strong>Completion / Inline</strong> \u2014 The simplest pattern: send a prompt (file context, cursor position, instructions)\nto an LLM and return the generated text directly as a suggestion.\nNo retrieval, no tools \u2014 pure next-token prediction in a rich context.\nLatency is the key constraint: must feel instantaneous to the developer..</li><li>\ud83d\udfe1 <strong>Agent Loop</strong> \u2014 The LLM is the brain of a loop: observe \u2192 think \u2192 act \u2192 observe.\nEach iteration the model reasons about its state, decides on a tool call,\nreceives the result, and decides the next step \u2014 until the goal is reached.\n\u2192 See the AI Agents map for full detail..</li><li>\ud83d\udd35 <strong>Multi-Agent</strong> \u2014 Multiple specialized agents collaborate: an orchestrator decomposes a task\nand dispatches subtasks to worker agents, then aggregates results.\nEnables parallelism, specialization, and fault isolation.\nKey challenge: coordination overhead and error propagation between agents..</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>USE CASES</h2><ul><li>\ud83d\udfe2 <strong>Chat LLM (ChatGPT-like)</strong> \u2014 A user asks questions in natural language; the system retrieves relevant context\nfrom a knowledge base and generates a grounded answer.\nExamples: customer support bot, internal FAQ assistant, product documentation search.\n\u2192 Click to read full article..</li><li>\ud83d\udfe2 <strong>Conversational Assistant</strong> \u2014 A multi-turn dialogue system that maintains conversation history and persona.\nUnlike pure Q&A, it can handle ambiguous intent, ask clarifying questions,\nand maintain context across sessions via memory.\nExamples: sales assistant, onboarding guide, personal productivity agent..</li><li>\ud83d\udfe2 <strong>Code Completion</strong> \u2014 Inline code suggestions as the developer types, powered by the surrounding file context.\nRanges from single-line autocomplete to full function generation.\nExamples: GitHub Copilot inline suggestions, JetBrains AI completions, Tabnine.\nKey metric: acceptance rate (% of suggestions accepted by the dev)..</li><li>\ud83d\udfe1 <strong>Agentic Coding</strong> \u2014 An AI agent that can read files, run tests, search docs, and make multi-step code changes\nwith minimal human intervention.</li><li>\ud83d\udfe2 <strong>Knowledge Search</strong> \u2014 An analyst queries a private corpus (internal reports, contracts, emails, wikis)\nin natural language and gets cited, traceable answers \u2014 not just search results.\nExamples: legal contract review, compliance Q&A, financial research assistant.\n\u2192 Click to read full article..</li><li>\ud83d\udfe1 <strong>Report Generation</strong> \u2014 The AI gathers data from multiple sources (databases, APIs, documents), synthesizes it,\nand drafts a structured report.</li><li>\ud83d\udfe1 <strong>Workflow Automation</strong> \u2014 An agent orchestrates a multi-step process end-to-end: reads triggers, calls APIs,\nmakes decisions, handles exceptions, and notifies stakeholders.\nExamples: automated PR review pipeline, incident triage, data pipeline orchestration.\n\u2192 Click to read full article..</li><li>\ud83d\udd35 <strong>Anomaly Detection</strong> \u2014 The AI continuously monitors logs, metrics, or streams and surfaces anomalies\nin natural language, with root cause hypothesis and suggested remediation.\nExamples: log analysis, security threat detection, performance regression alerts.\nKey challenge: low false-positive rate \u2014 alert fatigue kills adoption..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>PERSONAS</h2><ul><li>\ud83d\udfe2 <strong>End User</strong> \u2014 A non-technical user interacting with an AI-powered product.\nTypical contexts: customer support chat, internal helpdesk,\nconsumer apps (ChatGPT, Gemini, Claude.ai).\nGoals: get answers fast, without learning any tooling..</li><li>\ud83d\udfe2 <strong>Developer</strong> \u2014 A software engineer using AI to write, debug, review, and ship code faster.\nTypical contexts: VS Code + Copilot, Cursor, Claude Code, JetBrains AI Assistant.\nGoals: reduce boilerplate, catch bugs earlier, offload context-switching..</li><li>\ud83d\udfe2 <strong>Business Analyst</strong> \u2014 A knowledge worker querying internal documents, policies, or data to produce insights.\nTypical contexts: enterprise knowledge bases, legal/compliance review, financial research.\nGoals: find the right answer in a large corpus without reading everything manually..</li><li>\ud83d\udfe1 <strong>Ops / SRE</strong> \u2014 An operations engineer automating workflows, monitoring infrastructure,\nor orchestrating multi-step processes with autonomous agents.\nTypical contexts: CI/CD pipelines, incident response, data pipelines, reporting automation.\nGoals: reduce manual toil, trigger the right action at the right time..</li></ul>", "<div class=\"slide-node-layer\">KEY STACK</div><h2>\ud83d\udfe2 LLM</h2><p class=\"node-desc\">The large language model at the core of every use case.<br>Choice depends on latency, cost, capability, and data privacy requirements.<br>Examples: GPT-4o, Claude 3.5/4, Gemini 2.0, Llama 3.3 (self-hosted).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY STACK</div><h2>\ud83d\udfe2 Vector DB</h2><p class=\"node-desc\">Stores and indexes document embeddings for fast semantic search.<br>Returns top-k most similar chunks for a given query vector.<br>Examples: Pinecone, Weaviate, Qdrant, pgvector, ChromaDB.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY STACK</div><h2>\ud83d\udfe1 Tools / MCP</h2><p class=\"node-desc\">Executable functions the LLM can call: APIs, file system, databases, code runner.<br>MCP (Model Context Protocol) is the emerging standard for tool connectivity.<br>The agent loop depends on tools to take real-world actions.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">KEY STACK</div><h2>\ud83d\udfe1 Memory / State</h2><p class=\"node-desc\">Persistence layer for conversation history, user preferences, and intermediate agent state.<br>Types: in-context (in the prompt), external (DB/vector store), cached (KV cache).<br>Critical for multi-turn conversations and long-running agent tasks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">KEY STACK</div><h2>\ud83d\udfe1 Orchestrator</h2><p class=\"node-desc\">The coordination layer that routes tasks between agents, manages retry logic,<br>tracks state, and enforces guardrails in a multi-agent system.<br>Examples: LangGraph, CrewAI, AutoGen, custom state machines.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">AI PATTERNS</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation: retrieve relevant chunks from a knowledge base<br>and inject them into the LLM's context window before generation.<br>Grounds the answer in verifiable source documents.<br>\u2192 See the RAG pattern map for full detail.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PATTERNS</div><h2>\ud83d\udfe2 Completion / Inline</h2><p class=\"node-desc\">The simplest pattern: send a prompt (file context, cursor position, instructions)<br>to an LLM and return the generated text directly as a suggestion.<br>No retrieval, no tools \u2014 pure next-token prediction in a rich context.<br>Latency is the key constraint: must feel instantaneous to the developer.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PATTERNS</div><h2>\ud83d\udfe1 Agent Loop</h2><p class=\"node-desc\">The LLM is the brain of a loop: observe \u2192 think \u2192 act \u2192 observe.<br>Each iteration the model reasons about its state, decides on a tool call,<br>receives the result, and decides the next step \u2014 until the goal is reached.<br>\u2192 See the AI Agents map for full detail.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">AI PATTERNS</div><h2>\ud83d\udd35 Multi-Agent</h2><p class=\"node-desc\">Multiple specialized agents collaborate: an orchestrator decomposes a task<br>and dispatches subtasks to worker agents, then aggregates results.<br>Enables parallelism, specialization, and fault isolation.<br>Key challenge: coordination overhead and error propagation between agents.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe2 Chat LLM (ChatGPT-like)</h2><p class=\"node-desc\">A user asks questions in natural language; the system retrieves relevant context<br>from a knowledge base and generates a grounded answer.<br>Examples: customer support bot, internal FAQ assistant, product documentation search.<br>\u2192 Click to read full article.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe2 Conversational Assistant</h2><p class=\"node-desc\">A multi-turn dialogue system that maintains conversation history and persona.<br>Unlike pure Q&A, it can handle ambiguous intent, ask clarifying questions,<br>and maintain context across sessions via memory.<br>Examples: sales assistant, onboarding guide, personal productivity agent.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe2 Code Completion</h2><p class=\"node-desc\">Inline code suggestions as the developer types, powered by the surrounding file context.<br>Ranges from single-line autocomplete to full function generation.<br>Examples: GitHub Copilot inline suggestions, JetBrains AI completions, Tabnine.<br>Key metric: acceptance rate (% of suggestions accepted by the dev).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe1 Agentic Coding</h2><p class=\"node-desc\">An AI agent that can read files, run tests, search docs, and make multi-step code changes<br>with minimal human intervention. Goes beyond autocomplete \u2014 the agent plans and executes.<br>Examples: Cursor Agent, Claude Code, Devin, GitHub Copilot Workspace.<br>\u2192 Click to read full article.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe2 Knowledge Search</h2><p class=\"node-desc\">An analyst queries a private corpus (internal reports, contracts, emails, wikis)<br>in natural language and gets cited, traceable answers \u2014 not just search results.<br>Examples: legal contract review, compliance Q&A, financial research assistant.<br>\u2192 Click to read full article.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe1 Report Generation</h2><p class=\"node-desc\">The AI gathers data from multiple sources (databases, APIs, documents), synthesizes it,<br>and drafts a structured report. Can include charts via code execution.<br>Examples: weekly business review, competitive intelligence digest, financial summary.<br>Key challenge: ensuring factual accuracy across multiple heterogeneous sources.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udfe1 Workflow Automation</h2><p class=\"node-desc\">An agent orchestrates a multi-step process end-to-end: reads triggers, calls APIs,<br>makes decisions, handles exceptions, and notifies stakeholders.<br>Examples: automated PR review pipeline, incident triage, data pipeline orchestration.<br>\u2192 Click to read full article.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">USE CASES</div><h2>\ud83d\udd35 Anomaly Detection</h2><p class=\"node-desc\">The AI continuously monitors logs, metrics, or streams and surfaces anomalies<br>in natural language, with root cause hypothesis and suggested remediation.<br>Examples: log analysis, security threat detection, performance regression alerts.<br>Key challenge: low false-positive rate \u2014 alert fatigue kills adoption.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">PERSONAS</div><h2>\ud83d\udfe2 End User</h2><p class=\"node-desc\">A non-technical user interacting with an AI-powered product.<br>Typical contexts: customer support chat, internal helpdesk,<br>consumer apps (ChatGPT, Gemini, Claude.ai).<br>Goals: get answers fast, without learning any tooling.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PERSONAS</div><h2>\ud83d\udfe2 Developer</h2><p class=\"node-desc\">A software engineer using AI to write, debug, review, and ship code faster.<br>Typical contexts: VS Code + Copilot, Cursor, Claude Code, JetBrains AI Assistant.<br>Goals: reduce boilerplate, catch bugs earlier, offload context-switching.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PERSONAS</div><h2>\ud83d\udfe2 Business Analyst</h2><p class=\"node-desc\">A knowledge worker querying internal documents, policies, or data to produce insights.<br>Typical contexts: enterprise knowledge bases, legal/compliance review, financial research.<br>Goals: find the right answer in a large corpus without reading everything manually.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PERSONAS</div><h2>\ud83d\udfe1 Ops / SRE</h2><p class=\"node-desc\">An operations engineer automating workflows, monitoring infrastructure,<br>or orchestrating multi-step processes with autonomous agents.<br>Typical contexts: CI/CD pipelines, incident response, data pipelines, reporting automation.<br>Goals: reduce manual toil, trigger the right action at the right time.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">21 concepts</p><p class=\"stat\">4 layers</p><p class=\"generated-from\">AI Use Cases</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Cas d'Usage IA</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 4</div><h2>STACK CL\u00c9</h2><ul><li>\ud83d\udfe2 <strong>LLM</strong> \u2014 Le grand mod\u00e8le de langage au c\u0153ur de chaque cas d'usage.\nLe choix d\u00e9pend de la latence, du co\u00fbt, de la capacit\u00e9 et des exigences de confidentialit\u00e9.\nExemples : GPT-4o, Claude 3.5/4, Gemini 2.0, Llama 3.3 (auto-h\u00e9berg\u00e9)..</li><li>\ud83d\udfe2 <strong>Vector DB</strong> \u2014 Stocke et indexe les embeddings de documents pour la recherche s\u00e9mantique rapide.\nRetourne les top-k chunks les plus similaires pour un vecteur de requ\u00eate donn\u00e9.\nExemples : Pinecone, Weaviate, Qdrant, pgvector, ChromaDB..</li><li>\ud83d\udfe1 <strong>Outils / MCP</strong> \u2014 Fonctions ex\u00e9cutables que le LLM peut appeler : APIs, syst\u00e8me de fichiers, BDD, ex\u00e9cuteur de code.\nMCP (Model Context Protocol) est le standard \u00e9mergent pour la connectivit\u00e9 des outils.\nLa boucle agent d\u00e9pend des outils pour effectuer des actions dans le monde r\u00e9el..</li><li>\ud83d\udfe1 <strong>M\u00e9moire / \u00c9tat</strong> \u2014 Couche de persistance pour l'historique de conversation, les pr\u00e9f\u00e9rences utilisateur et l'\u00e9tat interm\u00e9diaire de l'agent.\nTypes : en contexte (dans le prompt), externe (BDD/vector store), cach\u00e9 (KV cache).\nCritique pour les conversations multi-tours et les t\u00e2ches d'agents longues..</li><li>\ud83d\udfe1 <strong>Orchestrateur</strong> \u2014 La couche de coordination qui route les t\u00e2ches entre agents, g\u00e8re la logique de retry,\nsuit l'\u00e9tat et applique les guardrails dans un syst\u00e8me multi-agent.\nExemples : LangGraph, CrewAI, AutoGen, machines \u00e0 \u00e9tats personnalis\u00e9es..</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>PATTERNS IA</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation : r\u00e9cup\u00e9rer les chunks pertinents d'une base de connaissance\net les injecter dans la fen\u00eatre de contexte du LLM avant la g\u00e9n\u00e9ration.\nAncre la r\u00e9ponse dans des documents sources v\u00e9rifiables.\n\u2192 Voir la carte du pattern RAG pour le d\u00e9tail complet..</li><li>\ud83d\udfe2 <strong>Compl\u00e9tion / Inline</strong> \u2014 Le pattern le plus simple : envoyer un prompt (contexte du fichier, position du curseur,\ninstructions) au LLM et retourner le texte g\u00e9n\u00e9r\u00e9 directement comme suggestion.\nPas de r\u00e9cup\u00e9ration, pas d'outils \u2014 pr\u00e9diction de token pur dans un contexte riche.\nLa latence est la contrainte cl\u00e9 : doit sembler instantan\u00e9 pour le d\u00e9veloppeur..</li><li>\ud83d\udfe1 <strong>Boucle Agent</strong> \u2014 Le LLM est le cerveau d'une boucle : observer \u2192 r\u00e9fl\u00e9chir \u2192 agir \u2192 observer.\n\u00c0 chaque it\u00e9ration, le mod\u00e8le raisonne sur son \u00e9tat, d\u00e9cide d'un appel d'outil,\nre\u00e7oit le r\u00e9sultat, et d\u00e9cide l'\u00e9tape suivante \u2014 jusqu'\u00e0 atteindre le but.\n\u2192 Voir la carte AI Agents pour le d\u00e9tail complet..</li><li>\ud83d\udd35 <strong>Multi-Agent</strong> \u2014 Plusieurs agents sp\u00e9cialis\u00e9s collaborent : un orchestrateur d\u00e9compose une t\u00e2che\net dispatche les sous-t\u00e2ches \u00e0 des agents travailleurs, puis agr\u00e8ge les r\u00e9sultats.\nPermet le parall\u00e9lisme, la sp\u00e9cialisation et l'isolation des erreurs.\nD\u00e9fi cl\u00e9 : overhead de coordination et propagation des erreurs entre agents..</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>CAS D'USAGE</h2><ul><li>\ud83d\udfe2 <strong>Chat LLM (type ChatGPT)</strong> \u2014 Un utilisateur pose des questions en langage naturel ; le syst\u00e8me r\u00e9cup\u00e8re le contexte\npertinent depuis une base de connaissance et g\u00e9n\u00e8re une r\u00e9ponse ancr\u00e9e.\nExemples : bot support client, assistant FAQ interne, recherche dans la documentation produit.\n\u2192 Cliquer pour lire l'article complet..</li><li>\ud83d\udfe2 <strong>Assistant Conversationnel</strong> \u2014 Un syst\u00e8me de dialogue multi-tours qui maintient l'historique et la persona.\nContrairement au Q&A pur, il g\u00e8re l'intention ambigu\u00eb, pose des questions de clarification,\net maintient le contexte entre sessions via la m\u00e9moire.\nExemples : assistant commercial, guide d'onboarding, agent de productivit\u00e9 personnelle..</li><li>\ud83d\udfe2 <strong>Compl\u00e9tion de Code</strong> \u2014 Suggestions de code inline pendant que le d\u00e9veloppeur tape, aliment\u00e9es par le contexte du fichier.\nVa de l'autocompl\u00e9tion ligne par ligne \u00e0 la g\u00e9n\u00e9ration de fonctions enti\u00e8res.\nExemples : suggestions inline GitHub Copilot, compl\u00e9tions JetBrains AI, Tabnine.\nM\u00e9trique cl\u00e9 : taux d'acceptation (% de suggestions accept\u00e9es par le dev)..</li><li>\ud83d\udfe1 <strong>Coding Agentique</strong> \u2014 Un agent IA capable de lire des fichiers, ex\u00e9cuter des tests, chercher dans les docs,\net effectuer des modifications de code multi-\u00e9tapes avec peu d'intervention humaine.\nVa bien au-del\u00e0 de l'autocompl\u00e9tion \u2014 l'agent planifie et ex\u00e9cute.\nExemples : Cursor Agent, Claude Code, Devin, GitHub Copilot Workspace.\n\u2192 Cliquer pour lire l'article complet..</li><li>\ud83d\udfe2 <strong>Recherche dans la Connaissance</strong> \u2014 Un analyste interroge un corpus priv\u00e9 (rapports internes, contrats, emails, wikis)\nen langage naturel et obtient des r\u00e9ponses cit\u00e9es et tra\u00e7ables \u2014 pas juste des r\u00e9sultats de recherche.\nExemples : revue de contrats l\u00e9gaux, Q&A conformit\u00e9, assistant de recherche financi\u00e8re.\n\u2192 Cliquer pour lire l'article complet..</li><li>\ud83d\udfe1 <strong>G\u00e9n\u00e9ration de Rapports</strong> \u2014 L'IA collecte des donn\u00e9es depuis plusieurs sources (bases de donn\u00e9es, APIs, documents),\nles synth\u00e9tise et r\u00e9dige un rapport structur\u00e9.</li><li>\ud83d\udfe1 <strong>Automatisation de Workflows</strong> \u2014 Un agent orchestre un processus multi-\u00e9tapes de bout en bout : lit les d\u00e9clencheurs,\nappelle des APIs, prend des d\u00e9cisions, g\u00e8re les exceptions, notifie les parties prenantes.\nExemples : pipeline de revue PR automatis\u00e9e, triage d'incidents, orchestration de pipeline data.\n\u2192 Cliquer pour lire l'article complet..</li><li>\ud83d\udd35 <strong>D\u00e9tection d'Anomalies</strong> \u2014 L'IA surveille en continu des logs, m\u00e9triques ou flux et remonte les anomalies\nen langage naturel, avec hypoth\u00e8se de cause racine et rem\u00e9diation sugg\u00e9r\u00e9e.\nExemples : analyse de logs, d\u00e9tection de menaces s\u00e9curit\u00e9, alertes de r\u00e9gression perf.\nD\u00e9fi cl\u00e9 : faible taux de faux positifs \u2014 la fatigue aux alertes tue l'adoption..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>PERSONAS</h2><ul><li>\ud83d\udfe2 <strong>Utilisateur Final</strong> \u2014 Un utilisateur non technique interagissant avec un produit IA.\nContextes typiques : chat support client, helpdesk interne,\napps grand public (ChatGPT, Gemini, Claude.ai).\nObjectif : obtenir des r\u00e9ponses rapidement, sans apprendre d'outils..</li><li>\ud83d\udfe2 <strong>D\u00e9veloppeur</strong> \u2014 Un ing\u00e9nieur logiciel utilisant l'IA pour coder, d\u00e9boguer, relire et livrer plus vite.\nContextes typiques : VS Code + Copilot, Cursor, Claude Code, JetBrains AI Assistant.\nObjectif : r\u00e9duire le boilerplate, d\u00e9tecter les bugs plus t\u00f4t, r\u00e9duire les interruptions..</li><li>\ud83d\udfe2 <strong>Analyste M\u00e9tier</strong> \u2014 Un travailleur du savoir interrogeant des documents internes, politiques ou donn\u00e9es pour produire des insights.\nContextes typiques : bases de connaissance entreprise, revue l\u00e9gale/conformit\u00e9, recherche financi\u00e8re.\nObjectif : trouver la bonne r\u00e9ponse dans un grand corpus sans tout lire manuellement..</li><li>\ud83d\udfe1 <strong>Ops / SRE</strong> \u2014 Un ing\u00e9nieur ops automatisant des workflows, surveillant l'infrastructure,\nou orchestrant des processus multi-\u00e9tapes avec des agents autonomes.\nContextes typiques : pipelines CI/CD, r\u00e9ponse aux incidents, pipelines data, automatisation de rapports.\nObjectif : r\u00e9duire les t\u00e2ches manuelles, d\u00e9clencher la bonne action au bon moment..</li></ul>", "<div class=\"slide-node-layer\">STACK CL\u00c9</div><h2>\ud83d\udfe2 LLM</h2><p class=\"node-desc\">Le grand mod\u00e8le de langage au c\u0153ur de chaque cas d'usage.<br>Le choix d\u00e9pend de la latence, du co\u00fbt, de la capacit\u00e9 et des exigences de confidentialit\u00e9.<br>Exemples : GPT-4o, Claude 3.5/4, Gemini 2.0, Llama 3.3 (auto-h\u00e9berg\u00e9).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">STACK CL\u00c9</div><h2>\ud83d\udfe2 Vector DB</h2><p class=\"node-desc\">Stocke et indexe les embeddings de documents pour la recherche s\u00e9mantique rapide.<br>Retourne les top-k chunks les plus similaires pour un vecteur de requ\u00eate donn\u00e9.<br>Exemples : Pinecone, Weaviate, Qdrant, pgvector, ChromaDB.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">STACK CL\u00c9</div><h2>\ud83d\udfe1 Outils / MCP</h2><p class=\"node-desc\">Fonctions ex\u00e9cutables que le LLM peut appeler : APIs, syst\u00e8me de fichiers, BDD, ex\u00e9cuteur de code.<br>MCP (Model Context Protocol) est le standard \u00e9mergent pour la connectivit\u00e9 des outils.<br>La boucle agent d\u00e9pend des outils pour effectuer des actions dans le monde r\u00e9el.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">STACK CL\u00c9</div><h2>\ud83d\udfe1 M\u00e9moire / \u00c9tat</h2><p class=\"node-desc\">Couche de persistance pour l'historique de conversation, les pr\u00e9f\u00e9rences utilisateur et l'\u00e9tat interm\u00e9diaire de l'agent.<br>Types : en contexte (dans le prompt), externe (BDD/vector store), cach\u00e9 (KV cache).<br>Critique pour les conversations multi-tours et les t\u00e2ches d'agents longues.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">STACK CL\u00c9</div><h2>\ud83d\udfe1 Orchestrateur</h2><p class=\"node-desc\">La couche de coordination qui route les t\u00e2ches entre agents, g\u00e8re la logique de retry,<br>suit l'\u00e9tat et applique les guardrails dans un syst\u00e8me multi-agent.<br>Exemples : LangGraph, CrewAI, AutoGen, machines \u00e0 \u00e9tats personnalis\u00e9es.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PATTERNS IA</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation : r\u00e9cup\u00e9rer les chunks pertinents d'une base de connaissance<br>et les injecter dans la fen\u00eatre de contexte du LLM avant la g\u00e9n\u00e9ration.<br>Ancre la r\u00e9ponse dans des documents sources v\u00e9rifiables.<br>\u2192 Voir la carte du pattern RAG pour le d\u00e9tail complet.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS IA</div><h2>\ud83d\udfe2 Compl\u00e9tion / Inline</h2><p class=\"node-desc\">Le pattern le plus simple : envoyer un prompt (contexte du fichier, position du curseur,<br>instructions) au LLM et retourner le texte g\u00e9n\u00e9r\u00e9 directement comme suggestion.<br>Pa let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];

  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;

function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
