<style>
  * { box-sizing:border-box; margin:0; padding:0 }

  #slide h1 { font-size:2.4em; color:#1a237e; margin-bottom:16px }

  .slide-type-title { display:flex; align-items:center; justify-content:center; text-align:center; height:100% }
  .slide-title-content { display:flex; flex-direction:column; gap:12px }

  li { font-size:.9em; color:#333; line-height:1.4 }
  li strong { color:#1a237e }

  .slide-status { position:absolute; bottom:20px; right:28px; font-size:.72em; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:10px; border:1.5px solid }
  .status-stable { color:#2e7d32; border-color:#2e7d32 }
  .status-evolving { color:#e65100; border-color:#e65100 }
  .status-emerging { color:#1565c0; border-color:#1565c0 }
  .status-deprecated { color:#b71c1c; border-color:#b71c1c }
  .stat { font-size:1.4em; font-weight:700; color:#3949ab }

  .nav-btn { background:#3949ab; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:1em; cursor:pointer; transition:background .15s }

  #counter { color:#aaa; font-size:.9em; min-width:80px; text-align:center }
  #progress { position:absolute; bottom:0; left:0; height:3px; background:#3949ab; transition:width .3s; border-radius:0 0 0 12px }

  .lang-btn { background:none; border:1px solid #555; border-radius:4px; color:#aaa; padding:4px 10px; font-size:12px; cursor:pointer }

</style>

<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>The LLM Ecosystem Today</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 5</div><h2>LAYER 5 \u00b7 DEVELOPER TOOLS</h2><ul><li>\ud83d\udfe2 <strong>LangChain</strong> \u2014 Most popular framework for building LLM applications.</li><li>\ud83d\udfe1 <strong>LangGraph</strong> \u2014 Graph-based orchestration for multi-agent and stateful LLM workflows.</li><li>\ud83d\udfe2 <strong>LlamaIndex</strong> \u2014 Framework focused on data ingestion and RAG pipelines.</li><li>\ud83d\udfe1 <strong>Cursor</strong> \u2014 AI-first code editor (fork of VS Code).</li><li>\ud83d\udfe2 <strong>GitHub Copilot</strong> \u2014 AI pair programmer by GitHub/Microsoft.</li><li>\ud83d\udfe1 <strong>Claude Code</strong> \u2014 Anthropic's agentic CLI tool.</li></ul>", "<div class=\"slide-layer-num\">Layer 4</div><h2>LAYER 4 \u00b7 BUILDING BLOCKS</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation.</li><li>\ud83d\udfe2 <strong>Vector Database</strong> \u2014 Database optimized for storing and querying embeddings by semantic similarity.</li><li>\ud83d\udfe1 <strong>Agent</strong> \u2014 An LLM that can take actions autonomously: call tools, browse the web, write and run code, make decisions in a loop.</li><li>\ud83d\udfe2 <strong>Tool Use / Function Calling</strong> \u2014 Allows an LLM to call external functions or APIs during generation.</li><li>\ud83d\udfe2 <strong>Structured Output</strong> \u2014 Forces the model to respond in a defined format (JSON schema).</li><li>\ud83d\udfe2 <strong>System Prompt</strong> \u2014 Instructions given to the model before the conversation starts.</li><li>\ud83d\udfe1 <strong>Memory</strong> \u2014 Mechanisms to persist information across conversations or steps.</li><li>\ud83d\udd35 <strong>MCP</strong> \u2014 Model Context Protocol.</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</h2><ul><li>\ud83d\udfe2 <strong>LLM API</strong> \u2014 Standard HTTP/REST interface to interact with a model.</li><li>\ud83d\udfe2 <strong>AWS Bedrock</strong> \u2014 AWS managed service to access multiple LLMs (Claude, Llama, Mistral...) via a unified API.</li><li>\ud83d\udfe2 <strong>Google Vertex AI</strong> \u2014 Google Cloud managed platform for AI model deployment and serving.</li><li>\ud83d\udfe2 <strong>Azure OpenAI</strong> \u2014 Microsoft Azure's managed deployment of OpenAI models.</li><li>\ud83d\udfe2 <strong>HuggingFace</strong> \u2014 The central hub for open-source models, datasets and ML tooling.</li><li>\ud83d\udfe1 <strong>Ollama</strong> \u2014 Run LLMs locally on your own machine.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>LAYER 2 \u00b7 PROVIDERS & MODELS</h2><ul><li>\ud83d\udfe2 <strong>OpenAI</strong> \u2014 American AI company, founded 2015.</li><li>\ud83d\udfe2 <strong>Anthropic</strong> \u2014 AI safety company founded by ex-OpenAI researchers (Dario & Daniela Amodei).</li><li>\ud83d\udfe2 <strong>Google DeepMind</strong> \u2014 Merger of Google Brain and DeepMind (2023).</li><li>\ud83d\udfe1 <strong>xAI</strong> \u2014 AI company founded by Elon Musk in 2023.</li><li>\ud83d\udfe2 <strong>Meta</strong> \u2014 Meta AI (Facebook parent).</li><li>\ud83d\udfe2 <strong>Mistral AI</strong> \u2014 French AI startup founded in 2023 by ex-Google and ex-Meta researchers.</li><li>\ud83d\udfe1 <strong>DeepSeek AI</strong> \u2014 Chinese AI research lab.</li><li>\ud83d\udfe2 <strong>Alibaba</strong> \u2014 Chinese tech giant.</li><li>\ud83d\udfe2 <strong>Microsoft</strong> \u2014 Creator of the Phi small model family.</li><li>\ud83d\udfe2 <strong>GPT-4o</strong> \u2014 OpenAI's flagship multimodal model.</li><li>\ud83d\udfe1 <strong>o3 / o4-mini</strong> \u2014 OpenAI's reasoning-focused model family.</li><li>\ud83d\udfe1 <strong>Claude 3.5 / 3.7</strong> \u2014 Anthropic's model family.</li><li>\ud83d\udfe1 <strong>Gemini 2.0</strong> \u2014 Google's multimodal model family.</li><li>\ud83d\udfe1 <strong>Grok 3</strong> \u2014 xAI's flagship model.</li><li>\ud83d\udfe1 <strong>Llama 3.x</strong> \u2014 Meta's open-weights model family.</li><li>\ud83d\udfe2 <strong>Mistral / Mixtral</strong> \u2014 Efficient open-weights models from Mistral AI.</li><li>\ud83d\udfe1 <strong>DeepSeek V3 / R1</strong> \u2014 Chinese open-weights models rivaling proprietary models at low cost.</li><li>\ud83d\udfe1 <strong>Qwen 2.5</strong> \u2014 Alibaba's open-weights model family.</li><li>\ud83d\udfe2 <strong>Gemma 2</strong> \u2014 Google's open-weights model family.</li><li>\ud83d\udfe1 <strong>Phi-4</strong> \u2014 Microsoft's small but powerful open-weights model (14B parameters).</li><li>\ud83d\udfe2 <strong>text-embedding-3</strong> \u2014 OpenAI's embedding model family.</li><li>\ud83d\udfe2 <strong>Voyage-3</strong> \u2014 Voyage AI's embedding model.</li><li>\ud83d\udfe2 <strong>nomic-embed</strong> \u2014 Open-source embedding model by Nomic AI.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>LAYER 1 \u00b7 FOUNDATIONS</h2><ul><li>\ud83d\udfe2 <strong>Transformer</strong> \u2014 Neural network architecture behind all modern LLMs.</li><li>\ud83d\udfe2 <strong>Token</strong> \u2014 The basic unit of text processed by an LLM.</li><li>\ud83d\udfe1 <strong>Context Window</strong> \u2014 Maximum number of tokens a model can process at once (input + output).</li><li>\ud83d\udfe2 <strong>Embedding</strong> \u2014 Numerical vector (list of floats) representing text in semantic space.</li><li>\ud83d\udfe2 <strong>Prompt</strong> \u2014 The input text sent to a model to elicit a response.</li><li>\ud83d\udfe2 <strong>Inference</strong> \u2014 The process of running a trained model to generate output from an input.</li><li>\ud83d\udfe2 <strong>KV Cache</strong> \u2014 Key-Value Cache: optimization that stores intermediate attention computations (Key and Value matrices) during token generation so they don't need to be recomputed for every new token.</li><li>\ud83d\udfe2 <strong>Quantization</strong> \u2014 Compression technique that reduces the numerical precision of model weights from FP32/BF16 to lower formats (INT8, FP8, INT4).</li><li>\ud83d\udfe2 <strong>Temperature</strong> \u2014 Parameter controlling output randomness.</li><li>\ud83d\udfe2 <strong>Pre-training</strong> \u2014 Initial phase where a model learns from massive text datasets (terabytes).</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 Additional training on a specific dataset to specialize model behavior.</li><li>\ud83d\udfe2 <strong>RLHF</strong> \u2014 Reinforcement Learning from Human Feedback.</li></ul>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe2 LangChain</h2><p class=\"node-desc\">Most popular framework for building LLM applications. Provides chains, retrievers, memory and agent primitives. Large ecosystem but sometimes criticized for over-abstraction.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe1 LangGraph</h2><p class=\"node-desc\">Graph-based orchestration for multi-agent and stateful LLM workflows. Built on LangChain. Nodes = steps, Edges = transitions. Better control flow than simple chains.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe2 LlamaIndex</h2><p class=\"node-desc\">Framework focused on data ingestion and RAG pipelines. Great for document Q&A applications. Simpler than LangChain for pure retrieval use cases.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe1 Cursor</h2><p class=\"node-desc\">AI-first code editor (fork of VS Code). Deep LLM integration: code generation, explanation, refactoring, codebase Q&A. Uses GPT-4o and Claude under the hood.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe2 GitHub Copilot</h2><p class=\"node-desc\">AI pair programmer by GitHub/Microsoft. Integrates in VS Code, JetBrains, Neovim and more. Suggests code completions and has a chat mode.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 DEVELOPER TOOLS</div><h2>\ud83d\udfe1 Claude Code</h2><p class=\"node-desc\">Anthropic's agentic CLI tool. Runs in the terminal. Can read, write, and execute code across an entire codebase autonomously. Uses MCP for tool integrations.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation. Augments LLM responses with relevant external documents fetched at runtime. Solves the knowledge cutoff problem. Avoids hallucinations on specific data.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe2 Vector Database</h2><p class=\"node-desc\">Database optimized for storing and querying embeddings by semantic similarity. Examples: Pinecone, Weaviate, Chroma, pgvector. Core component of RAG pipelines.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe1 Agent</h2><p class=\"node-desc\">An LLM that can take actions autonomously: call tools, browse the web, write and run code, make decisions in a loop. Key shift: from Q&A to autonomous task completion.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe2 Tool Use / Function Calling</h2><p class=\"node-desc\">Allows an LLM to call external functions or APIs during generation. Example: search the web, query a DB, send an email. The model decides when and how to call the tool.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe2 Structured Output</h2><p class=\"node-desc\">Forces the model to respond in a defined format (JSON schema). Essential for reliable integration in applications. Eliminates parsing errors from free-form text responses.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe2 System Prompt</h2><p class=\"node-desc\">Instructions given to the model before the conversation starts. Defines persona, rules, tone, constraints and context. Hidden from end users. Controls model behavior globally.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udfe1 Memory</h2><p class=\"node-desc\">Mechanisms to persist information across conversations or steps. Short-term: conversation history in context window. Long-term: summaries or facts stored in a vector DB or key-value store.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BUILDING BLOCKS</div><h2>\ud83d\udd35 MCP</h2><p class=\"node-desc\">Model Context Protocol. Open standard by Anthropic (Nov 2024). Standardizes how LLMs connect to external tools and data sources. Like USB-C for AI: one protocol, many integrations.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe2 LLM API</h2><p class=\"node-desc\">Standard HTTP/REST interface to interact with a model. Send a prompt in the request, get a completion in the response. Common pattern across all providers (OpenAI, Anthropic, Google...).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe2 AWS Bedrock</h2><p class=\"node-desc\">AWS managed service to access multiple LLMs (Claude, Llama, Mistral...) via a unified API. No GPU management. Pay per token. Enterprise-grade security and compliance.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe2 Google Vertex AI</h2><p class=\"node-desc\">Google Cloud managed platform for AI model deployment and serving. Hosts Gemini natively. Also supports fine-tuning and MLOps pipelines.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe2 Azure OpenAI</h2><p class=\"node-desc\">Microsoft Azure's managed deployment of OpenAI models. Preferred for enterprise: data privacy, compliance (SOC2, HIPAA), SLAs.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe2 HuggingFace</h2><p class=\"node-desc\">The central hub for open-source models, datasets and ML tooling. Hosts 500K+ models. Provides Inference API and Spaces for demos. The \"GitHub of AI models\".</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACCESS</div><h2>\ud83d\udfe1 Ollama</h2><p class=\"node-desc\">Run LLMs locally on your own machine. Simple CLI and REST API. Supports Llama, Mistral, DeepSeek, Qwen and many more. No internet required. Free. Privacy-preserving.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 OpenAI</h2><p class=\"node-desc\">American AI company, founded 2015. Originally non-profit, now capped-profit. Creator of GPT and o-series models. Behind ChatGPT. Backed by Microsoft.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Anthropic</h2><p class=\"node-desc\">AI safety company founded by ex-OpenAI researchers (Dario & Daniela Amodei). Creator of Claude. Focus on safe and interpretable AI. Backed by Google & Amazon.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Google DeepMind</h2><p class=\"node-desc\">Merger of Google Brain and DeepMind (2023). Creator of Gemini (proprietary) and Gemma (open weights). Integrated into Google Cloud via Vertex AI.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 xAI</h2><p class=\"node-desc\">AI company founded by Elon Musk in 2023. Creator of the Grok model family. Integrated with the X (Twitter) platform.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Meta</h2><p class=\"node-desc\">Meta AI (Facebook parent). Creator of the Llama open-weights model family. Strong open-source commitment: models freely downloadable and fine-tunable.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Mistral AI</h2><p class=\"node-desc\">French AI startup founded in 2023 by ex-Google and ex-Meta researchers. Known for efficient open-weights models and a European alternative to US labs.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 DeepSeek AI</h2><p class=\"node-desc\">Chinese AI research lab. Released powerful open-weights models at very low cost. DeepSeek-R1 disrupted the market in Jan 2025 by matching GPT-o1 performance.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Alibaba</h2><p class=\"node-desc\">Chinese tech giant. Creator of the Qwen open-weights model family via DAMO Academy. Models available on HuggingFace and integrated in Alibaba Cloud.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Microsoft</h2><p class=\"node-desc\">Creator of the Phi small model family. Major OpenAI investor and partner. Deploys OpenAI models via Azure OpenAI Service.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 GPT-4o</h2><p class=\"node-desc\">OpenAI's flagship multimodal model. Processes text, images and audio natively. \"o\" = omni. Powers ChatGPT. Available via API.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 o3 / o4-mini</h2><p class=\"node-desc\">OpenAI's reasoning-focused model family. Thinks step-by-step internally before answering (chain-of-thought). Best for complex math, coding, logic tasks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Claude 3.5 / 3.7</h2><p class=\"node-desc\">Anthropic's model family. Known for instruction-following and safety. Claude 3.7 Sonnet introduces extended thinking (visible reasoning). Sonnet = balanced. Haiku = fast/cheap. Opus = most powerful.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Gemini 2.0</h2><p class=\"node-desc\">Google's multimodal model family. Native tool use, code execution. Gemini 2.0 Flash: 1M token context window. Strong at long documents.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Grok 3</h2><p class=\"node-desc\">xAI's flagship model. Trained on X (Twitter) data. Grok 3 features a \"Think\" reasoning mode similar to o3 and DeepSeek-R1.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Llama 3.x</h2><p class=\"node-desc\">Meta's open-weights model family. Free to download, run and fine-tune. Available in multiple sizes (8B, 70B, 405B parameters). Foundation of many community fine-tunes and products.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Mistral / Mixtral</h2><p class=\"node-desc\">Efficient open-weights models from Mistral AI. Mixtral uses MoE (Mixture of Experts) architecture for better performance/cost.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 DeepSeek V3 / R1</h2><p class=\"node-desc\">Chinese open-weights models rivaling proprietary models at low cost. DeepSeek-R1 is a reasoning model (like o3) but fully open weights. Caused significant market disruption in early 2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Qwen 2.5</h2><p class=\"node-desc\">Alibaba's open-weights model family. Strong multilingual and coding performance. Qwen2.5-Coder is specialized for code generation.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Gemma 2</h2><p class=\"node-desc\">Google's open-weights model family. Lightweight (2B, 9B, 27B parameters). Optimized to run locally on laptops and phones. Strong instruction-following.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe1 Phi-4</h2><p class=\"node-desc\">Microsoft's small but powerful open-weights model (14B parameters). Outperforms much larger models on reasoning tasks. Great for local use.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 text-embedding-3</h2><p class=\"node-desc\">OpenAI's embedding model family. Converts text to dense vectors. text-embedding-3-small (fast/cheap) and text-embedding-3-large (high quality). Used in RAG pipelines to index and search documents.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 Voyage-3</h2><p class=\"node-desc\">Voyage AI's embedding model. Best-in-class retrieval performance. Specialized versions: voyage-code-3 (code), voyage-finance-2 (finance).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 PROVIDERS & MODELS</div><h2>\ud83d\udfe2 nomic-embed</h2><p class=\"node-desc\">Open-source embedding model by Nomic AI. Can run locally via Ollama. Good balance of performance and privacy (no data sent to external APIs).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Transformer</h2><p class=\"node-desc\">Neural network architecture behind all modern LLMs. Introduced in \"Attention Is All You Need\" (Google, 2017). Uses self-attention to process sequences in parallel.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Token</h2><p class=\"node-desc\">The basic unit of text processed by an LLM. 1 token \u2248 0.75 words in English. Models are billed and limited by token count.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe1 Context Window</h2><p class=\"node-desc\">Maximum number of tokens a model can process at once (input + output). GPT-4: 128K. Claude 3.7: 200K. Gemini 2.0: 1M. Larger = more expensive but can handle bigger documents.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Embedding</h2><p class=\"node-desc\">Numerical vector (list of floats) representing text in semantic space. Similar meaning \u2192 similar vectors. Used for search, RAG, clustering.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Prompt</h2><p class=\"node-desc\">The input text sent to a model to elicit a response. Quality of the prompt directly determines quality of the output.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Inference</h2><p class=\"node-desc\">The process of running a trained model to generate output from an input. Opposite of training. Happens every time you query a model.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 KV Cache</h2><p class=\"node-desc\">Key-Value Cache: optimization that stores intermediate attention computations (Key and Value matrices) during token generation so they don't need to be recomputed for every new token. Without it: cost grows quadratically with sequence length. With it: each new token only requires computing attention for itself. Critical for inference latency and throughput \u2014 but consumes significant VRAM. Managed by serving engines like vLLM (paged attention) and llama.cpp.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Quantization</h2><p class=\"node-desc\">Compression technique that reduces the numerical precision of model weights from FP32/BF16 to lower formats (INT8, FP8, INT4). Cuts memory footprint 2\u20138\u00d7, speeds up inference, minimal quality loss. Enables large models to run on consumer hardware. Common formats: INT8 (good balance), INT4 (used by llama.cpp/GGUF), FP8 (newer, H100 GPUs, used by vLLM). Can also be applied to the KV cache.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Temperature</h2><p class=\"node-desc\">Parameter controlling output randomness. 0 = deterministic (same input \u2192 same output). 1+ = creative and varied. Tune based on use case.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Pre-training</h2><p class=\"node-desc\">Initial phase where a model learns from massive text datasets (terabytes). Builds general language understanding. Very expensive (millions of $).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">Additional training on a specific dataset to specialize model behavior. Cheaper than pre-training. Used to adapt a base model to a domain or task.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FOUNDATIONS</div><h2>\ud83d\udfe2 RLHF</h2><p class=\"node-desc\">Reinforcement Learning from Human Feedback. Technique to align LLM outputs with human preferences. Used in ChatGPT, Claude, Gemini to make models helpful and safe.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">55 concepts</p><p class=\"stat\">5 layers</p><p class=\"generated-from\">The LLM Ecosystem Today</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>L'\u00c9cosyst\u00e8me LLM Aujourd'hui</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 5</div><h2>LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</h2><ul><li>\ud83d\udfe2 <strong>LangChain</strong> \u2014 Most popular framework for building LLM applications.</li><li>\ud83d\udfe1 <strong>LangGraph</strong> \u2014 Graph-based orchestration for multi-agent and stateful LLM workflows.</li><li>\ud83d\udfe2 <strong>LlamaIndex</strong> \u2014 Framework focused on data ingestion and RAG pipelines.</li><li>\ud83d\udfe1 <strong>Cursor</strong> \u2014 AI-first code editor (fork of VS Code).</li><li>\ud83d\udfe2 <strong>GitHub Copilot</strong> \u2014 AI pair programmer by GitHub/Microsoft.</li><li>\ud83d\udfe1 <strong>Claude Code</strong> \u2014 Anthropic's agentic CLI tool.</li></ul>", "<div class=\"slide-layer-num\">Layer 4</div><h2>LAYER 4 \u00b7 BRIQUES APPLICATIVES</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation.</li><li>\ud83d\udfe2 <strong>Vector Database</strong> \u2014 Database optimized for storing and querying embeddings by semantic similarity.</li><li>\ud83d\udfe1 <strong>Agent</strong> \u2014 An LLM that can take actions autonomously: call tools, browse the web, write and run code, make decisions in a loop.</li><li>\ud83d\udfe2 <strong>Tool Use / Function Calling</strong> \u2014 Allows an LLM to call external functions or APIs during generation.</li><li>\ud83d\udfe2 <strong>Structured Output</strong> \u2014 Forces the model to respond in a defined format (JSON schema).</li><li>\ud83d\udfe2 <strong>System Prompt</strong> \u2014 Instructions given to the model before the conversation starts.</li><li>\ud83d\udfe1 <strong>Memory</strong> \u2014 Mechanisms to persist information across conversations or steps.</li><li>\ud83d\udd35 <strong>MCP</strong> \u2014 Model Context Protocol.</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</h2><ul><li>\ud83d\udfe2 <strong>LLM API</strong> \u2014 Standard HTTP/REST interface to interact with a model.</li><li>\ud83d\udfe2 <strong>AWS Bedrock</strong> \u2014 AWS managed service to access multiple LLMs (Claude, Llama, Mistral...) via a unified API.</li><li>\ud83d\udfe2 <strong>Google Vertex AI</strong> \u2014 Google Cloud managed platform for AI model deployment and serving.</li><li>\ud83d\udfe2 <strong>Azure OpenAI</strong> \u2014 Microsoft Azure's managed deployment of OpenAI models.</li><li>\ud83d\udfe2 <strong>HuggingFace</strong> \u2014 The central hub for open-source models, datasets and ML tooling.</li><li>\ud83d\udfe1 <strong>Ollama</strong> \u2014 Run LLMs locally on your own machine.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</h2><ul><li>\ud83d\udfe2 <strong>OpenAI</strong> \u2014 American AI company, founded 2015.</li><li>\ud83d\udfe2 <strong>Anthropic</strong> \u2014 AI safety company founded by ex-OpenAI researchers (Dario & Daniela Amodei).</li><li>\ud83d\udfe2 <strong>Google DeepMind</strong> \u2014 Merger of Google Brain and DeepMind (2023).</li><li>\ud83d\udfe1 <strong>xAI</strong> \u2014 AI company founded by Elon Musk in 2023.</li><li>\ud83d\udfe2 <strong>Meta</strong> \u2014 Meta AI (Facebook parent).</li><li>\ud83d\udfe2 <strong>Mistral AI</strong> \u2014 French AI startup founded in 2023 by ex-Google and ex-Meta researchers.</li><li>\ud83d\udfe1 <strong>DeepSeek AI</strong> \u2014 Chinese AI research lab.</li><li>\ud83d\udfe2 <strong>Alibaba</strong> \u2014 Chinese tech giant.</li><li>\ud83d\udfe2 <strong>Microsoft</strong> \u2014 Creator of the Phi small model family.</li><li>\ud83d\udfe2 <strong>GPT-4o</strong> \u2014 OpenAI's flagship multimodal model.</li><li>\ud83d\udfe1 <strong>o3 / o4-mini</strong> \u2014 OpenAI's reasoning-focused model family.</li><li>\ud83d\udfe1 <strong>Claude 3.5 / 3.7</strong> \u2014 Anthropic's model family.</li><li>\ud83d\udfe1 <strong>Gemini 2.0</strong> \u2014 Google's multimodal model family.</li><li>\ud83d\udfe1 <strong>Grok 3</strong> \u2014 xAI's flagship model.</li><li>\ud83d\udfe1 <strong>Llama 3.x</strong> \u2014 Meta's open-weights model family.</li><li>\ud83d\udfe2 <strong>Mistral / Mixtral</strong> \u2014 Efficient open-weights models from Mistral AI.</li><li>\ud83d\udfe1 <strong>DeepSeek V3 / R1</strong> \u2014 Chinese open-weights models rivaling proprietary models at low cost.</li><li>\ud83d\udfe1 <strong>Qwen 2.5</strong> \u2014 Alibaba's open-weights model family.</li><li>\ud83d\udfe2 <strong>Gemma 2</strong> \u2014 Google's open-weights model family.</li><li>\ud83d\udfe1 <strong>Phi-4</strong> \u2014 Microsoft's small but powerful open-weights model (14B parameters).</li><li>\ud83d\udfe2 <strong>text-embedding-3</strong> \u2014 OpenAI's embedding model family.</li><li>\ud83d\udfe2 <strong>Voyage-3</strong> \u2014 Voyage AI's embedding model.</li><li>\ud83d\udfe2 <strong>nomic-embed</strong> \u2014 Open-source embedding model by Nomic AI.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>LAYER 1 \u00b7 FONDAMENTAUX</h2><ul><li>\ud83d\udfe2 <strong>Transformer</strong> \u2014 Neural network architecture behind all modern LLMs.</li><li>\ud83d\udfe2 <strong>Token</strong> \u2014 The basic unit of text processed by an LLM.</li><li>\ud83d\udfe1 <strong>Context Window</strong> \u2014 Maximum number of tokens a model can process at once (input + output).</li><li>\ud83d\udfe2 <strong>Embedding</strong> \u2014 Numerical vector (list of floats) representing text in semantic space.</li><li>\ud83d\udfe2 <strong>Prompt</strong> \u2014 The input text sent to a model to elicit a response.</li><li>\ud83d\udfe2 <strong>Inference</strong> \u2014 The process of running a trained model to generate output from an input.</li><li>\ud83d\udfe2 <strong>KV Cache</strong> \u2014 Key-Value Cache: optimization that stores intermediate attention computations (Key and Value matrices) during token generation so they don't need to be recomputed for every new token.</li><li>\ud83d\udfe2 <strong>Quantization</strong> \u2014 Compression technique that reduces the numerical precision of model weights from FP32/BF16 to lower formats (INT8, FP8, INT4).</li><li>\ud83d\udfe2 <strong>Temperature</strong> \u2014 Parameter controlling output randomness.</li><li>\ud83d\udfe2 <strong>Pre-training</strong> \u2014 Initial phase where a model learns from massive text datasets (terabytes).</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 Additional training on a specific dataset to specialize model behavior.</li><li>\ud83d\udfe2 <strong>RLHF</strong> \u2014 Reinforcement Learning from Human Feedback.</li></ul>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe2 LangChain</h2><p class=\"node-desc\">Most popular framework for building LLM applications. Provides chains, retrievers, memory and agent primitives. Large ecosystem but sometimes criticized for over-abstraction.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 LangGraph</h2><p class=\"node-desc\">Graph-based orchestration for multi-agent and stateful LLM workflows. Built on LangChain. Nodes = steps, Edges = transitions. Better control flow than simple chains.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe2 LlamaIndex</h2><p class=\"node-desc\">Framework focused on data ingestion and RAG pipelines. Great for document Q&A applications. Simpler than LangChain for pure retrieval use cases.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 Cursor</h2><p class=\"node-desc\">AI-first code editor (fork of VS Code). Deep LLM integration: code generation, explanation, refactoring, codebase Q&A. Uses GPT-4o and Claude under the hood.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe2 GitHub Copilot</h2><p class=\"node-desc\">AI pair programmer by GitHub/Microsoft. Integrates in VS Code, JetBrains, Neovim and more. Suggests code completions and has a chat mode.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 5 \u00b7 OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 Claude Code</h2><p class=\"node-desc\">Anthropic's agentic CLI tool. Runs in the terminal. Can read, write, and execute code across an entire codebase autonomously. Uses MCP for tool integrations.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation. Augments LLM responses with relevant external documents fetched at runtime. Solves the knowledge cutoff problem. Avoids hallucinations on specific data.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe2 Vector Database</h2><p class=\"node-desc\">Database optimized for storing and querying embeddings by semantic similarity. Examples: Pinecone, Weaviate, Chroma, pgvector. Core component of RAG pipelines.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe1 Agent</h2><p class=\"node-desc\">An LLM that can take actions autonomously: call tools, browse the web, write and run code, make decisions in a loop. Key shift: from Q&A to autonomous task completion.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe2 Tool Use / Function Calling</h2><p class=\"node-desc\">Allows an LLM to call external functions or APIs during generation. Example: search the web, query a DB, send an email. The model decides when and how to call the tool.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe2 Structured Output</h2><p class=\"node-desc\">Forces the model to respond in a defined format (JSON schema). Essential for reliable integration in applications. Eliminates parsing errors from free-form text responses.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe2 System Prompt</h2><p class=\"node-desc\">Instructions given to the model before the conversation starts. Defines persona, rules, tone, constraints and context. Hidden from end users. Controls model behavior globally.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udfe1 Memory</h2><p class=\"node-desc\">Mechanisms to persist information across conversations or steps. Short-term: conversation history in context window. Long-term: summaries or facts stored in a vector DB or key-value store.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 4 \u00b7 BRIQUES APPLICATIVES</div><h2>\ud83d\udd35 MCP</h2><p class=\"node-desc\">Model Context Protocol. Open standard by Anthropic (Nov 2024). Standardizes how LLMs connect to external tools and data sources. Like USB-C for AI: one protocol, many integrations.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe2 LLM API</h2><p class=\"node-desc\">Standard HTTP/REST interface to interact with a model. Send a prompt in the request, get a completion in the response. Common pattern across all providers (OpenAI, Anthropic, Google...).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe2 AWS Bedrock</h2><p class=\"node-desc\">AWS managed service to access multiple LLMs (Claude, Llama, Mistral...) via a unified API. No GPU management. Pay per token. Enterprise-grade security and compliance.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe2 Google Vertex AI</h2><p class=\"node-desc\">Google Cloud managed platform for AI model deployment and serving. Hosts Gemini natively. Also supports fine-tuning and MLOps pipelines.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe2 Azure OpenAI</h2><p class=\"node-desc\">Microsoft Azure's managed deployment of OpenAI models. Preferred for enterprise: data privacy, compliance (SOC2, HIPAA), SLAs.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe2 HuggingFace</h2><p class=\"node-desc\">The central hub for open-source models, datasets and ML tooling. Hosts 500K+ models. Provides Inference API and Spaces for demos. The \"GitHub of AI models\".</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 3 \u00b7 INFRASTRUCTURE & ACC\u00c8S</div><h2>\ud83d\udfe1 Ollama</h2><p class=\"node-desc\">Run LLMs locally on your own machine. Simple CLI and REST API. Supports Llama, Mistral, DeepSeek, Qwen and many more. No internet required. Free. Privacy-preserving.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 OpenAI</h2><p class=\"node-desc\">American AI company, founded 2015. Originally non-profit, now capped-profit. Creator of GPT and o-series models. Behind ChatGPT. Backed by Microsoft.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Anthropic</h2><p class=\"node-desc\">AI safety company founded by ex-OpenAI researchers (Dario & Daniela Amodei). Creator of Claude. Focus on safe and interpretable AI. Backed by Google & Amazon.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Google DeepMind</h2><p class=\"node-desc\">Merger of Google Brain and DeepMind (2023). Creator of Gemini (proprietary) and Gemma (open weights). Integrated into Google Cloud via Vertex AI.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 xAI</h2><p class=\"node-desc\">AI company founded by Elon Musk in 2023. Creator of the Grok model family. Integrated with the X (Twitter) platform.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Meta</h2><p class=\"node-desc\">Meta AI (Facebook parent). Creator of the Llama open-weights model family. Strong open-source commitment: models freely downloadable and fine-tunable.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Mistral AI</h2><p class=\"node-desc\">French AI startup founded in 2023 by ex-Google and ex-Meta researchers. Known for efficient open-weights models and a European alternative to US labs.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 DeepSeek AI</h2><p class=\"node-desc\">Chinese AI research lab. Released powerful open-weights models at very low cost. DeepSeek-R1 disrupted the market in Jan 2025 by matching GPT-o1 performance.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Alibaba</h2><p class=\"node-desc\">Chinese tech giant. Creator of the Qwen open-weights model family via DAMO Academy. Models available on HuggingFace and integrated in Alibaba Cloud.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Microsoft</h2><p class=\"node-desc\">Creator of the Phi small model family. Major OpenAI investor and partner. Deploys OpenAI models via Azure OpenAI Service.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 GPT-4o</h2><p class=\"node-desc\">OpenAI's flagship multimodal model. Processes text, images and audio natively. \"o\" = omni. Powers ChatGPT. Available via API.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 o3 / o4-mini</h2><p class=\"node-desc\">OpenAI's reasoning-focused model family. Thinks step-by-step internally before answering (chain-of-thought). Best for complex math, coding, logic tasks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Claude 3.5 / 3.7</h2><p class=\"node-desc\">Anthropic's model family. Known for instruction-following and safety. Claude 3.7 Sonnet introduces extended thinking (visible reasoning). Sonnet = balanced. Haiku = fast/cheap. Opus = most powerful.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Gemini 2.0</h2><p class=\"node-desc\">Google's multimodal model family. Native tool use, code execution. Gemini 2.0 Flash: 1M token context window. Strong at long documents.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Grok 3</h2><p class=\"node-desc\">xAI's flagship model. Trained on X (Twitter) data. Grok 3 features a \"Think\" reasoning mode similar to o3 and DeepSeek-R1.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Llama 3.x</h2><p class=\"node-desc\">Meta's open-weights model family. Free to download, run and fine-tune. Available in multiple sizes (8B, 70B, 405B parameters). Foundation of many community fine-tunes and products.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Mistral / Mixtral</h2><p class=\"node-desc\">Efficient open-weights models from Mistral AI. Mixtral uses MoE (Mixture of Experts) architecture for better performance/cost.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 DeepSeek V3 / R1</h2><p class=\"node-desc\">Chinese open-weights models rivaling proprietary models at low cost. DeepSeek-R1 is a reasoning model (like o3) but fully open weights. Caused significant market disruption in early 2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Qwen 2.5</h2><p class=\"node-desc\">Alibaba's open-weights model family. Strong multilingual and coding performance. Qwen2.5-Coder is specialized for code generation.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Gemma 2</h2><p class=\"node-desc\">Google's open-weights model family. Lightweight (2B, 9B, 27B parameters). Optimized to run locally on laptops and phones. Strong instruction-following.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe1 Phi-4</h2><p class=\"node-desc\">Microsoft's small but powerful open-weights model (14B parameters). Outperforms much larger models on reasoning tasks. Great for local use.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 text-embedding-3</h2><p class=\"node-desc\">OpenAI's embedding model family. Converts text to dense vectors. text-embedding-3-small (fast/cheap) and text-embedding-3-large (high quality). Used in RAG pipelines to index and search documents.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 Voyage-3</h2><p class=\"node-desc\">Voyage AI's embedding model. Best-in-class retrieval performance. Specialized versions: voyage-code-3 (code), voyage-finance-2 (finance).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 2 \u00b7 FOURNISSEURS & MOD\u00c8LES</div><h2>\ud83d\udfe2 nomic-embed</h2><p class=\"node-desc\">Open-source embedding model by Nomic AI. Can run locally via Ollama. Good balance of performance and privacy (no data sent to external APIs).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Transformer</h2><p class=\"node-desc\">Neural network architecture behind all modern LLMs. Introduced in \"Attention Is All You Need\" (Google, 2017). Uses self-attention to process sequences in parallel.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Token</h2><p class=\"node-desc\">The basic unit of text processed by an LLM. 1 token \u2248 0.75 words in English. Models are billed and limited by token count.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe1 Context Window</h2><p class=\"node-desc\">Maximum number of tokens a model can process at once (input + output). GPT-4: 128K. Claude 3.7: 200K. Gemini 2.0: 1M. Larger = more expensive but can handle bigger documents.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Embedding</h2><p class=\"node-desc\">Numerical vector (list of floats) representing text in semantic space. Similar meaning \u2192 similar vectors. Used for search, RAG, clustering.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Prompt</h2><p class=\"node-desc\">The input text sent to a model to elicit a response. Quality of the prompt directly determines quality of the output.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Inference</h2><p class=\"node-desc\">The process of running a trained model to generate output from an input. Opposite of training. Happens every time you query a model.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 KV Cache</h2><p class=\"node-desc\">Key-Value Cache: optimization that stores intermediate attention computations (Key and Value matrices) during token generation so they don't need to be recomputed for every new token. Without it: cost grows quadratically with sequence length. With it: each new token only requires computing attention for itself. Critical for inference latency and throughput \u2014 but consumes significant VRAM. Managed by serving engines like vLLM (paged attention) and llama.cpp.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Quantization</h2><p class=\"node-desc\">Compression technique that reduces the numerical precision of model weights from FP32/BF16 to lower formats (INT8, FP8, INT4). Cuts memory footprint 2\u20138\u00d7, speeds up inference, minimal quality loss. Enables large models to run on consumer hardware. Common formats: INT8 (good balance), INT4 (used by llama.cpp/GGUF), FP8 (newer, H100 GPUs, used by vLLM). Can also be applied to the KV cache.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Temperature</h2><p class=\"node-desc\">Parameter controlling output randomness. 0 = deterministic (same input \u2192 same output). 1+ = creative and varied. Tune based on use case.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Pre-training</h2><p class=\"node-desc\">Initial phase where a model learns from massive text datasets (terabytes). Builds general language understanding. Very expensive (millions of $).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">Additional training on a specific dataset to specialize model behavior. Cheaper than pre-training. Used to adapt a base model to a domain or task.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">LAYER 1 \u00b7 FONDAMENTAUX</div><h2>\ud83d\udfe2 RLHF</h2><p class=\"node-desc\">Reinforcement Learning from Human Feedback. Technique to align LLM outputs with human preferences. Used in ChatGPT, Claude, Gemini to make models helpful and safe.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">55 concepts</p><p class=\"stat\">5 couches</p><p class=\"generated-from\">L'\u00c9cosyst\u00e8me LLM Aujourd'hui</p></div></div>"] };
let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
