<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>LLM & AI Ecosystem</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 5</div><h2>DEVELOPER TOOLS</h2><ul><li>\ud83d\udfe1 <strong>CLI Agents</strong> \u2014 Terminal-based autonomous coding agents: Claude Code, Aider, Codex CLI, OpenCode.</li><li>\ud83d\udfe1 <strong>IDE Agents</strong> \u2014 Autonomous coding agents embedded directly in the IDE: Cursor, Windsurf.</li><li>\ud83d\udfe2 <strong>Coding Assistants\n(Copilots)</strong> \u2014 Reactive IDE-integrated assistants: GitHub Copilot, Amazon Q Developer, Gemini Code Assist.</li><li>\ud83d\udfe1 <strong>Monitoring /\nEval & Observability</strong> \u2014 Tools to trace, evaluate and debug LLM applications in production: LangSmith, Helicone, Arize, Braintrust..</li></ul>", "<div class=\"slide-layer-num\">Layer 4</div><h2>ARCHITECTURE PATTERNS</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation.</li><li>\ud83d\udfe1 <strong>AI Agents</strong> \u2014 Systems where an LLM autonomously plans, calls tools, and iterates until a goal is achieved.</li><li>\ud83d\udfe2 <strong>Tool Use</strong> \u2014 The ability for a model to call external functions during generation.\nHow it works: (1) the model decides it needs a tool, (2) it emits a structured request\n(e.g.</li><li>\ud83d\udd35 <strong>MCP</strong> \u2014 Model Context Protocol.</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 Adapt a pre-trained model to a specific domain or behavior by training it further on curated data.</li><li>\ud83d\udfe2 <strong>Prompt Engineering</strong> \u2014 The practice of crafting inputs to reliably get the desired output from a model.\nA prompt is the input text sent to the model.\nThe system prompt is a special instruction set that defines the model's role, behavior and constraints \u2014 it shapes every response before the user even speaks.\nTechniques: few-shot examples, chain-of-thought, role assignment.\nNo code required.</li><li>\ud83d\udfe2 <strong>Structured Generation</strong> \u2014 Force the model to respond in a defined format (e.g.</li><li>\ud83d\udfe1 <strong>Memory</strong> \u2014 The ability of an AI system to retain and retrieve information across interactions.\nThree types:\n- In-context (short-term): information injected directly into the prompt window.\n- External (long-term): information stored in a database, retrieved when needed (vector store, key-value).\n- Episodic: structured summaries of past sessions, compressed and re-injected.\nMemory is the key differentiator between a stateless chatbot and a persistent AI agent..</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>ACCESS & DEPLOYMENT</h2><ul><li>\ud83d\udfe2 <strong>Public API</strong> \u2014 Send an HTTP request to a provider's endpoint, get a response.</li><li>\ud83d\udfe2 <strong>Cloud Managed</strong> \u2014 Access models through a major cloud provider (AWS, GCP, Azure).</li><li>\ud83d\udfe2 <strong>Self-hosted</strong> \u2014 Deploy the model on your own GPU servers (on-premise or cloud VMs).</li><li>\ud83d\udfe1 <strong>Local / Edge</strong> \u2014 Run a model on a laptop, phone, or edge device.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>MODEL TAXONOMY</h2><ul><li>\ud83d\udfe1 <strong>Proprietary Models</strong> \u2014 Models whose weights are PRIVATE, never downloadable.\nAccessible only via API.\nDeveloped by well-funded labs (OpenAI, Anthropic, Google).\nOften called \"Frontier models\" in the industry, referring to their position at the cutting edge of AI capabilities..</li><li>\ud83d\udfe1 <strong>Open Source / Weights Models</strong> \u2014 Weights are publicly downloadable \u2014 you can run, fine-tune and deploy the model yourself.\nCommonly called \"open source\", though technically more precise to say \"open weights\":\ntraining data and full code are usually not published.\nExamples: Llama, Mistral, DeepSeek, Qwen, Gemma, Phi..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>CORE CONCEPTS</h2><ul><li>\ud83d\udfe2 <strong>Language Model</strong> \u2014 A model trained on massive text datasets to understand and generate human language.</li><li>\ud83d\udfe2 <strong>Token & Context</strong> \u2014 A token is the smallest unit of text a model processes (~0.75 words).</li><li>\ud83d\udfe2 <strong>Embedding & Vectors</strong> \u2014 An embedding is a list of numbers (a vector) that represents the meaning of a text.</li><li>\ud83d\udfe2 <strong>Training & Alignment</strong> \u2014 Training: teaching a model by exposing it to vast amounts of data.</li><li>\ud83d\udfe2 <strong>Inference</strong> \u2014 Running a trained model to generate a response from an input.</li><li>\ud83d\udd35 <strong>Reasoning</strong> \u2014 A paradigm shift in how models respond: instead of answering immediately,\nthe model thinks step-by-step before giving its final answer (chain-of-thought).\nSignificantly better at complex logic, math and coding.\nNot a separate model type \u2014 a capability that can apply to proprietary or open source models.\nExamples: o3, DeepSeek-R1, Claude 3.7 extended thinking..</li><li>\ud83d\udfe2 <strong>KV Cache</strong> \u2014 Key-Value Cache: the optimization that makes LLM inference fast.\nTransformers generate text token by token.</li><li>\ud83d\udfe2 <strong>Transformer</strong> \u2014 The neural network architecture behind every modern LLM.\nIntroduced in \"Attention Is All You Need\" (Google, 2017).\nKey innovation: self-attention \u2014 the model weighs the relevance of every word\nagainst every other word simultaneously, enabling massive parallel training.\nBefore Transformers: RNNs processed text sequentially, couldn't scale.\nAfter: GPT, BERT, Claude, Gemini, Llama \u2014 all Transformers..</li><li>\ud83d\udfe1 <strong>Multimodality</strong> \u2014 The ability of a model to process and generate multiple types of data:\ntext,\nimages,\naudio,\nvideo,\ncode.\nModern frontier models are natively multimodal.\nExpands LLMs far beyond text-only interactions..</li><li>\ud83d\udfe1 <strong>Quantization</strong> \u2014 Reducing a model's numerical precision (e.g.</li><li>\ud83d\udfe2 <strong>RLHF</strong> \u2014 Reinforcement Learning from Human Feedback.\nThe technique that transforms a raw pre-trained model into a useful assistant.\nProcess: human annotators rank model outputs \u2192 a reward model learns those preferences \u2192 the LLM is fine-tuned to maximise the reward.\nUsed to train ChatGPT, Claude, Gemini.</li><li>\ud83d\udfe2 <strong>Temperature</strong> \u2014 A parameter (0\u20132) that controls the randomness of model outputs.\nLow (0): deterministic, always the most probable token \u2014 good for code, structured data.\nHigh (1+): creative and varied \u2014 good for brainstorming, writing.\nRelated parameters: top_p (nucleus sampling), top_k.\nSet at inference time.</li></ul>", "<div class=\"slide-node-layer\">DEVELOPER TOOLS</div><h2>\ud83d\udfe1 CLI Agents</h2><p class=\"node-desc\">Terminal-based autonomous coding agents: Claude Code, Aider, Codex CLI, OpenCode. Operate on entire codebases, run commands, manage files autonomously.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">DEVELOPER TOOLS</div><h2>\ud83d\udfe1 IDE Agents</h2><p class=\"node-desc\">Autonomous coding agents embedded directly in the IDE: Cursor, Windsurf. Drive multi-step edits across the workspace from natural-language intent.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">DEVELOPER TOOLS</div><h2>\ud83d\udfe2 Coding Assistants\n(Copilots)</h2><p class=\"node-desc\">Reactive IDE-integrated assistants: GitHub Copilot, Amazon Q Developer, Gemini Code Assist. Suggest completions and answer inline \u2014 the developer stays in the driver seat.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">DEVELOPER TOOLS</div><h2>\ud83d\udfe1 Monitoring /\nEval & Observability</h2><p class=\"node-desc\">Tools to trace, evaluate and debug LLM applications in production: LangSmith, Helicone, Arize, Braintrust.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation. At query time, retrieve relevant documents from a knowledge base and inject them into the prompt. Solves knowledge cutoff and hallucination on specific data. Very widely adopted.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe1 AI Agents</h2><p class=\"node-desc\">Systems where an LLM autonomously plans, calls tools, and iterates until a goal is achieved. Shift from \"Q&A\" to \"autonomous task completion\". The central paradigm of 2024-2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe2 Tool Use</h2><p class=\"node-desc\">The ability for a model to call external functions during generation.<br>How it works: (1) the model decides it needs a tool, (2) it emits a structured request<br>(e.g. {\"tool\": \"web_search\", \"query\": \"...\"}), (3) your application executes the function<br>and returns the result, (4) the model continues with that information.<br>Examples: web search, database query, run code, send email, call any API.<br>MCP (Model Context Protocol) is the emerging standard that formalizes how tools<br>are declared and called across models and applications.<br>The bridge between \"the model thinks\" and \"the model acts\" \u2014 core capability of AI Agents.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udd35 MCP</h2><p class=\"node-desc\">Model Context Protocol. An open standard that defines how AI applications<br>connect to external tools and data sources.<br>Before MCP: every app needed custom integrations for every tool.<br>After MCP: any compliant client talks to any compliant server \u2014 like USB-C for AI.<br>Backed by Anthropic, adopted by OpenAI, Google, Microsoft and hundreds of community servers.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">Adapt a pre-trained model to a specific domain or behavior by training it further on curated data. Only possible with open-weights models. Produces a specialized model.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe2 Prompt Engineering</h2><p class=\"node-desc\">The practice of crafting inputs to reliably get the desired output from a model.<br>A prompt is the input text sent to the model.<br>The system prompt is a special instruction set that defines the model's role, behavior and constraints \u2014 it shapes every response before the user even speaks.<br>Techniques: few-shot examples, chain-of-thought, role assignment.<br>No code required. High-leverage, often underestimated.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe2 Structured Generation</h2><p class=\"node-desc\">Force the model to respond in a defined format (e.g. JSON schema). Makes LLM outputs reliable and directly usable by code. Essential for production applications. Also called \"structured outputs\".</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ARCHITECTURE PATTERNS</div><h2>\ud83d\udfe1 Memory</h2><p class=\"node-desc\">The ability of an AI system to retain and retrieve information across interactions.<br>Three types:<br>- In-context (short-term): information injected directly into the prompt window.<br>- External (long-term): information stored in a database, retrieved when needed (vector store, key-value).<br>- Episodic: structured summaries of past sessions, compressed and re-injected.<br>Memory is the key differentiator between a stateless chatbot and a persistent AI agent.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ACCESS & DEPLOYMENT</div><h2>\ud83d\udfe2 Public API</h2><p class=\"node-desc\">Send an HTTP request to a provider's endpoint, get a response. The simplest way to use a model. Pay per token. No infrastructure to manage. Operated by the model creator.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACCESS & DEPLOYMENT</div><h2>\ud83d\udfe2 Cloud Managed</h2><p class=\"node-desc\">Access models through a major cloud provider (AWS, GCP, Azure). Benefits: enterprise compliance, data privacy, multi-model choice, integration with existing cloud infra. Managed by the cloud, not the AI lab.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACCESS & DEPLOYMENT</div><h2>\ud83d\udfe2 Self-hosted</h2><p class=\"node-desc\">Deploy the model on your own GPU servers (on-premise or cloud VMs). Full control over data and costs at scale. Requires ML infrastructure expertise.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACCESS & DEPLOYMENT</div><h2>\ud83d\udfe1 Local / Edge</h2><p class=\"node-desc\">Run a model on a laptop, phone, or edge device. No internet required. Maximum privacy. Enabled by smaller, efficient models and tools like Ollama. Growing fast as hardware improves.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL TAXONOMY</div><h2>\ud83d\udfe1 Proprietary Models</h2><p class=\"node-desc\">Models whose weights are PRIVATE, never downloadable.<br>Accessible only via API.<br>Developed by well-funded labs (OpenAI, Anthropic, Google).<br>Often called \"Frontier models\" in the industry, referring to their position at the cutting edge of AI capabilities.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL TAXONOMY</div><h2>\ud83d\udfe1 Open Source / Weights Models</h2><p class=\"node-desc\">Weights are publicly downloadable \u2014 you can run, fine-tune and deploy the model yourself.<br>Commonly called \"open source\", though technically more precise to say \"open weights\":<br>training data and full code are usually not published.<br>Examples: Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Language Model</h2><p class=\"node-desc\">A model trained on massive text datasets to understand and generate human language. The foundation of the entire ecosystem. All LLMs are language models, but not all language models are LLMs.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Token & Context</h2><p class=\"node-desc\">A token is the smallest unit of text a model processes (~0.75 words). The context window is the maximum number of tokens a model can handle at once. These two notions define the model's \"working memory\".</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Embedding & Vectors</h2><p class=\"node-desc\">An embedding is a list of numbers (a vector) that represents the meaning of a text. Similar texts produce similar vectors. This enables semantic search, clustering, and retrieval \u2014 the backbone of RAG.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Training & Alignment</h2><p class=\"node-desc\">Training: teaching a model by exposing it to vast amounts of data. Alignment: shaping the model's behavior to be helpful, honest and safe (via RLHF, Constitutional AI, etc.). Two distinct but essential phases.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Inference</h2><p class=\"node-desc\">Running a trained model to generate a response from an input. Every API call, every chat message is an inference. Opposite of training \u2014 much cheaper and faster.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udd35 Reasoning</h2><p class=\"node-desc\">A paradigm shift in how models respond: instead of answering immediately,<br>the model thinks step-by-step before giving its final answer (chain-of-thought).<br>Significantly better at complex logic, math and coding.<br>Not a separate model type \u2014 a capability that can apply to proprietary or open source models.<br>Examples: o3, DeepSeek-R1, Claude 3.7 extended thinking.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 KV Cache</h2><p class=\"node-desc\">Key-Value Cache: the optimization that makes LLM inference fast.<br>Transformers generate text token by token. At each step, attention needs<br>the Key (K) and Value (V) matrices for all previous tokens.<br>Without cache: recomputed every step \u2192 quadratic cost O(n\u00b2).<br>With cache: stored and reused \u2192 linear cost O(n) per new token.<br>The trade-off: KV cache consumes significant VRAM (often more than model weights for long contexts).<br>Managed by serving engines like vLLM (paged attention) and llama.cpp.<br>Related optimizations: GQA/MQA (reduce cache size 4\u20138\u00d7), prefix caching (reuse system prompt cache).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Transformer</h2><p class=\"node-desc\">The neural network architecture behind every modern LLM.<br>Introduced in \"Attention Is All You Need\" (Google, 2017).<br>Key innovation: self-attention \u2014 the model weighs the relevance of every word<br>against every other word simultaneously, enabling massive parallel training.<br>Before Transformers: RNNs processed text sequentially, couldn't scale.<br>After: GPT, BERT, Claude, Gemini, Llama \u2014 all Transformers.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe1 Multimodality</h2><p class=\"node-desc\">The ability of a model to process and generate multiple types of data:<br>text,<br>images,<br>audio,<br>video,<br>code.<br>Modern frontier models are natively multimodal.<br>Expands LLMs far beyond text-only interactions.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe1 Quantization</h2><p class=\"node-desc\">Reducing a model's numerical precision (e.g. FP32 \u2192 INT8 or INT4) to shrink its size and memory footprint.<br>A 70B model at full precision needs ~140 GB VRAM. At 4-bit quantization: ~35 GB \u2014 runnable on a single GPU.<br>Trade-off: slight quality loss, major hardware savings.<br>Key formats: GGUF (llama.cpp), AWQ, GPTQ, bitsandbytes.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 RLHF</h2><p class=\"node-desc\">Reinforcement Learning from Human Feedback.<br>The technique that transforms a raw pre-trained model into a useful assistant.<br>Process: human annotators rank model outputs \u2192 a reward model learns those preferences \u2192 the LLM is fine-tuned to maximise the reward.<br>Used to train ChatGPT, Claude, Gemini. The key step that makes models helpful, honest and safe.<br>Variants: RLHF, RLAIF (AI feedback), DPO (simpler, no RL loop).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CORE CONCEPTS</div><h2>\ud83d\udfe2 Temperature</h2><p class=\"node-desc\">A parameter (0\u20132) that controls the randomness of model outputs.<br>Low (0): deterministic, always the most probable token \u2014 good for code, structured data.<br>High (1+): creative and varied \u2014 good for brainstorming, writing.<br>Related parameters: top_p (nucleus sampling), top_k.<br>Set at inference time. Has no effect on the model weights.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">30 concepts</p><p class=\"stat\">5 layers</p><p class=\"generated-from\">LLM & AI Ecosystem</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>LLM & AI Ecosystem</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 5</div><h2>OUTILS D\u00c9VELOPPEURS</h2><ul><li>\ud83d\udfe1 <strong>Agents CLI</strong> \u2014 Agents de code autonomes en ligne de commande : Claude Code, Aider, Codex CLI, OpenCode.</li><li>\ud83d\udfe1 <strong>Agents IDE</strong> \u2014 Agents de code autonomes int\u00e9gr\u00e9s directement dans l'IDE : Cursor, Windsurf.</li><li>\ud83d\udfe2 <strong>Assistants de Code\n(Copilots)</strong> \u2014 Assistants r\u00e9actifs int\u00e9gr\u00e9s \u00e0 l'IDE : GitHub Copilot, Amazon Q Developer, Gemini Code Assist.</li><li>\ud83d\udfe1 <strong>Monitoring /\n\u00c9val & Observabilit\u00e9</strong> \u2014 Outils pour tracer, \u00e9valuer et d\u00e9boguer les applications LLM en production : LangSmith, Helicone, Arize, Braintrust..</li></ul>", "<div class=\"slide-layer-num\">Layer 4</div><h2>PATTERNS D'ARCHITECTURE</h2><ul><li>\ud83d\udfe2 <strong>RAG</strong> \u2014 Retrieval-Augmented Generation.</li><li>\ud83d\udfe1 <strong>Agents IA</strong> \u2014 Syst\u00e8mes o\u00f9 un LLM planifie de fa\u00e7on autonome, appelle des outils et it\u00e8re jusqu'\u00e0 atteindre un objectif.</li><li>\ud83d\udfe2 <strong>Utilisation d'Outils</strong> \u2014 La capacit\u00e9 d'un mod\u00e8le \u00e0 appeler des fonctions externes pendant la g\u00e9n\u00e9ration.\nFonctionnement : (1) le mod\u00e8le d\u00e9cide qu'il a besoin d'un outil, (2) il \u00e9met une requ\u00eate\nstructur\u00e9e (ex : {\"tool\": \"web_search\", \"query\": \"...\"}), (3) l'application ex\u00e9cute la\nfonction et renvoie le r\u00e9sultat, (4) le mod\u00e8le continue avec cette information.\nExemples : recherche web, requ\u00eate base de donn\u00e9es, ex\u00e9cution de code, envoi d'email, appel d'API.\nMCP (Model Context Protocol) est le standard \u00e9mergent qui formalise comment les outils\nsont d\u00e9clar\u00e9s et appel\u00e9s entre mod\u00e8les et applications.\nLe pont entre \"le mod\u00e8le r\u00e9fl\u00e9chit\" et \"le mod\u00e8le agit\" \u2014 capacit\u00e9 centrale des Agents IA..</li><li>\ud83d\udd35 <strong>MCP</strong> \u2014 Model Context Protocol.</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 Adapter un mod\u00e8le pr\u00e9-entra\u00een\u00e9 \u00e0 un domaine ou comportement sp\u00e9cifique en le r\u00e9-entra\u00eenant sur des donn\u00e9es cibl\u00e9es.</li><li>\ud83d\udfe2 <strong>Prompt Engineering</strong> \u2014 L'art de formuler les entr\u00e9es pour obtenir de fa\u00e7on fiable la sortie souhait\u00e9e d'un mod\u00e8le.\nLe prompt est le texte d'entr\u00e9e envoy\u00e9 au mod\u00e8le.\nLe system prompt est un ensemble d'instructions sp\u00e9ciales qui d\u00e9finit le r\u00f4le, le comportement et les contraintes du mod\u00e8le \u2014 il conditionne chaque r\u00e9ponse avant m\u00eame que l'utilisateur parle.\nTechniques : few-shot, chain-of-thought, assignation de r\u00f4le.\nSans code.</li><li>\ud83d\udfe2 <strong>G\u00e9n\u00e9ration Structur\u00e9e</strong> \u2014 Forcer le mod\u00e8le \u00e0 r\u00e9pondre dans un format d\u00e9fini (ex : sch\u00e9ma JSON).</li><li>\ud83d\udfe1 <strong>M\u00e9moire</strong> \u2014 La capacit\u00e9 d'un syst\u00e8me IA \u00e0 conserver et retrouver des informations entre les interactions.\nTrois types :\n- En contexte (court terme) : informations inject\u00e9es directement dans la fen\u00eatre de prompt.\n- Externe (long terme) : informations stock\u00e9es en base de donn\u00e9es, r\u00e9cup\u00e9r\u00e9es \u00e0 la demande (vector store, cl\u00e9-valeur).\n- \u00c9pisodique : r\u00e9sum\u00e9s structur\u00e9s de sessions pass\u00e9es, compress\u00e9s et r\u00e9-inject\u00e9s.\nLa m\u00e9moire est le diff\u00e9renciateur cl\u00e9 entre un chatbot sans \u00e9tat et un agent IA persistant..</li></ul>", "<div class=\"slide-layer-num\">Layer 3</div><h2>ACC\u00c8S & D\u00c9PLOIEMENT</h2><ul><li>\ud83d\udfe2 <strong>API Publique</strong> \u2014 Envoyer une requ\u00eate HTTP \u00e0 l'endpoint d'un fournisseur, recevoir une r\u00e9ponse.</li><li>\ud83d\udfe2 <strong>Cloud Manag\u00e9</strong> \u2014 Acc\u00e8s aux mod\u00e8les via un grand fournisseur cloud (AWS, GCP, Azure).</li><li>\ud83d\udfe2 <strong>Auto-h\u00e9berg\u00e9</strong> \u2014 D\u00e9ployer le mod\u00e8le sur ses propres serveurs GPU (on-premise ou VMs cloud).</li><li>\ud83d\udfe1 <strong>Local / Edge</strong> \u2014 Faire tourner un mod\u00e8le sur un laptop, t\u00e9l\u00e9phone ou dispositif edge.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>TAXONOMIE DES MOD\u00c8LES</h2><ul><li>\ud83d\udfe1 <strong>Mod\u00e8les Propri\u00e9taires</strong> \u2014 Mod\u00e8les dont les poids sont PRIVES, jamais t\u00e9l\u00e9chargeables.\nAccessibles uniquement via API.\nD\u00e9velopp\u00e9s par des laboratoires a gros budget (OpenAI, Anthropic, Google).\nSouvent appel\u00e9s \"Frontier models\" dans l'industrie, en r\u00e9f\u00e9rence \u00e0 leur position \u00e0 la pointe des capacit\u00e9s IA..</li><li>\ud83d\udfe1 <strong>Open Source / Weights Models</strong> \u2014 Les poids sont t\u00e9l\u00e9chargeables publiquement \u2014 vous pouvez ex\u00e9cuter, fine-tuner et d\u00e9ployer le mod\u00e8le vous-m\u00eame.\nSouvent appel\u00e9s \"open source\" (terme courant), mais plus pr\u00e9cis\u00e9ment \"open weights\" :\nles donn\u00e9es d'entra\u00eenement et le code complet ne sont g\u00e9n\u00e9ralement pas publi\u00e9s.\nExemples : Llama, Mistral, DeepSeek, Qwen, Gemma, Phi..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>CONCEPTS FONDAMENTAUX</h2><ul><li>\ud83d\udfe2 <strong>Mod\u00e8le de Langage</strong> \u2014 Un mod\u00e8le entra\u00een\u00e9 sur d'immenses corpus textuels pour comprendre et g\u00e9n\u00e9rer du langage humain.</li><li>\ud83d\udfe2 <strong>Token & Contexte</strong> \u2014 Un token est la plus petite unit\u00e9 de texte trait\u00e9e par un mod\u00e8le (~0,75 mot).</li><li>\ud83d\udfe2 <strong>Embedding & Vecteurs</strong> \u2014 Un embedding est une liste de nombres (un vecteur) repr\u00e9sentant le sens d'un texte.</li><li>\ud83d\udfe2 <strong>Entra\u00eenement & Alignement</strong> \u2014 Entra\u00eenement : apprendre \u00e0 un mod\u00e8le en le exposant \u00e0 d'immenses quantit\u00e9s de donn\u00e9es.</li><li>\ud83d\udfe2 <strong>Inf\u00e9rence</strong> \u2014 Faire tourner un mod\u00e8le entra\u00een\u00e9 pour g\u00e9n\u00e9rer une r\u00e9ponse \u00e0 partir d'une entr\u00e9e.</li><li>\ud83d\udd35 <strong>Raisonnement</strong> \u2014 Un changement de paradigme dans la fa\u00e7on dont les mod\u00e8les r\u00e9pondent : au lieu de r\u00e9pondre imm\u00e9diatement,\nle mod\u00e8le r\u00e9fl\u00e9chit \u00e9tape par \u00e9tape avant de donner sa r\u00e9ponse finale (chain-of-thought).\nBien meilleur sur les t\u00e2ches de logique complexe, de maths et de code.\nPas un type de mod\u00e8le \u00e0 part \u2014 une capacit\u00e9 qui s'applique aux mod\u00e8les propri\u00e9taires ou open source.\nExemples : o3, DeepSeek-R1, Claude 3.7 extended thinking..</li><li>\ud83d\udfe2 <strong>Cache KV</strong> \u2014 Cache cl\u00e9-valeur : l'optimisation qui rend l'inf\u00e9rence des LLM rapide.\nLes transformers g\u00e9n\u00e8rent du texte token par token.</li><li>\ud83d\udfe2 <strong>Transformer</strong> \u2014 L'architecture de r\u00e9seau de neurones derri\u00e8re tous les LLM modernes.\nIntroduite dans \"Attention Is All You Need\" (Google, 2017).\nInnovation cl\u00e9 : l'auto-attention \u2014 le mod\u00e8le pond\u00e8re simultan\u00e9ment la pertinence\nde chaque mot par rapport \u00e0 tous les autres, permettant un entra\u00eenement massivement parall\u00e8le.\nAvant les Transformers : les RNN traitaient le texte s\u00e9quentiellement, ne passaient pas \u00e0 l'\u00e9chelle.\nApr\u00e8s : GPT, BERT, Claude, Gemini, Llama \u2014 tous des Transformers..</li><li>\ud83d\udfe1 <strong>Multimodalit\u00e9</strong> \u2014 La capacit\u00e9 d'un mod\u00e8le \u00e0 traiter et g\u00e9n\u00e9rer plusieurs types de donn\u00e9es :\ntexte,\nimages,\naudio,\nvid\u00e9o,\ncode.\nLes mod\u00e8les frontier modernes sont nativement multimodaux.\n\u00c9tend les LLM bien au-del\u00e0 des interactions textuelles..</li><li>\ud83d\udfe1 <strong>Quantisation</strong> \u2014 R\u00e9duire la pr\u00e9cision num\u00e9rique d'un mod\u00e8le (ex.</li><li>\ud83d\udfe2 <strong>RLHF</strong> \u2014 Apprentissage par renforcement \u00e0 partir des retours humains.\nLa technique qui transforme un mod\u00e8le pr\u00e9-entra\u00een\u00e9 brut en assistant utile.\nProcessus : des annotateurs humains classent les sorties du mod\u00e8le \u2192 un mod\u00e8le de r\u00e9compense apprend ces pr\u00e9f\u00e9rences \u2192 le LLM est fine-tun\u00e9 pour maximiser la r\u00e9compense.\nUtilis\u00e9 pour entra\u00eener ChatGPT, Claude, Gemini.</li><li>\ud83d\udfe2 <strong>Temp\u00e9rature</strong> \u2014 Un param\u00e8tre (0\u20132) qui contr\u00f4le le caract\u00e8re al\u00e9atoire des sorties du mod\u00e8le.\nBas (0) : d\u00e9terministe, toujours le token le plus probable \u2014 id\u00e9al pour le code, les donn\u00e9es structur\u00e9es.\n\u00c9lev\u00e9 (1+) : cr\u00e9atif et vari\u00e9 \u2014 id\u00e9al pour le brainstorming, l'\u00e9criture.\nParam\u00e8tres associ\u00e9s : top_p (nucleus sampling), top_k.\nD\u00e9fini au moment de l'inf\u00e9rence.</li></ul>", "<div class=\"slide-node-layer\">OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 Agents CLI</h2><p class=\"node-desc\">Agents de code autonomes en ligne de commande : Claude Code, Aider, Codex CLI, OpenCode. Op\u00e8rent sur des bases de code enti\u00e8res, ex\u00e9cutent des commandes, g\u00e8rent les fichiers de fa\u00e7on autonome.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 Agents IDE</h2><p class=\"node-desc\">Agents de code autonomes int\u00e9gr\u00e9s directement dans l'IDE : Cursor, Windsurf. Pilotent des \u00e9ditions multi-\u00e9tapes \u00e0 travers le workspace \u00e0 partir d'une intention en langage naturel.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe2 Assistants de Code\n(Copilots)</h2><p class=\"node-desc\">Assistants r\u00e9actifs int\u00e9gr\u00e9s \u00e0 l'IDE : GitHub Copilot, Amazon Q Developer, Gemini Code Assist. Proposent des compl\u00e9tions et r\u00e9pondent inline \u2014 le d\u00e9veloppeur reste aux commandes.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS D\u00c9VELOPPEURS</div><h2>\ud83d\udfe1 Monitoring /\n\u00c9val & Observabilit\u00e9</h2><p class=\"node-desc\">Outils pour tracer, \u00e9valuer et d\u00e9boguer les applications LLM en production : LangSmith, Helicone, Arize, Braintrust.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe2 RAG</h2><p class=\"node-desc\">Retrieval-Augmented Generation. Au moment de la requ\u00eate, r\u00e9cup\u00e9rer les documents pertinents depuis une base de connaissances et les injecter dans le prompt. R\u00e9sout les probl\u00e8mes de date limite de connaissance et d'hallucination. Tr\u00e8s largement adopt\u00e9.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe1 Agents IA</h2><p class=\"node-desc\">Syst\u00e8mes o\u00f9 un LLM planifie de fa\u00e7on autonome, appelle des outils et it\u00e8re jusqu'\u00e0 atteindre un objectif. Passage du \"question-r\u00e9ponse\" \u00e0 l'\"ex\u00e9cution autonome de t\u00e2ches\". Le paradigme central de 2024-2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe2 Utilisation d'Outils</h2><p class=\"node-desc\">La capacit\u00e9 d'un mod\u00e8le \u00e0 appeler des fonctions externes pendant la g\u00e9n\u00e9ration.<br>Fonctionnement : (1) le mod\u00e8le d\u00e9cide qu'il a besoin d'un outil, (2) il \u00e9met une requ\u00eate<br>structur\u00e9e (ex : {\"tool\": \"web_search\", \"query\": \"...\"}), (3) l'application ex\u00e9cute la<br>fonction et renvoie le r\u00e9sultat, (4) le mod\u00e8le continue avec cette information.<br>Exemples : recherche web, requ\u00eate base de donn\u00e9es, ex\u00e9cution de code, envoi d'email, appel d'API.<br>MCP (Model Context Protocol) est le standard \u00e9mergent qui formalise comment les outils<br>sont d\u00e9clar\u00e9s et appel\u00e9s entre mod\u00e8les et applications.<br>Le pont entre \"le mod\u00e8le r\u00e9fl\u00e9chit\" et \"le mod\u00e8le agit\" \u2014 capacit\u00e9 centrale des Agents IA.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udd35 MCP</h2><p class=\"node-desc\">Model Context Protocol. Un standard ouvert qui d\u00e9finit comment les applications IA<br>se connectent \u00e0 des outils et sources de donn\u00e9es externes.<br>Avant MCP : chaque app n\u00e9cessitait des int\u00e9grations sur mesure pour chaque outil.<br>Apr\u00e8s MCP : tout client compatible parle \u00e0 tout serveur compatible \u2014 comme l'USB-C pour l'IA.<br>Port\u00e9 par Anthropic, adopt\u00e9 par OpenAI, Google, Microsoft et des centaines de serveurs communautaires.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">Adapter un mod\u00e8le pr\u00e9-entra\u00een\u00e9 \u00e0 un domaine ou comportement sp\u00e9cifique en le r\u00e9-entra\u00eenant sur des donn\u00e9es cibl\u00e9es. Uniquement possible avec les mod\u00e8les open weights. Produit un mod\u00e8le sp\u00e9cialis\u00e9.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe2 Prompt Engineering</h2><p class=\"node-desc\">L'art de formuler les entr\u00e9es pour obtenir de fa\u00e7on fiable la sortie souhait\u00e9e d'un mod\u00e8le.<br>Le prompt est le texte d'entr\u00e9e envoy\u00e9 au mod\u00e8le.<br>Le system prompt est un ensemble d'instructions sp\u00e9ciales qui d\u00e9finit le r\u00f4le, le comportement et les contraintes du mod\u00e8le \u2014 il conditionne chaque r\u00e9ponse avant m\u00eame que l'utilisateur parle.<br>Techniques : few-shot, chain-of-thought, assignation de r\u00f4le.<br>Sans code. Tr\u00e8s impactant, souvent sous-estim\u00e9.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe2 G\u00e9n\u00e9ration Structur\u00e9e</h2><p class=\"node-desc\">Forcer le mod\u00e8le \u00e0 r\u00e9pondre dans un format d\u00e9fini (ex : sch\u00e9ma JSON). Rend les sorties LLM fiables et directement exploitables par du code. Indispensable en production. Aussi appel\u00e9 \"structured outputs\".</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PATTERNS D'ARCHITECTURE</div><h2>\ud83d\udfe1 M\u00e9moire</h2><p class=\"node-desc\">La capacit\u00e9 d'un syst\u00e8me IA \u00e0 conserver et retrouver des informations entre les interactions.<br>Trois types :<br>- En contexte (court terme) : informations inject\u00e9es directement dans la fen\u00eatre de prompt.<br>- Externe (long terme) : informations stock\u00e9es en base de donn\u00e9es, r\u00e9cup\u00e9r\u00e9es \u00e0 la demande (vector store, cl\u00e9-valeur).<br>- \u00c9pisodique : r\u00e9sum\u00e9s structur\u00e9s de sessions pass\u00e9es, compress\u00e9s et r\u00e9-inject\u00e9s.<br>La m\u00e9moire est le diff\u00e9renciateur cl\u00e9 entre un chatbot sans \u00e9tat et un agent IA persistant.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ACC\u00c8S & D\u00c9PLOIEMENT</div><h2>\ud83d\udfe2 API Publique</h2><p class=\"node-desc\">Envoyer une requ\u00eate HTTP \u00e0 l'endpoint d'un fournisseur, recevoir une r\u00e9ponse. La fa\u00e7on la plus simple d'utiliser un mod\u00e8le. Facturation \u00e0 la consommation (par token). Aucune infrastructure \u00e0 g\u00e9rer. Op\u00e9r\u00e9 par le cr\u00e9ateur du mod\u00e8le.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACC\u00c8S & D\u00c9PLOIEMENT</div><h2>\ud83d\udfe2 Cloud Manag\u00e9</h2><p class=\"node-desc\">Acc\u00e8s aux mod\u00e8les via un grand fournisseur cloud (AWS, GCP, Azure). Avantages : conformit\u00e9 entreprise, confidentialit\u00e9 des donn\u00e9es, choix multi-mod\u00e8les, int\u00e9gration avec l'infra cloud existante. G\u00e9r\u00e9 par le cloud, pas par le laboratoire IA.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACC\u00c8S & D\u00c9PLOIEMENT</div><h2>\ud83d\udfe2 Auto-h\u00e9berg\u00e9</h2><p class=\"node-desc\">D\u00e9ployer le mod\u00e8le sur ses propres serveurs GPU (on-premise ou VMs cloud). Contr\u00f4le total sur les donn\u00e9es et les co\u00fbts \u00e0 grande \u00e9chelle. N\u00e9cessite une expertise en infrastructure ML.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ACC\u00c8S & D\u00c9PLOIEMENT</div><h2>\ud83d\udfe1 Local / Edge</h2><p class=\"node-desc\">Faire tourner un mod\u00e8le sur un laptop, t\u00e9l\u00e9phone ou dispositif edge. Sans internet. Confidentialit\u00e9 maximale. Rendu possible par des mod\u00e8les plus petits et des outils comme Ollama. En forte croissance au fil des avanc\u00e9es mat\u00e9rielles.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">TAXONOMIE DES MOD\u00c8LES</div><h2>\ud83d\udfe1 Mod\u00e8les Propri\u00e9taires</h2><p class=\"node-desc\">Mod\u00e8les dont les poids sont PRIVES, jamais t\u00e9l\u00e9chargeables.<br>Accessibles uniquement via API.<br>D\u00e9velopp\u00e9s par des laboratoires a gros budget (OpenAI, Anthropic, Google).<br>Souvent appel\u00e9s \"Frontier models\" dans l'industrie, en r\u00e9f\u00e9rence \u00e0 leur position \u00e0 la pointe des capacit\u00e9s IA.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">TAXONOMIE DES MOD\u00c8LES</div><h2>\ud83d\udfe1 Open Source / Weights Models</h2><p class=\"node-desc\">Les poids sont t\u00e9l\u00e9chargeables publiquement \u2014 vous pouvez ex\u00e9cuter, fine-tuner et d\u00e9ployer le mod\u00e8le vous-m\u00eame.<br>Souvent appel\u00e9s \"open source\" (terme courant), mais plus pr\u00e9cis\u00e9ment \"open weights\" :<br>les donn\u00e9es d'entra\u00eenement et le code complet ne sont g\u00e9n\u00e9ralement pas publi\u00e9s.<br>Exemples : Llama, Mistral, DeepSeek, Qwen, Gemma, Phi.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Mod\u00e8le de Langage</h2><p class=\"node-desc\">Un mod\u00e8le entra\u00een\u00e9 sur d'immenses corpus textuels pour comprendre et g\u00e9n\u00e9rer du langage humain. La brique de base de tout l'\u00e9cosyst\u00e8me. Tous les LLM sont des mod\u00e8les de langage, mais tous les mod\u00e8les de langage ne sont pas des LLM.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Token & Contexte</h2><p class=\"node-desc\">Un token est la plus petite unit\u00e9 de texte trait\u00e9e par un mod\u00e8le (~0,75 mot). La fen\u00eatre de contexte est le nombre maximum de tokens trait\u00e9s en une seule fois. Ces deux notions d\u00e9finissent la \"m\u00e9moire de travail\" du mod\u00e8le.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Embedding & Vecteurs</h2><p class=\"node-desc\">Un embedding est une liste de nombres (un vecteur) repr\u00e9sentant le sens d'un texte. Des textes similaires produisent des vecteurs proches. Cela permet la recherche s\u00e9mantique, le clustering et la r\u00e9cup\u00e9ration de documents \u2014 colonne vert\u00e9brale du RAG.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Entra\u00eenement & Alignement</h2><p class=\"node-desc\">Entra\u00eenement : apprendre \u00e0 un mod\u00e8le en le exposant \u00e0 d'immenses quantit\u00e9s de donn\u00e9es. Alignement : fa\u00e7onner son comportement pour qu'il soit utile, honn\u00eate et s\u00fbr (via RLHF, Constitutional AI, etc.). Deux phases distinctes mais indispensables.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Inf\u00e9rence</h2><p class=\"node-desc\">Faire tourner un mod\u00e8le entra\u00een\u00e9 pour g\u00e9n\u00e9rer une r\u00e9ponse \u00e0 partir d'une entr\u00e9e. Chaque appel API, chaque message de chat est une inf\u00e9rence. Oppos\u00e9 de l'entra\u00eenement \u2014 beaucoup moins co\u00fbteux et plus rapide.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udd35 Raisonnement</h2><p class=\"node-desc\">Un changement de paradigme dans la fa\u00e7on dont les mod\u00e8les r\u00e9pondent : au lieu de r\u00e9pondre imm\u00e9diatement,<br>le mod\u00e8le r\u00e9fl\u00e9chit \u00e9tape par \u00e9tape avant de donner sa r\u00e9ponse finale (chain-of-thought).<br>Bien meilleur sur les t\u00e2ches de logique complexe, de maths et de code.<br>Pas un type de mod\u00e8le \u00e0 part \u2014 une capacit\u00e9 qui s'applique aux mod\u00e8les propri\u00e9taires ou open source.<br>Exemples : o3, DeepSeek-R1, Claude 3.7 extended thinking.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Cache KV</h2><p class=\"node-desc\">Cache cl\u00e9-valeur : l'optimisation qui rend l'inf\u00e9rence des LLM rapide.<br>Les transformers g\u00e9n\u00e8rent du texte token par token. \u00c0 chaque \u00e9tape, l'attention a besoin<br>des matrices Key (K) et Value (V) de tous les tokens pr\u00e9c\u00e9dents.<br>Sans cache : recalcul\u00e9 \u00e0 chaque \u00e9tape \u2192 co\u00fbt quadratique O(n\u00b2).<br>Avec cache : stock\u00e9 et r\u00e9utilis\u00e9 \u2192 co\u00fbt lin\u00e9aire O(n) par nouveau token.<br>La contrepartie : le cache KV consomme beaucoup de VRAM (souvent plus que les poids du mod\u00e8le pour les longs contextes).<br>G\u00e9r\u00e9 par les moteurs de serving comme vLLM (paged attention) et llama.cpp.<br>Optimisations associ\u00e9es : GQA/MQA (r\u00e9duisent la taille du cache de 4 \u00e0 8\u00d7), prefix caching (r\u00e9utilise le cache du system prompt).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Transformer</h2><p class=\"node-desc\">L'architecture de r\u00e9seau de neurones derri\u00e8re tous les LLM modernes.<br>Introduite dans \"Attention Is All You Need\" (Google, 2017).<br>Innovation cl\u00e9 : l'auto-attention \u2014 le mod\u00e8le pond\u00e8re simultan\u00e9ment la pertinence<br>de chaque mot par rapport \u00e0 tous les autres, permettant un entra\u00eenement massivement parall\u00e8le.<br>Avant les Transformers : les RNN traitaient le texte s\u00e9quentiellement, ne passaient pas \u00e0 l'\u00e9chelle.<br>Apr\u00e8s : GPT, BERT, Claude, Gemini, Llama \u2014 tous des Transformers.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe1 Multimodalit\u00e9</h2><p class=\"node-desc\">La capacit\u00e9 d'un mod\u00e8le \u00e0 traiter et g\u00e9n\u00e9rer plusieurs types de donn\u00e9es :<br>texte,<br>images,<br>audio,<br>vid\u00e9o,<br>code.<br>Les mod\u00e8les frontier modernes sont nativement multimodaux.<br>\u00c9tend les LLM bien au-del\u00e0 des interactions textuelles.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe1 Quantisation</h2><p class=\"node-desc\">R\u00e9duire la pr\u00e9cision num\u00e9rique d'un mod\u00e8le (ex. FP32 \u2192 INT8 ou INT4) pour diminuer sa taille et son empreinte m\u00e9moire.<br>Un mod\u00e8le 70B en pleine pr\u00e9cision n\u00e9cessite ~140 Go de VRAM. En quantisation 4 bits : ~35 Go \u2014 ex\u00e9cutable sur un seul GPU.<br>Compromis : l\u00e9g\u00e8re perte de qualit\u00e9, \u00e9conomies mat\u00e9rielles consid\u00e9rables.<br>Formats cl\u00e9s : GGUF (llama.cpp), AWQ, GPTQ, bitsandbytes.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 RLHF</h2><p class=\"node-desc\">Apprentissage par renforcement \u00e0 partir des retours humains.<br>La technique qui transforme un mod\u00e8le pr\u00e9-entra\u00een\u00e9 brut en assistant utile.<br>Processus : des annotateurs humains classent les sorties du mod\u00e8le \u2192 un mod\u00e8le de r\u00e9compense apprend ces pr\u00e9f\u00e9rences \u2192 le LLM est fine-tun\u00e9 pour maximiser la r\u00e9compense.<br>Utilis\u00e9 pour entra\u00eener ChatGPT, Claude, Gemini. L'\u00e9tape cl\u00e9 qui rend les mod\u00e8les utiles, honn\u00eates et s\u00fbrs.<br>Variantes : RLHF, RLAIF (feedback IA), DPO (plus simple, sans boucle RL).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CONCEPTS FONDAMENTAUX</div><h2>\ud83d\udfe2 Temp\u00e9rature</h2><p class=\"node-desc\">Un param\u00e8tre (0\u20132) qui contr\u00f4le le caract\u00e8re al\u00e9atoire des sorties du mod\u00e8le.<br>Bas (0) : d\u00e9terministe, toujours le token le plus probable \u2014 id\u00e9al pour le code, les donn\u00e9es structur\u00e9es.<br>\u00c9lev\u00e9 (1+) : cr\u00e9atif et vari\u00e9 \u2014 id\u00e9al pour le brainstorming, l'\u00e9criture.<br>Param\u00e8tres associ\u00e9s : top_p (nucleus sampling), top_k.<br>D\u00e9fini au moment de l'inf\u00e9rence. N'affecte pas les poids du mod\u00e8le.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">30 concepts</p><p class=\"stat\">5 couches</p><p class=\"generated-from\">LLM & AI Ecosystem</p></div></div>"] };
let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
