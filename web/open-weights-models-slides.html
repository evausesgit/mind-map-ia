<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Open Source / Weights Models</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>CURRENT MODELS</h2><ul><li>\ud83d\udfe2 <strong>Llama 3.3 (70B)</strong> \u2014 Meta's most capable open-weights model.</li><li>\ud83d\udd35 <strong>Llama 4</strong> \u2014 Meta's next-generation model.</li><li>\ud83d\udfe2 <strong>Mixtral 8x22B</strong> \u2014 Mistral's most capable open-weights model.</li><li>\ud83d\udfe2 <strong>DeepSeek-V3</strong> \u2014 685B MoE model, 37B active per token.</li><li>\ud83d\udd35 <strong>DeepSeek-R1</strong> \u2014 First open-weights reasoning model matching OpenAI o1 performance.\nUses reinforcement learning (GRPO) to develop chain-of-thought reasoning without supervised data.\n671B parameters, MIT license.</li><li>\ud83d\udfe1 <strong>Gemma 3</strong> \u2014 Google's latest open-weights release.</li><li>\ud83d\udfe2 <strong>Qwen2.5-72B</strong> \u2014 Alibaba's flagship open-weights model.</li><li>\ud83d\udfe2 <strong>Qwen2.5-Coder</strong> \u2014 Qwen's specialized code model (7B, 14B, 32B variants).</li><li>\ud83d\udfe2 <strong>Phi-4 (14B)</strong> \u2014 Microsoft's best SLM.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>MODEL FAMILIES</h2><ul><li>\ud83d\udfe1 <strong>Llama</strong> \u2014 Meta's flagship open-weights model family.</li><li>\ud83d\udfe1 <strong>Mistral / Mixtral</strong> \u2014 Two lines from Mistral AI: dense models (Mistral 7B, Mistral Small) and\nMixture-of-Experts models (Mixtral 8x7B, Mixtral 8x22B).\nMoE architecture activates only a subset of parameters per token,\ngiving GPT-4 class quality at inference costs of much smaller models..</li><li>\ud83d\udd35 <strong>DeepSeek</strong> \u2014 DeepSeek's model line, covering general-purpose (V series) and reasoning (R series) models.\nDeepSeek-V3: a MoE model matching GPT-4o at ~5% of the training cost.\nDeepSeek-R1: first open-weights reasoning model matching OpenAI o1.\nBoth released under MIT license \u2014 fully permissive for commercial use..</li><li>\ud83d\udfe1 <strong>Gemma</strong> \u2014 Google's open-weights model family, built on the same research as Gemini but designed\nfor local and edge deployment.</li><li>\ud83d\udfe1 <strong>Qwen</strong> \u2014 Alibaba's open-weights model family.</li><li>\ud83d\udfe1 <strong>Phi</strong> \u2014 Microsoft's Small Language Model family.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>ORGANIZATIONS</h2><ul><li>\ud83d\udfe2 <strong>Meta AI</strong> \u2014 Meta's AI research division.</li><li>\ud83d\udfe2 <strong>Mistral AI</strong> \u2014 French startup founded by former DeepMind and Meta researchers.\nReleased the first competitive open-weights models rivaling GPT-3.5 at a fraction of the size.\nPioneered Mixture-of-Experts (MoE) architecture at scale with Mixtral 8x7B.\nHybrid strategy: open-weights community models + commercial API (Mistral Large)..</li><li>\ud83d\udfe1 <strong>DeepSeek</strong> \u2014 Chinese AI lab backed by the quant fund High-Flyer.</li><li>\ud83d\udfe2 <strong>Google</strong> \u2014 Google releases Gemma as its open-weights model family, separate from the proprietary Gemini series.\nGemma models are designed to run efficiently on consumer hardware and edge devices.\nTight integration with Google's developer ecosystem (Keras, JAX, Vertex AI)..</li><li>\ud83d\udfe2 <strong>Microsoft</strong> \u2014 Microsoft's Phi series challenges the assumption that bigger is always better.\nSmall Language Models (SLMs) trained on high-quality curated data (\"textbook quality\")\noutperform much larger models on reasoning and coding benchmarks.\nOptimized for on-device and edge deployment..</li><li>\ud83d\udfe1 <strong>Alibaba / Qwen</strong> \u2014 Alibaba Cloud's AI research team.</li></ul>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Llama 3.3 (70B)</h2><p class=\"node-desc\">Meta's most capable open-weights model. At 70B parameters, matches or beats<br>GPT-4o on most benchmarks while running on a single A100 GPU.<br>The go-to base model for production open-weights deployments in 2025.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udd35 Llama 4</h2><p class=\"node-desc\">Meta's next-generation model. Introduces a MoE architecture for the first time in the Llama family.<br>Natively multimodal (text + vision). Multiple size variants targeting different use cases.<br>Marks Meta's move toward competing with frontier models, not just providing a base for fine-tuning.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Mixtral 8x22B</h2><p class=\"node-desc\">Mistral's most capable open-weights model. 8 experts of 22B parameters each,<br>141B total but only 39B active per token.<br>Strong multilingual capabilities (EN, FR, DE, ES, IT).<br>Best-in-class open-weights model for instruction following and coding before DeepSeek-V3.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 DeepSeek-V3</h2><p class=\"node-desc\">685B MoE model, 37B active per token. Trained for $5.5M \u2014 roughly 50x cheaper than comparable models.<br>Matches or beats GPT-4o and Claude 3.5 Sonnet on most benchmarks.<br>MIT license. Became the most downloaded model on HuggingFace within days of release.<br>Demonstrated that frontier performance is achievable without frontier-scale budgets.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udd35 DeepSeek-R1</h2><p class=\"node-desc\">First open-weights reasoning model matching OpenAI o1 performance.<br>Uses reinforcement learning (GRPO) to develop chain-of-thought reasoning without supervised data.<br>671B parameters, MIT license. Distilled versions available (7B\u201370B) for local deployment.<br>Caused a significant drop in AI company stock prices on release day (Jan 2025).</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe1 Gemma 3</h2><p class=\"node-desc\">Google's latest open-weights release. Available in 1B, 4B, 12B and 27B variants.<br>Natively multimodal (text + vision). 128k context window.<br>The 27B variant outperforms Llama 3.3 70B on several benchmarks despite being 2.5x smaller.<br>Optimized for Google's TPUs and consumer hardware alike.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Qwen2.5-72B</h2><p class=\"node-desc\">Alibaba's flagship open-weights model. 72B parameters, beats Llama 3.1 405B on several benchmarks.<br>128k context window. Strong on coding, math and instruction following.<br>Available in instruct and base variants. Apache 2.0 license.<br>The go-to open-weights model for teams needing strong multilingual (especially Chinese) support.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Qwen2.5-Coder</h2><p class=\"node-desc\">Qwen's specialized code model (7B, 14B, 32B variants). The 32B version matches<br>GPT-4o on HumanEval and competitive coding benchmarks.<br>Supports 92 programming languages. Strong at code completion, debugging and explanation.<br>Widely used as the backend for enterprise coding assistants in Asia.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Phi-4 (14B)</h2><p class=\"node-desc\">Microsoft's best SLM. 14B parameters, but beats models 3-5x its size on STEM reasoning.<br>Trained on synthetic \"textbook quality\" data generated by GPT-4.<br>Runs on a laptop GPU (RTX 3080 or better). MIT license.<br>Ideal for local, private deployments where a small but capable model is needed.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Llama</h2><p class=\"node-desc\">Meta's flagship open-weights model family. The most widely downloaded and fine-tuned models on HuggingFace.<br>Used as the base for hundreds of specialized models (coding, medical, multilingual\u2026).<br>Llama 3 (2024) established a new quality bar for open weights.<br>Available in 8B, 70B and 405B parameter variants.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Mistral / Mixtral</h2><p class=\"node-desc\">Two lines from Mistral AI: dense models (Mistral 7B, Mistral Small) and<br>Mixture-of-Experts models (Mixtral 8x7B, Mixtral 8x22B).<br>MoE architecture activates only a subset of parameters per token,<br>giving GPT-4 class quality at inference costs of much smaller models.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udd35 DeepSeek</h2><p class=\"node-desc\">DeepSeek's model line, covering general-purpose (V series) and reasoning (R series) models.<br>DeepSeek-V3: a MoE model matching GPT-4o at ~5% of the training cost.<br>DeepSeek-R1: first open-weights reasoning model matching OpenAI o1.<br>Both released under MIT license \u2014 fully permissive for commercial use.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Gemma</h2><p class=\"node-desc\">Google's open-weights model family, built on the same research as Gemini but designed<br>for local and edge deployment. Optimized for consumer GPUs and mobile devices.<br>Available in 2B, 7B, 9B and 27B variants.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Qwen</h2><p class=\"node-desc\">Alibaba's open-weights model family. Available in sizes from 0.5B to 72B+.<br>Exceptionally strong in Chinese and English, with solid multilingual coverage.<br>Qwen2.5 set new benchmarks for open-weights models in late 2024.<br>Qwen2.5-Coder is one of the top open-weights models for code generation.<br>Used extensively in production at scale across Asia and increasingly globally.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Phi</h2><p class=\"node-desc\">Microsoft's Small Language Model family. Proves that data quality beats data quantity:<br>Phi models trained on curated \"textbook quality\" data outperform much larger models.<br>Phi-4 (14B) beats models 3-5x its size on math and coding.<br>Designed for on-device deployment on phones and laptops.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe2 Meta AI</h2><p class=\"node-desc\">Meta's AI research division. Released the Llama series as open weights,<br>triggering the open-source LLM revolution.<br>Llama models are the most widely used base models for fine-tuning and research worldwide.<br>Strategic bet: commoditize the model layer to benefit Meta's platforms.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe2 Mistral AI</h2><p class=\"node-desc\">French startup founded by former DeepMind and Meta researchers.<br>Released the first competitive open-weights models rivaling GPT-3.5 at a fraction of the size.<br>Pioneered Mixture-of-Experts (MoE) architecture at scale with Mixtral 8x7B.<br>Hybrid strategy: open-weights community models + commercial API (Mistral Large).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe1 DeepSeek</h2><p class=\"node-desc\">Chinese AI lab backed by the quant fund High-Flyer. Caused a market shock in early 2025<br>by releasing DeepSeek-R1 \u2014 a reasoning model matching o1 performance at a fraction of the training cost.<br>Open-weights releases have dramatically pushed the efficiency frontier.<br>Demonstrated that frontier-quality models don't require frontier-level compute budgets.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe2 Google</h2><p class=\"node-desc\">Google releases Gemma as its open-weights model family, separate from the proprietary Gemini series.<br>Gemma models are designed to run efficiently on consumer hardware and edge devices.<br>Tight integration with Google's developer ecosystem (Keras, JAX, Vertex AI).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe2 Microsoft</h2><p class=\"node-desc\">Microsoft's Phi series challenges the assumption that bigger is always better.<br>Small Language Models (SLMs) trained on high-quality curated data (\"textbook quality\")<br>outperform much larger models on reasoning and coding benchmarks.<br>Optimized for on-device and edge deployment.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANIZATIONS</div><h2>\ud83d\udfe1 Alibaba / Qwen</h2><p class=\"node-desc\">Alibaba Cloud's AI research team. Releases the Qwen (\u901a\u4e49\u5343\u95ee) model family as open weights.<br>One of the most capable multilingual model families, with exceptional Chinese + English performance.<br>Widely used in enterprise settings in Asia and increasingly in Europe.<br>Qwen models are the most downloaded non-Western open-weights models on HuggingFace.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">21 concepts</p><p class=\"stat\">3 layers</p><p class=\"generated-from\">Open Source / Weights Models</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Mod\u00e8les Open Source / Weights</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>MOD\u00c8LES ACTUELS</h2><ul><li>\ud83d\udfe2 <strong>Llama 3.3 (70B)</strong> \u2014 Le mod\u00e8le open weights le plus puissant de Meta.</li><li>\ud83d\udd35 <strong>Llama 4</strong> \u2014 Le mod\u00e8le nouvelle g\u00e9n\u00e9ration de Meta.</li><li>\ud83d\udfe2 <strong>Mixtral 8x22B</strong> \u2014 Le mod\u00e8le open weights le plus puissant de Mistral.</li><li>\ud83d\udfe2 <strong>DeepSeek-V3</strong> \u2014 Mod\u00e8le MoE de 685B, 37B actifs par token.</li><li>\ud83d\udd35 <strong>DeepSeek-R1</strong> \u2014 Premier mod\u00e8le de raisonnement open weights comparable aux performances d'OpenAI o1.\nUtilise l'apprentissage par renforcement (GRPO) pour d\u00e9velopper un raisonnement cha\u00eene-de-pens\u00e9e sans donn\u00e9es supervis\u00e9es.\n671B param\u00e8tres, licence MIT.</li><li>\ud83d\udfe1 <strong>Gemma 3</strong> \u2014 La derni\u00e8re publication open weights de Google.</li><li>\ud83d\udfe2 <strong>Qwen2.5-72B</strong> \u2014 Le mod\u00e8le open weights phare d'Alibaba.</li><li>\ud83d\udfe2 <strong>Qwen2.5-Coder</strong> \u2014 Le mod\u00e8le de code sp\u00e9cialis\u00e9 de Qwen (variantes 7B, 14B, 32B).</li><li>\ud83d\udfe2 <strong>Phi-4 (14B)</strong> \u2014 Le meilleur SLM de Microsoft.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>FAMILLES DE MOD\u00c8LES</h2><ul><li>\ud83d\udfe1 <strong>Llama</strong> \u2014 La famille de mod\u00e8les open weights phare de Meta.</li><li>\ud83d\udfe1 <strong>Mistral / Mixtral</strong> \u2014 Deux lignes chez Mistral AI : mod\u00e8les denses (Mistral 7B, Mistral Small) et\nmod\u00e8les Mixture-of-Experts (Mixtral 8x7B, Mixtral 8x22B).\nL'architecture MoE n'active qu'un sous-ensemble de param\u00e8tres par token,\noffrant une qualit\u00e9 comparable \u00e0 GPT-4 au co\u00fbt d'inf\u00e9rence de mod\u00e8les bien plus petits..</li><li>\ud83d\udd35 <strong>DeepSeek</strong> \u2014 La gamme de mod\u00e8les DeepSeek, couvrant les mod\u00e8les polyvalents (s\u00e9rie V) et de raisonnement (s\u00e9rie R).\nDeepSeek-V3 : un mod\u00e8le MoE comparable \u00e0 GPT-4o \u00e0 ~5% du co\u00fbt d'entra\u00eenement.\nDeepSeek-R1 : premier mod\u00e8le de raisonnement open weights comparable \u00e0 o1 d'OpenAI.\nLes deux publi\u00e9s sous licence MIT \u2014 enti\u00e8rement permissifs pour usage commercial..</li><li>\ud83d\udfe1 <strong>Gemma</strong> \u2014 La famille de mod\u00e8les open weights de Google, construite sur la m\u00eame recherche que Gemini\nmais con\u00e7ue pour le d\u00e9ploiement local et edge.</li><li>\ud83d\udfe1 <strong>Qwen</strong> \u2014 La famille de mod\u00e8les open weights d'Alibaba.</li><li>\ud83d\udfe1 <strong>Phi</strong> \u2014 La famille de Small Language Models de Microsoft.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>ORGANISATIONS</h2><ul><li>\ud83d\udfe2 <strong>Meta AI</strong> \u2014 La division IA de Meta.</li><li>\ud83d\udfe2 <strong>Mistral AI</strong> \u2014 Startup fran\u00e7aise fond\u00e9e par d'anciens chercheurs de DeepMind et Meta.\nA publi\u00e9 les premiers mod\u00e8les open weights comp\u00e9titifs rivalisant avec GPT-3.5 \u00e0 une fraction de la taille.\nA popularis\u00e9 l'architecture Mixture-of-Experts (MoE) \u00e0 grande \u00e9chelle avec Mixtral 8x7B.\nStrat\u00e9gie hybride : mod\u00e8les communautaires open weights + API commerciale (Mistral Large)..</li><li>\ud83d\udfe1 <strong>DeepSeek</strong> \u2014 Laboratoire IA chinois soutenu par le fonds quantitatif High-Flyer.</li><li>\ud83d\udfe2 <strong>Google</strong> \u2014 Google publie Gemma comme sa famille de mod\u00e8les open weights, distincte de la s\u00e9rie Gemini propri\u00e9taire.\nLes mod\u00e8les Gemma sont con\u00e7us pour tourner efficacement sur du mat\u00e9riel grand public et des appareils edge.\nInt\u00e9gration \u00e9troite avec l'\u00e9cosyst\u00e8me d\u00e9veloppeurs de Google (Keras, JAX, Vertex AI)..</li><li>\ud83d\udfe2 <strong>Microsoft</strong> \u2014 La s\u00e9rie Phi de Microsoft remet en question l'id\u00e9e que plus grand est toujours meilleur.\nDes Small Language Models (SLM) entra\u00een\u00e9s sur des donn\u00e9es de haute qualit\u00e9 (\"qualit\u00e9 manuel scolaire\")\nsurpassent des mod\u00e8les bien plus grands sur les benchmarks de raisonnement et de code.\nOptimis\u00e9s pour le d\u00e9ploiement on-device et edge..</li><li>\ud83d\udfe1 <strong>Alibaba / Qwen</strong> \u2014 L'\u00e9quipe de recherche IA d'Alibaba Cloud.</li></ul>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Llama 3.3 (70B)</h2><p class=\"node-desc\">Le mod\u00e8le open weights le plus puissant de Meta. \u00c0 70B param\u00e8tres, \u00e9gale ou d\u00e9passe<br>GPT-4o sur la plupart des benchmarks tout en tournant sur un seul GPU A100.<br>Le mod\u00e8le de base de r\u00e9f\u00e9rence pour les d\u00e9ploiements open weights en production en 2025.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udd35 Llama 4</h2><p class=\"node-desc\">Le mod\u00e8le nouvelle g\u00e9n\u00e9ration de Meta. Introduit une architecture MoE pour la premi\u00e8re fois dans la famille Llama.<br>Nativement multimodal (texte + vision). Plusieurs variantes de taille ciblant diff\u00e9rents cas d'usage.<br>Marque le passage de Meta \u00e0 la comp\u00e9tition avec les mod\u00e8les frontier, pas seulement comme base de fine-tuning.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Mixtral 8x22B</h2><p class=\"node-desc\">Le mod\u00e8le open weights le plus puissant de Mistral. 8 experts de 22B param\u00e8tres chacun,<br>141B au total mais seulement 39B actifs par token.<br>Solides capacit\u00e9s multilingues (EN, FR, DE, ES, IT).<br>Meilleur mod\u00e8le open weights pour le suivi d'instructions et le code avant DeepSeek-V3.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 DeepSeek-V3</h2><p class=\"node-desc\">Mod\u00e8le MoE de 685B, 37B actifs par token. Entra\u00een\u00e9 pour 5,5M$ \u2014 environ 50x moins cher que des mod\u00e8les comparables.<br>\u00c9gale ou d\u00e9passe GPT-4o et Claude 3.5 Sonnet sur la plupart des benchmarks.<br>Licence MIT. Est devenu le mod\u00e8le le plus t\u00e9l\u00e9charg\u00e9 sur HuggingFace en quelques jours.<br>A d\u00e9montr\u00e9 que les performances frontier sont atteignables sans budgets \u00e0 l'\u00e9chelle frontier.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udd35 DeepSeek-R1</h2><p class=\"node-desc\">Premier mod\u00e8le de raisonnement open weights comparable aux performances d'OpenAI o1.<br>Utilise l'apprentissage par renforcement (GRPO) pour d\u00e9velopper un raisonnement cha\u00eene-de-pens\u00e9e sans donn\u00e9es supervis\u00e9es.<br>671B param\u00e8tres, licence MIT. Versions distill\u00e9es disponibles (7B\u201370B) pour d\u00e9ploiement local.<br>A provoqu\u00e9 une chute significative des cours des actions des soci\u00e9t\u00e9s IA le jour de sa sortie (jan 2025).</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe1 Gemma 3</h2><p class=\"node-desc\">La derni\u00e8re publication open weights de Google. Disponible en variantes 1B, 4B, 12B et 27B.<br>Nativement multimodal (texte + vision). Fen\u00eatre de contexte de 128k tokens.<br>La variante 27B surpasse Llama 3.3 70B sur plusieurs benchmarks malgr\u00e9 une taille 2,5x inf\u00e9rieure.<br>Optimis\u00e9 pour les TPU de Google et le mat\u00e9riel grand public.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Qwen2.5-72B</h2><p class=\"node-desc\">Le mod\u00e8le open weights phare d'Alibaba. 72B param\u00e8tres, d\u00e9passe Llama 3.1 405B sur plusieurs benchmarks.<br>Fen\u00eatre de contexte 128k. Solide en code, maths et suivi d'instructions.<br>Disponible en variantes instruct et base. Licence Apache 2.0.<br>Le mod\u00e8le open weights de r\u00e9f\u00e9rence pour les \u00e9quipes ayant besoin de support multilingue fort (notamment chinois).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Qwen2.5-Coder</h2><p class=\"node-desc\">Le mod\u00e8le de code sp\u00e9cialis\u00e9 de Qwen (variantes 7B, 14B, 32B). La version 32B \u00e9gale<br>GPT-4o sur HumanEval et les benchmarks de code comp\u00e9titif.<br>Supporte 92 langages de programmation. Solide en compl\u00e9tion, d\u00e9bogage et explication de code.<br>Tr\u00e8s utilis\u00e9 comme backend pour les assistants de code en entreprise en Asie.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Phi-4 (14B)</h2><p class=\"node-desc\">Le meilleur SLM de Microsoft. 14B param\u00e8tres, mais d\u00e9passe des mod\u00e8les 3 \u00e0 5 fois plus grands en raisonnement STEM.<br>Entra\u00een\u00e9 sur des donn\u00e9es synth\u00e9tiques de \"qualit\u00e9 manuel scolaire\" g\u00e9n\u00e9r\u00e9es par GPT-4.<br>Tourne sur un GPU laptop (RTX 3080 ou mieux). Licence MIT.<br>Id\u00e9al pour les d\u00e9ploiements locaux et priv\u00e9s o\u00f9 un mod\u00e8le compact mais capable est n\u00e9cessaire.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udfe1 Llama</h2><p class=\"node-desc\">La famille de mod\u00e8les open weights phare de Meta. Les mod\u00e8les les plus t\u00e9l\u00e9charg\u00e9s et fine-tun\u00e9s sur HuggingFace.<br>Utilis\u00e9s comme base pour des centaines de mod\u00e8les sp\u00e9cialis\u00e9s (code, m\u00e9dical, multilingue\u2026).<br>Llama 3 (2024) a \u00e9tabli un nouveau standard de qualit\u00e9 pour l'open weights.<br>Disponible en variantes de 8B, 70B et 405B param\u00e8tres.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udfe1 Mistral / Mixtral</h2><p class=\"node-desc\">Deux lignes chez Mistral AI : mod\u00e8les denses (Mistral 7B, Mistral Small) et<br>mod\u00e8les Mixture-of-Experts (Mixtral 8x7B, Mixtral 8x22B).<br>L'architecture MoE n'active qu'un sous-ensemble de param\u00e8tres par token,<br>offrant une qualit\u00e9 comparable \u00e0 GPT-4 au co\u00fbt d'inf\u00e9rence de mod\u00e8les bien plus petits.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udd35 DeepSeek</h2><p class=\"node-desc\">La gamme de mod\u00e8les DeepSeek, couvrant les mod\u00e8les polyvalents (s\u00e9rie V) et de raisonnement (s\u00e9rie R).<br>DeepSeek-V3 : un mod\u00e8le MoE comparable \u00e0 GPT-4o \u00e0 ~5% du co\u00fbt d'entra\u00eenement.<br>DeepSeek-R1 : premier mod\u00e8le de raisonnement open weights comparable \u00e0 o1 d'OpenAI.<br>Les deux publi\u00e9s sous licence MIT \u2014 enti\u00e8rement permissifs pour usage commercial.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udfe1 Gemma</h2><p class=\"node-desc\">La famille de mod\u00e8les open weights de Google, construite sur la m\u00eame recherche que Gemini<br>mais con\u00e7ue pour le d\u00e9ploiement local et edge. Optimis\u00e9e pour les GPU grand public et mobiles.<br>Disponible en variantes 2B, 7B, 9B et 27B.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udfe1 Qwen</h2><p class=\"node-desc\">La famille de mod\u00e8les open weights d'Alibaba. Disponible en tailles de 0,5B \u00e0 72B+.<br>Exceptionnellement fort en chinois et anglais, avec une bonne couverture multilingue.<br>Qwen2.5 a \u00e9tabli de nouveaux benchmarks pour les mod\u00e8les open weights fin 2024.<br>Qwen2.5-Coder est l'un des meilleurs mod\u00e8les open weights pour la g\u00e9n\u00e9ration de code.<br>Utilis\u00e9 intensivement en production \u00e0 grande \u00e9chelle en Asie et de plus en plus dans le monde.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FAMILLES DE MOD\u00c8LES</div><h2>\ud83d\udfe1 Phi</h2><p class=\"node-desc\">La famille de Small Language Models de Microsoft. Prouve que la qualit\u00e9 des donn\u00e9es prime sur la quantit\u00e9 :<br>les mod\u00e8les Phi entra\u00een\u00e9s sur des donn\u00e9es de \"qualit\u00e9 manuel scolaire\" surpassent des mod\u00e8les bien plus grands.<br>Phi-4 (14B) d\u00e9passe des mod\u00e8les 3 \u00e0 5 fois plus grands en maths et code.<br>Con\u00e7u pour le d\u00e9ploiement on-device sur t\u00e9l\u00e9phones et laptops.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe2 Meta AI</h2><p class=\"node-desc\">La division IA de Meta. A publi\u00e9 la s\u00e9rie Llama en open weights,<br>d\u00e9clenchant la r\u00e9volution open source des LLM.<br>Les mod\u00e8les Llama sont les mod\u00e8les de base les plus utilis\u00e9s pour le fine-tuning et la recherche.<br>Pari strat\u00e9gique : commoditiser la couche mod\u00e8le pour b\u00e9n\u00e9ficier aux plateformes de Meta.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe2 Mistral AI</h2><p class=\"node-desc\">Startup fran\u00e7aise fond\u00e9e par d'anciens chercheurs de DeepMind et Meta.<br>A publi\u00e9 les premiers mod\u00e8les open weights comp\u00e9titifs rivalisant avec GPT-3.5 \u00e0 une fraction de la taille.<br>A popularis\u00e9 l'architecture Mixture-of-Experts (MoE) \u00e0 grande \u00e9chelle avec Mixtral 8x7B.<br>Strat\u00e9gie hybride : mod\u00e8les communautaires open weights + API commerciale (Mistral Large).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe1 DeepSeek</h2><p class=\"node-desc\">Laboratoire IA chinois soutenu par le fonds quantitatif High-Flyer. A caus\u00e9 un choc de march\u00e9 d\u00e9but 2025<br>en publiant DeepSeek-R1 \u2014 un mod\u00e8le de raisonnement comparable \u00e0 o1 \u00e0 une fraction du co\u00fbt d'entra\u00eenement.<br>Les publications open weights ont consid\u00e9rablement repouss\u00e9 la fronti\u00e8re d'efficacit\u00e9.<br>A d\u00e9montr\u00e9 que des mod\u00e8les de qualit\u00e9 frontier ne n\u00e9cessitent pas des budgets de calcul frontier.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe2 Google</h2><p class=\"node-desc\">Google publie Gemma comme sa famille de mod\u00e8les open weights, distincte de la s\u00e9rie Gemini propri\u00e9taire.<br>Les mod\u00e8les Gemma sont con\u00e7us pour tourner efficacement sur du mat\u00e9riel grand public et des appareils edge.<br>Int\u00e9gration \u00e9troite avec l'\u00e9cosyst\u00e8me d\u00e9veloppeurs de Google (Keras, JAX, Vertex AI).</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe2 Microsoft</h2><p class=\"node-desc\">La s\u00e9rie Phi de Microsoft remet en question l'id\u00e9e que plus grand est toujours meilleur.<br>Des Small Language Models (SLM) entra\u00een\u00e9s sur des donn\u00e9es de haute qualit\u00e9 (\"qualit\u00e9 manuel scolaire\")<br>surpassent des mod\u00e8les bien plus grands sur les benchmarks de raisonnement et de code.<br>Optimis\u00e9s pour le d\u00e9ploiement on-device et edge.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">ORGANISATIONS</div><h2>\ud83d\udfe1 Alibaba / Qwen</h2><p class=\"node-desc\">L'\u00e9quipe de recherche IA d'Alibaba Cloud. Publie la famille de mod\u00e8les Qwen (\u901a\u4e49\u5343\u95ee) en open weights.<br>L'une des familles de mod\u00e8les multilingues les plus performantes, avec d'excellentes performances en chinois et anglais.<br>Tr\u00e8s utilis\u00e9e en entreprise en Asie et de plus en plus en Europe.<br>Les mod\u00e8les Qwen sont les mod\u00e8les open weights non-occidentaux les plus t\u00e9l\u00e9charg\u00e9s sur HuggingFace.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">21 concepts</p><p class=\"stat\">3 couches</p><p class=\"generated-from\">Mod\u00e8les Open Source / Weights</p></div></div>"] };
