const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Proprietary Models</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>CURRENT MODELS</h2><ul><li>\ud83d\udfe2 <strong>GPT-4o</strong> \u2014 \"Omni\" model \u2014 fast, cheap, natively multimodal (text + vision + audio).\nThe default OpenAI API model for most production use cases.\nStrong at coding, reasoning, and instruction following..</li><li>\ud83d\udfe2 <strong>GPT-4.1</strong> \u2014 Optimized for coding and instruction following with 128k context window.\nLower cost than GPT-4o while maintaining strong performance on software tasks.\nAvailable in mini and nano variants for cost-sensitive applications..</li><li>\ud83d\udfe1 <strong>GPT-4.5</strong> \u2014 OpenAI's most capable general-purpose model.</li><li>\ud83d\udd35 <strong>o3</strong> \u2014 OpenAI's flagship reasoning model.</li><li>\ud83d\udfe2 <strong>Claude 3.5 Sonnet</strong> \u2014 Anthropic's most popular model.</li><li>\ud83d\udfe1 <strong>Claude 3.7 Sonnet</strong> \u2014 Adds \"extended thinking\" \u2014 the model can reason at length before answering.\n200k context window.</li><li>\ud83d\udfe1 <strong>Gemini 2.5 Pro</strong> \u2014 Google's most capable model.</li><li>\ud83d\udfe2 <strong>Gemini 2.0 Flash</strong> \u2014 Google's fastest and most cost-efficient model.</li><li>\ud83d\udd35 <strong>Grok 3</strong> \u2014 xAI's most capable model.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>MODEL FAMILIES</h2><ul><li>\ud83d\udfe1 <strong>GPT</strong> \u2014 OpenAI's main line of general-purpose chat and API models.\nGPT-3 (2020) proved scale, GPT-4 (2023) set the multimodal standard.\nUsed by millions of developers as the default API for text generation tasks..</li><li>\ud83d\udd35 <strong>o-Series</strong> \u2014 OpenAI's reasoning-first model line.</li><li>\ud83d\udfe1 <strong>Claude</strong> \u2014 Anthropic's flagship model family.</li><li>\ud83d\udfe1 <strong>Gemini</strong> \u2014 Google DeepMind's flagship model family.</li><li>\ud83d\udd35 <strong>Grok</strong> \u2014 xAI's model family.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>AI LABS</h2><ul><li>\ud83d\udfe2 <strong>OpenAI</strong> \u2014 Founded in 2015, OpenAI created the GPT series and ChatGPT \u2014 the product that triggered the\ncurrent AI wave.</li><li>\ud83d\udfe2 <strong>Anthropic</strong> \u2014 Founded in 2021 by former OpenAI leaders, Anthropic focuses on AI safety research.\nIntroduced Constitutional AI (CAI) and developed the Model Context Protocol (MCP).\nClaude 3.5 Sonnet and Claude 3.7 are widely used in production coding workflows..</li><li>\ud83d\udfe2 <strong>Google DeepMind</strong> \u2014 Merger of Google Brain and DeepMind (2023).</li><li>\ud83d\udfe1 <strong>xAI</strong> \u2014 Elon Musk's AI company, founded in 2023.</li></ul>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 GPT-4o</h2><p class=\"node-desc\">\"Omni\" model \u2014 fast, cheap, natively multimodal (text + vision + audio).<br>The default OpenAI API model for most production use cases.<br>Strong at coding, reasoning, and instruction following.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 GPT-4.1</h2><p class=\"node-desc\">Optimized for coding and instruction following with 128k context window.<br>Lower cost than GPT-4o while maintaining strong performance on software tasks.<br>Available in mini and nano variants for cost-sensitive applications.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe1 GPT-4.5</h2><p class=\"node-desc\">OpenAI's most capable general-purpose model. Strong at nuanced writing, complex reasoning<br>and following subtle instructions. Higher cost \u2014 best reserved for hard tasks<br>where output quality matters most.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udd35 o3</h2><p class=\"node-desc\">OpenAI's flagship reasoning model. Achieves frontier scores on math olympiad, competitive<br>coding (Codeforces), and scientific benchmarks.<br>Uses extended chain-of-thought with variable \"thinking budget\" for cost/quality tradeoff.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Claude 3.5 Sonnet</h2><p class=\"node-desc\">Anthropic's most popular model. Best-in-class for software development and code editing.<br>Combines strong reasoning with fast response times and a 200k context window.<br>Widely used as the default model in Cursor, GitHub Copilot and other coding tools.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe1 Claude 3.7 Sonnet</h2><p class=\"node-desc\">Adds \"extended thinking\" \u2014 the model can reason at length before answering.<br>200k context window. Significantly better at complex multi-step tasks.<br>Marks Anthropic's entry into the reasoning model space, alongside o3 and Grok 3.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe1 Gemini 2.5 Pro</h2><p class=\"node-desc\">Google's most capable model. Top scores on major coding and reasoning benchmarks (2025).<br>1M token context window \u2014 can process entire codebases or long documents in one call.<br>Natively multimodal: text, image, audio, video, code.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udfe2 Gemini 2.0 Flash</h2><p class=\"node-desc\">Google's fastest and most cost-efficient model. Extremely low latency with vision support.<br>Default choice for high-volume, cost-sensitive production workloads at Google scale.<br>Strong multimodal capabilities at a fraction of Pro's cost.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CURRENT MODELS</div><h2>\ud83d\udd35 Grok 3</h2><p class=\"node-desc\">xAI's most capable model. Competitive with GPT-4o and Claude 3.5 on most benchmarks.<br>Unique access to real-time X (Twitter) data.<br>Introduces \"think mode\" \u2014 extended reasoning before answering.<br>Available via xAI API and X Premium subscription.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 GPT</h2><p class=\"node-desc\">OpenAI's main line of general-purpose chat and API models.<br>GPT-3 (2020) proved scale, GPT-4 (2023) set the multimodal standard.<br>Used by millions of developers as the default API for text generation tasks.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udd35 o-Series</h2><p class=\"node-desc\">OpenAI's reasoning-first model line. These models \"think\" step-by-step before responding.<br>Best for complex logic, math, research and multi-step problem solving.<br>Higher latency and cost than GPT \u2014 worth it for hard tasks.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Claude</h2><p class=\"node-desc\">Anthropic's flagship model family. Three tiers: Haiku (fast/cheap), Sonnet (balanced), Opus (most capable).<br>Known for following instructions precisely, long-context reliability, and clean long-form output.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udfe1 Gemini</h2><p class=\"node-desc\">Google DeepMind's flagship model family. Three tiers: Flash (fast), Pro (balanced), Ultra (most capable).<br>Natively multimodal. Tight integration with Google Workspace, Search, and Android.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MODEL FAMILIES</div><h2>\ud83d\udd35 Grok</h2><p class=\"node-desc\">xAI's model family. Unique differentiator: real-time access to X (Twitter) data.<br>Grok 3 introduced \"think mode\" \u2014 a reasoning layer similar to OpenAI's o-series.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">AI LABS</div><h2>\ud83d\udfe2 OpenAI</h2><p class=\"node-desc\">Founded in 2015, OpenAI created the GPT series and ChatGPT \u2014 the product that triggered the<br>current AI wave. Shifted from non-profit to capped-profit.<br>Controls the largest share of the commercial LLM market via its API.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI LABS</div><h2>\ud83d\udfe2 Anthropic</h2><p class=\"node-desc\">Founded in 2021 by former OpenAI leaders, Anthropic focuses on AI safety research.<br>Introduced Constitutional AI (CAI) and developed the Model Context Protocol (MCP).<br>Claude 3.5 Sonnet and Claude 3.7 are widely used in production coding workflows.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI LABS</div><h2>\ud83d\udfe2 Google DeepMind</h2><p class=\"node-desc\">Merger of Google Brain and DeepMind (2023). World-class research lab behind AlphaFold and Gemini.<br>Has unique advantages: access to Google's infrastructure, Search, YouTube, and Android.<br>Gemini 2.5 Pro is among the top-performing models of 2025-2026.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI LABS</div><h2>\ud83d\udfe1 xAI</h2><p class=\"node-desc\">Elon Musk's AI company, founded in 2023. Creator of the Grok series.<br>Deeply integrated with X (Twitter), giving Grok unique access to real-time social data.<br>Open-sourced Grok-1 weights (314B parameters).</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">18 concepts</p><p class=\"stat\">3 layers</p><p class=\"generated-from\">Proprietary Models</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Mod\u00e8les Propri\u00e9taires</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>MOD\u00c8LES ACTUELS</h2><ul><li>\ud83d\udfe2 <strong>GPT-4o</strong> \u2014 Mod\u00e8le \"Omni\" \u2014 rapide, \u00e9conomique, nativement multimodal (texte + vision + audio).\nLe mod\u00e8le API OpenAI par d\u00e9faut pour la plupart des cas d'usage en production.\nSolide en code, raisonnement et suivi d'instructions..</li><li>\ud83d\udfe2 <strong>GPT-4.1</strong> \u2014 Optimis\u00e9 pour le code et le suivi d'instructions avec une fen\u00eatre de contexte de 128k tokens.\nCo\u00fbt inf\u00e9rieur \u00e0 GPT-4o tout en maintenant de bonnes performances sur les t\u00e2ches logicielles.\nDisponible en variantes mini et nano pour les applications sensibles au co\u00fbt..</li><li>\ud83d\udfe1 <strong>GPT-4.5</strong> \u2014 Le mod\u00e8le polyvalent le plus puissant d'OpenAI.</li><li>\ud83d\udd35 <strong>o3</strong> \u2014 Le mod\u00e8le de raisonnement phare d'OpenAI.</li><li>\ud83d\udfe2 <strong>Claude 3.5 Sonnet</strong> \u2014 Le mod\u00e8le le plus populaire d'Anthropic.</li><li>\ud83d\udfe1 <strong>Claude 3.7 Sonnet</strong> \u2014 Ajoute le \"extended thinking\" \u2014 le mod\u00e8le peut raisonner longuement avant de r\u00e9pondre.\nContexte de 200k tokens.</li><li>\ud83d\udfe1 <strong>Gemini 2.5 Pro</strong> \u2014 Le mod\u00e8le le plus puissant de Google.</li><li>\ud83d\udfe2 <strong>Gemini 2.0 Flash</strong> \u2014 Le mod\u00e8le le plus rapide et \u00e9conomique de Google.</li><li>\ud83d\udd35 <strong>Grok 3</strong> \u2014 Le mod\u00e8le le plus puissant de xAI.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>FAMILLES DE MOD\u00c8LES</h2><ul><li>\ud83d\udfe1 <strong>GPT</strong> \u2014 La principale gamme de mod\u00e8les de chat et API d'OpenAI.\nGPT-3 (2020) a prouv\u00e9 la scalabilit\u00e9, GPT-4 (2023) a \u00e9tabli le standard multimodal.\nUtilis\u00e9s par des millions de d\u00e9veloppeurs comme API par d\u00e9faut..</li><li>\ud83d\udd35 <strong>S\u00e9rie o</strong> \u2014 La gamme de mod\u00e8les ax\u00e9e sur le raisonnement d'OpenAI.\nCes mod\u00e8les \"r\u00e9fl\u00e9chissent\" \u00e9tape par \u00e9tape avant de r\u00e9pondre.\nId\u00e9aux pour la logique complexe, les maths et la r\u00e9solution de probl\u00e8mes multi-\u00e9tapes..</li><li>\ud83d\udfe1 <strong>Claude</strong> \u2014 La famille de mod\u00e8les phare d'Anthropic.</li><li>\ud83d\udfe1 <strong>Gemini</strong> \u2014 La famille de mod\u00e8les phare de Google DeepMind.</li><li>\ud83d\udd35 <strong>Grok</strong> \u2014 La famille de mod\u00e8les de xAI.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>LABORATOIRES IA</h2><ul><li>\ud83d\udfe2 <strong>OpenAI</strong> \u2014 Fond\u00e9 en 2015, OpenAI a cr\u00e9\u00e9 la s\u00e9rie GPT et ChatGPT \u2014 le produit qui a d\u00e9clench\u00e9\nla vague IA actuelle.</li><li>\ud83d\udfe2 <strong>Anthropic</strong> \u2014 Fond\u00e9 en 2021 par d'anciens dirigeants d'OpenAI, Anthropic se concentre sur la s\u00e9curit\u00e9 IA.\nA introduit le Constitutional AI (CAI) et d\u00e9velopp\u00e9 le Model Context Protocol (MCP).\nClaude 3.5 Sonnet et Claude 3.7 sont tr\u00e8s utilis\u00e9s dans les workflows de code en production..</li><li>\ud83d\udfe2 <strong>Google DeepMind</strong> \u2014 Fusion de Google Brain et DeepMind (2023).</li><li>\ud83d\udfe1 <strong>xAI</strong> \u2014 La soci\u00e9t\u00e9 IA d'Elon Musk, fond\u00e9e en 2023.</li></ul>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 GPT-4o</h2><p class=\"node-desc\">Mod\u00e8le \"Omni\" \u2014 rapide, \u00e9conomique, nativement multimodal (texte + vision + audio).<br>Le mod\u00e8le API OpenAI par d\u00e9faut pour la plupart des cas d'usage en production.<br>Solide en code, raisonnement et suivi d'instructions.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 GPT-4.1</h2><p class=\"node-desc\">Optimis\u00e9 pour le code et le suivi d'instructions avec une fen\u00eatre de contexte de 128k tokens.<br>Co\u00fbt inf\u00e9rieur \u00e0 GPT-4o tout en maintenant de bonnes performances sur les t\u00e2ches logicielles.<br>Disponible en variantes mini et nano pour les applications sensibles au co\u00fbt.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe1 GPT-4.5</h2><p class=\"node-desc\">Le mod\u00e8le polyvalent le plus puissant d'OpenAI. Excellent en \u00e9criture nuanc\u00e9e, raisonnement<br>complexe et suivi d'instructions subtiles. Co\u00fbt \u00e9lev\u00e9 \u2014 \u00e0 r\u00e9server pour les t\u00e2ches difficiles<br>o\u00f9 la qualit\u00e9 de sortie prime.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udd35 o3</h2><p class=\"node-desc\">Le mod\u00e8le de raisonnement phare d'OpenAI. Atteint des scores frontier en olympiades de maths,<br>code comp\u00e9titif (Codeforces) et benchmarks scientifiques.<br>Utilise une cha\u00eene de pens\u00e9e \u00e9tendue avec un \"budget de r\u00e9flexion\" variable.</p><span class=\"slide-status status-emerging\">emerging</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Claude 3.5 Sonnet</h2><p class=\"node-desc\">Le mod\u00e8le le plus populaire d'Anthropic. Meilleur de sa cat\u00e9gorie pour le d\u00e9veloppement logiciel.<br>Combine un raisonnement solide avec des temps de r\u00e9ponse rapides et un contexte de 200k tokens.<br>Tr\u00e8s utilis\u00e9 comme mod\u00e8le par d\u00e9faut dans Cursor, GitHub Copilot et autres outils de code.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe1 Claude 3.7 Sonnet</h2><p class=\"node-desc\">Ajoute le \"extended thinking\" \u2014 le mod\u00e8le peut raisonner longuement avant de r\u00e9pondre.<br>Contexte de 200k tokens. Bien meilleur sur les t\u00e2ches multi-\u00e9tapes complexes.<br>Marque l'entr\u00e9e d'Anthropic dans l'espace des mod\u00e8les de raisonnement.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe1 Gemini 2.5 Pro</h2><p class=\"node-desc\">Le mod\u00e8le le plus puissant de Google. Meilleurs scores sur les benchmarks de code et raisonnement (2025).<br>Fen\u00eatre de contexte de 1M tokens \u2014 peut traiter des bases de code enti\u00e8res en un seul appel.<br>Nativement multimodal : texte, image, audio, vid\u00e9o, code.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udfe2 Gemini 2.0 Flash</h2><p class=\"node-desc\">Le mod\u00e8le le plus rapide et \u00e9conomique de Google. Latence extr\u00eamement faible avec vision.<br>Choix par d\u00e9faut pour les workloads de production \u00e0 fort volume chez Google.<br>Capacit\u00e9s multimodales solides \u00e0 une fraction du co\u00fbt de Pro.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">MOD\u00c8LES ACTUELS</div><h2>\ud83d\udd35 Grok 3</h2><p class=\"node-desc\">Le mod\u00e8le le plus puissant de xAI. Comp\u00e9titif avec GPT-4o et Claude 3.5 sur la plupart des benchmarks.<br>Acc\u00e8s unique aux donn\u00e9es X (Twitter) en temps r\u00e9el.<br>Introduit le \"think mode\" \u2014 raisonnement \u00e9tendu avant de r\u00e9pondre.<br>Disponible via l'API xAI et l'abonnement X Pr let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
