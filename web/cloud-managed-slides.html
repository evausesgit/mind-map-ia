const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Cloud Managed AI</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>KEY CAPABILITIES</h2><ul><li>\ud83d\udfe2 <strong>Private Endpoints</strong> \u2014 All major cloud AI platforms offer private network endpoints (VPC/VNet integration).\nYour API calls never traverse the public internet \u2014 traffic stays within your cloud network.\nCritical for enterprise security compliance (GDPR, HIPAA, financial regulation).\nAlso enables IP whitelisting, audit logging, and network-level access control..</li><li>\ud83d\udfe1 <strong>Managed RAG</strong> \u2014 Each major platform now offers managed RAG without writing pipeline code.\nAWS: Bedrock Knowledge Bases.</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 All major platforms offer managed fine-tuning: adapt a base model to your domain without managing GPUs.\nAWS Bedrock: fine-tune Claude, Llama, Amazon Nova on your data.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>AI PLATFORMS</h2><ul><li>\ud83d\udfe2 <strong>Amazon Bedrock</strong> \u2014 AWS's managed AI platform.</li><li>\ud83d\udfe2 <strong>Vertex AI</strong> \u2014 Google Cloud's unified MLOps and AI platform.</li><li>\ud83d\udfe2 <strong>Azure OpenAI</strong> \u2014 Enterprise-grade access to OpenAI models (GPT-4o, GPT-4.1, o3, DALL-E, Whisper).\nSame models as api.openai.com but deployed in your Azure region with data residency.\nPrivate endpoints via VNet integration \u2014 data never leaves your network.\nBuilt-in content filtering, abuse monitoring, usage quotas.\nRequired by many enterprise security policies that prohibit sending data to openai.com..</li><li>\ud83d\udfe1 <strong>Workers AI</strong> \u2014 Cloudflare's serverless AI inference platform.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>CLOUD PROVIDERS</h2><ul><li>\ud83d\udfe2 <strong>AWS</strong> \u2014 Amazon Web Services \u2014 the largest cloud provider by market share.\nAI strategy: be the neutral multi-model platform.</li><li>\ud83d\udfe2 <strong>Google Cloud</strong> \u2014 Google Cloud Platform \u2014 unique advantage: exclusive first access to Gemini models.\nVertex AI is the most feature-complete MLOps platform: training, serving, evaluation,\nmonitoring all in one place.\nStrong on data/analytics integration (BigQuery ML, Looker).\nBest choice for teams already in Google Workspace or using BigQuery..</li><li>\ud83d\udfe2 <strong>Microsoft Azure</strong> \u2014 Microsoft Azure \u2014 unique advantage: exclusive first access to OpenAI models (GPT-4, o-series).\nAzure OpenAI Service is the enterprise version of the OpenAI API: same models,\nbut with private endpoints, data residency guarantees, and enterprise SLAs.\nDeep integration with Microsoft 365, Teams, and GitHub Copilot.\nFirst choice for enterprises already in the Microsoft ecosystem..</li><li>\ud83d\udfe1 <strong>Cloudflare</strong> \u2014 Cloudflare Workers AI \u2014 the edge inference option.\nRun open-weights models (Llama, Mistral, Phi\u2026) on Cloudflare's global network of 300+ data centers.\nUltra-low latency for end users worldwide.</li></ul>", "<div class=\"slide-node-layer\">KEY CAPABILITIES</div><h2>\ud83d\udfe2 Private Endpoints</h2><p class=\"node-desc\">All major cloud AI platforms offer private network endpoints (VPC/VNet integration).<br>Your API calls never traverse the public internet \u2014 traffic stays within your cloud network.<br>Critical for enterprise security compliance (GDPR, HIPAA, financial regulation).<br>Also enables IP whitelisting, audit logging, and network-level access control.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY CAPABILITIES</div><h2>\ud83d\udfe1 Managed RAG</h2><p class=\"node-desc\">Each major platform now offers managed RAG without writing pipeline code.<br>AWS: Bedrock Knowledge Bases. Google: Vertex AI Agent Builder. Azure: AI Search + Azure OpenAI.<br>You provide documents, the platform handles chunking, embedding, vector storage and retrieval.<br>Trade-off: less control over the pipeline but drastically lower implementation cost.<br>Good starting point before building a custom RAG pipeline.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">KEY CAPABILITIES</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">All major platforms offer managed fine-tuning: adapt a base model to your domain without managing GPUs.<br>AWS Bedrock: fine-tune Claude, Llama, Amazon Nova on your data. Azure: fine-tune GPT-4o mini.<br>Google Vertex: fine-tune Gemini models with supervised examples.<br>Your fine-tuning data stays in your cloud account. The resulting model is private to your account.<br>Useful when prompt engineering alone can't achieve the domain accuracy you need.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PLATFORMS</div><h2>\ud83d\udfe2 Amazon Bedrock</h2><p class=\"node-desc\">AWS's managed AI platform. Single API to access models from Anthropic (Claude),<br>Meta (Llama), Mistral, Cohere, AI21 and Amazon Nova.<br>Key features: model comparison, Guardrails (content filtering), Knowledge Bases (managed RAG),<br>Agents (built-in agentic workflows), fine-tuning.<br>Data stays in your AWS account \u2014 no model provider sees your prompts or data.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PLATFORMS</div><h2>\ud83d\udfe2 Vertex AI</h2><p class=\"node-desc\">Google Cloud's unified MLOps and AI platform. First access to Gemini models (Flash, Pro, Ultra).<br>End-to-end: data prep, training, evaluation, deployment, monitoring in one platform.<br>Model Garden: access to 150+ models including open-weights (Llama, Mistral, Gemma).<br>Agent Builder: no-code RAG and agent creation. Grounding with Google Search built-in.<br>Best-in-class for teams needing full ML lifecycle management.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PLATFORMS</div><h2>\ud83d\udfe2 Azure OpenAI</h2><p class=\"node-desc\">Enterprise-grade access to OpenAI models (GPT-4o, GPT-4.1, o3, DALL-E, Whisper).<br>Same models as api.openai.com but deployed in your Azure region with data residency.<br>Private endpoints via VNet integration \u2014 data never leaves your network.<br>Built-in content filtering, abuse monitoring, usage quotas.<br>Required by many enterprise security policies that prohibit sending data to openai.com.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">AI PLATFORMS</div><h2>\ud83d\udfe1 Workers AI</h2><p class=\"node-desc\">Cloudflare's serverless AI inference platform. Run models directly in Workers (edge functions).<br>Available models: Llama 3, Mistral, Phi-2, Whisper, embedding models.<br>No GPU setup, no cold starts, global distribution by default.<br>Simple pricing: $0.011 per 1M neurons. Best for lightweight inference needs at global scale.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CLOUD PROVIDERS</div><h2>\ud83d\udfe2 AWS</h2><p class=\"node-desc\">Amazon Web Services \u2014 the largest cloud provider by market share.<br>AI strategy: be the neutral multi-model platform. Bedrock gives access to models<br>from Anthropic, Meta, Mistral, AI21, Cohere and Amazon's own Nova series.<br>Key enterprise advantage: deep integration with existing AWS services (S3, Lambda, SageMaker, IAM).<br>Strong compliance portfolio (HIPAA, SOC2, FedRAMP) \u2014 first choice for regulated industries.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CLOUD PROVIDERS</div><h2>\ud83d\udfe2 Google Cloud</h2><p class=\"node-desc\">Google Cloud Platform \u2014 unique advantage: exclusive first access to Gemini models.<br>Vertex AI is the most feature-complete MLOps platform: training, serving, evaluation,<br>monitoring all in one place.<br>Strong on data/analytics integration (BigQuery ML, Looker).<br>Best choice for teams already in Google Workspace or using BigQuery.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CLOUD PROVIDERS</div><h2>\ud83d\udfe2 Microsoft Azure</h2><p class=\"node-desc\">Microsoft Azure \u2014 unique advantage: exclusive first access to OpenAI models (GPT-4, o-series).<br>Azure OpenAI Service is the enterprise version of the OpenAI API: same models,<br>but with private endpoints, data residency guarantees, and enterprise SLAs.<br>Deep integration with Microsoft 365, Teams, and GitHub Copilot.<br>First choice for enterprises already in the Microsoft ecosystem.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CLOUD PROVIDERS</div><h2>\ud83d\udfe1 Cloudflare</h2><p class=\"node-desc\">Cloudflare Workers AI \u2014 the edge inference option.<br>Run open-weights models (Llama, Mistral, Phi\u2026) on Cloudflare's global network of 300+ data centers.<br>Ultra-low latency for end users worldwide. No cold starts. Pay per inference.<br>Best for: lightweight AI features at the edge, geographically distributed applications,<br>or when you need inference physically close to users.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">11 concepts</p><p class=\"stat\">3 layers</p><p class=\"generated-from\">Cloud Managed AI</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>IA Cloud Manag\u00e9e</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>CAPACIT\u00c9S CL\u00c9S</h2><ul><li>\ud83d\udfe2 <strong>Endpoints Priv\u00e9s</strong> \u2014 Toutes les grandes plateformes IA cloud offrent des endpoints r\u00e9seau priv\u00e9s (int\u00e9gration VPC/VNet).\nVos appels API ne traversent jamais l'internet public \u2014 le trafic reste dans votre r\u00e9seau cloud.\nCritique pour la conformit\u00e9 s\u00e9curit\u00e9 enterprise (RGPD, HIPAA, r\u00e9glementation financi\u00e8re).\nPermet aussi la liste blanche d'IP, la journalisation d'audit et le contr\u00f4le d'acc\u00e8s r\u00e9seau..</li><li>\ud83d\udfe1 <strong>RAG Manag\u00e9</strong> \u2014 Chaque grande plateforme offre d\u00e9sormais du RAG manag\u00e9 sans \u00e9crire de code de pipeline.\nAWS : Bedrock Knowledge Bases.</li><li>\ud83d\udfe2 <strong>Fine-tuning</strong> \u2014 Toutes les grandes plateformes offrent du fine-tuning manag\u00e9 : adapter un mod\u00e8le de base \u00e0 votre domaine sans g\u00e9rer des GPU.\nAWS Bedrock : fine-tuner Claude, Llama, Amazon Nova sur vos donn\u00e9es.</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>PLATEFORMES IA</h2><ul><li>\ud83d\udfe2 <strong>Amazon Bedrock</strong> \u2014 La plateforme IA manag\u00e9e d'AWS.</li><li>\ud83d\udfe2 <strong>Vertex AI</strong> \u2014 La plateforme MLOps et IA unifi\u00e9e de Google Cloud.</li><li>\ud83d\udfe2 <strong>Azure OpenAI</strong> \u2014 Acc\u00e8s enterprise aux mod\u00e8les OpenAI (GPT-4o, GPT-4.1, o3, DALL-E, Whisper).\nM\u00eames mod\u00e8les qu'api.openai.com mais d\u00e9ploy\u00e9s dans votre r\u00e9gion Azure avec r\u00e9sidence des donn\u00e9es.\nEndpoints priv\u00e9s via int\u00e9gration VNet \u2014 les donn\u00e9es ne quittent jamais votre r\u00e9seau.\nFiltrage de contenu int\u00e9gr\u00e9, surveillance des abus, quotas d'utilisation.\nRequis par de nombreuses politiques de s\u00e9curit\u00e9 enterprise qui interdisent d'envoyer des donn\u00e9es \u00e0 openai.com..</li><li>\ud83d\udfe1 <strong>Workers AI</strong> \u2014 La plateforme d'inf\u00e9rence IA serverless de Cloudflare.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>FOURNISSEURS CLOUD</h2><ul><li>\ud83d\udfe2 <strong>AWS</strong> \u2014 Amazon Web Services \u2014 le plus grand fournisseur cloud par part de march\u00e9.\nStrat\u00e9gie IA : \u00eatre la plateforme multi-mod\u00e8les neutre.</li><li>\ud83d\udfe2 <strong>Google Cloud</strong> \u2014 Google Cloud Platform \u2014 avantage unique : acc\u00e8s exclusif en premier aux mod\u00e8les Gemini.\nVertex AI est la plateforme MLOps la plus compl\u00e8te : entra\u00eenement, service, \u00e9valuation,\nmonitoring dans un seul endroit.\nSolide sur l'int\u00e9gration data/analytics (BigQuery ML, Looker).\nMeilleur choix pour les \u00e9quipes d\u00e9j\u00e0 dans Google Workspace ou utilisant BigQuery..</li><li>\ud83d\udfe2 <strong>Microsoft Azure</strong> \u2014 Microsoft Azure \u2014 avantage unique : acc\u00e8s exclusif en premier aux mod\u00e8les OpenAI (GPT-4, s\u00e9rie o).\nAzure OpenAI Service est la version enterprise de l'API OpenAI : m\u00eames mod\u00e8les,\nmais avec des endpoints priv\u00e9s, garanties de r\u00e9sidence des donn\u00e9es et SLAs enterprise.\nInt\u00e9gration profonde avec Microsoft 365, Teams et GitHub Copilot.\nPremier choix pour les entreprises d\u00e9j\u00e0 dans l'\u00e9cosyst\u00e8me Microsoft..</li><li>\ud83d\udfe1 <strong>Cloudflare</strong> \u2014 Cloudflare Workers AI \u2014 l'option d'inf\u00e9rence edge.\nFaites tourner des mod\u00e8les open weights (Llama, Mistral, Phi\u2026) sur le r\u00e9seau mondial de Cloudflare (300+ data centers).\nLatence ultra-faible pour les utilisateurs finaux partout dans le monde.</li></ul>", "<div class=\"slide-node-layer\">CAPACIT\u00c9S CL\u00c9S</div><h2>\ud83d\udfe2 Endpoints Priv\u00e9s</h2><p class=\"node-desc\">Toutes les grandes plateformes IA cloud offrent des endpoints r\u00e9seau priv\u00e9s (int\u00e9gration VPC/VNet).<br>Vos appels API ne traversent jamais l'internet public \u2014 le trafic reste dans votre r\u00e9seau cloud.<br>Critique pour la conformit\u00e9 s\u00e9curit\u00e9 enterprise (RGPD, HIPAA, r\u00e9glementation financi\u00e8re).<br>Permet aussi la liste blanche d'IP, la journalisation d'audit et le contr\u00f4le d'acc\u00e8s r\u00e9seau.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CAPACIT\u00c9S CL\u00c9S</div><h2>\ud83d\udfe1 RAG Manag\u00e9</h2><p class=\"node-desc\">Chaque grande plateforme offre d\u00e9sormais du RAG manag\u00e9 sans \u00e9crire de code de pipeline.<br>AWS : Bedrock Knowledge Bases. Google : Vertex AI Agent Builder. Azure : AI Search + Azure OpenAI.<br>Vous fournissez les documents, la plateforme g\u00e8re le chunking, l'embedding, le stockage vectoriel et la r\u00e9cup\u00e9ration.<br>Compromis : moins de contr\u00f4le sur le pipeline mais co\u00fbt d'impl\u00e9mentation drastiquement r\u00e9duit.<br>Bon point de d\u00e9part avant de construire un pipeline RAG personnalis\u00e9.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CAPACIT\u00c9S CL\u00c9S</div><h2>\ud83d\udfe2 Fine-tuning</h2><p class=\"node-desc\">Toutes les grandes plateformes offrent du fine-tuning manag\u00e9 : adapter un mod\u00e8le de base \u00e0 votre domaine sans g\u00e9rer des GPU.<br>AWS Bedrock : fine-tuner Claude, Llama, Amazon Nova sur vos donn\u00e9es. Azure : fine-tuner GPT-4o mini.<br>Google Vertex : fine-tuner les mod\u00e8les Gemini avec des exemples supervis\u00e9s.<br>Vos donn\u00e9es de fine-tuning restent dans votre compte cloud. Le mod\u00e8le r\u00e9sultant est priv\u00e9 \u00e0 votre compte.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PLATEFORMES IA</div><h2>\ud83d\udfe2 Amazon Bedrock</h2><p class=\"node-desc\">La plateforme IA manag\u00e9e d'AWS. API unique pour acc\u00e9der aux mod\u00e8les Anthropic (Claude),<br>Meta (Llama), Mistral, Cohere, AI21 et Amazon Nova.<br>Fonctionnalit\u00e9s cl\u00e9s : comparaison de mod\u00e8les, Guardrails (filtrage de contenu),<br>Knowledge Bases (RAG manag\u00e9), Agents (workflows agentiques int\u00e9gr\u00e9s), fine-tuning.<br>Les donn\u00e9es restent dans votre compte AWS \u2014 aucun fournisseur de mod\u00e8le ne voit vos prompts.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PLATEFORMES IA</div><h2>\ud83d\udfe2 Vertex AI</h2><p class=\"node-desc\">La plateforme MLOps et IA unifi\u00e9e de Google Cloud. Acc\u00e8s en premier aux mod\u00e8les Gemini (Flash, Pro, Ultra).<br>De bout en bout : pr\u00e9paration des donn\u00e9es, entra\u00eenement, \u00e9valuation, d\u00e9ploiement, monitoring sur une plateforme.<br>Model Garden : acc\u00e8s \u00e0 150+ mod\u00e8les dont les open weights (Llama, Mistral, Gemma).<br>Agent Builder : cr\u00e9ation RAG et agents sans code. Grounding avec Google Search int\u00e9gr\u00e9.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PLATEFORMES IA</div><h2>\ud83d\udfe2 Azure OpenAI</h2><p class=\"node-desc\">Acc\u00e8s enterprise aux mod\u00e8les OpenAI (GPT-4o, GPT-4.1, o3, DALL-E, Whisper).<br>M\u00eames mod\u00e8les qu'api.openai.com mais d\u00e9ploy\u00e9s dans votre r\u00e9gion Azure avec r\u00e9sidence des donn\u00e9es.<br>Endpoints priv\u00e9s via int\u00e9gration VNet \u2014 les donn\u00e9es ne quittent jamais votre r\u00e9seau.<br>Filtrage de contenu int\u00e9gr\u00e9, surveillance des abus, quotas d'utilisation.<br>Requis par de nombreuses politiques de s\u00e9curit\u00e9 enterprise qui interdisent d'envoyer des donn\u00e9es \u00e0 openai.com.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PLATEFORMES IA</div><h2>\ud83d\udfe1 Workers AI</h2><p class=\"node-desc\">La plateforme d'inf\u00e9rence IA serverless de Cloudflare. Faites tourner des mod\u00e8les directement dans les Workers.<br>Mod\u00e8les disponibles : Llama 3, Mistral, Phi-2, Whisper, mod\u00e8les d'embedding.<br>Pas de configuration GPU, pas de cold starts, distribution mondiale par d\u00e9faut.<br>Tarification simple. Id\u00e9al pour les besoins d'inf\u00e9rence l\u00e9gers \u00e0 l'\u00e9chelle mondiale.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">FOURNISSEURS CLOUD</div><h2>\ud83d\udfe2 AWS</h2><p class=\"node-desc\">Amazon Web Services \u2014 le plus grand fournisseur cloud par part de march\u00e9.<br>Strat\u00e9gie IA : \u00eatre la plateforme multi-mod\u00e8les neutre. Bedrock donne acc\u00e8s aux mod\u00e8les<br>d'Anthropic, Meta, Mistral, AI21, Cohere et la propre s\u00e9rie Nova d'Amazon.<br>Avantage enterprise cl\u00e9 : int\u00e9gration profonde avec les services AWS existants (S3, Lambda, SageMaker, IAM).<br>Solide portefeuille de conformit\u00e9 (HIPAA, SOC2, FedRAMP) \u2014 premier choix pour les industries r\u00e9gul\u00e9es.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">FOURNISSEURS CLOUD</div><h2>\ud83d\udfe2 Google Cloud</h2><p class=\"node-desc\">Google Cloud Platform \u2014 avantage unique : acc\u00e8s exclusif en premier aux mod\u00e8les Gemini.<br>Vertex AI est la plateforme MLOps la plus compl\u00e8te : entra\u00eenement, service, \u00e9valuation,<br>monitoring dans un seul endroit.<br>Solide sur l'int\u00e9gration data/analytics (BigQuery ML, Looker).<br>Meilleur choix pour les \u00e9quipes d\u00e9j\u00e0 dans Google Workspace ou utilisant BigQuery.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">FOURNISSEURS CLOUD</div><h2>\ud83d\udfe2 Microsoft Azure</h2><p class=\"node-desc\">Microsoft Azure \u2014 avantage unique : acc\u00e8s exclusif en premier aux mod\u00e8les OpenAI (GPT-4, s\u00e9rie o).<br>Azure OpenAI Service est la version enterprise de l'API OpenAI : m\u00eames mod\u00e8les,<br>mais avec des endpoints priv\u00e9s, garanties de r\u00e9sidence des donn\u00e9es et SLAs enterprise.<br>Int\u00e9gration profonde avec Microsoft 365, Teams et GitHub Copilot.<br>Premi let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }

}
