<title>AI Coding Assistants — Slides</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0 }
  body { background:#0d1117; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:"Segoe UI",sans-serif; overflow:hidden }
  #slide { background:#fff; width:min(92vw,960px); aspect-ratio:16/9; border-radius:12px; padding:48px 64px; display:flex; flex-direction:column; justify-content:center; box-shadow:0 20px 60px rgba(0,0,0,.5); position:relative; overflow:hidden }
  #slide h1 { font-size:2.4em; color:#1a237e; margin-bottom:16px }
  #slide h2 { font-size:1.6em; color:#283593; border-bottom:2px solid #3949ab; padding-bottom:10px; margin-bottom:20px }
  .subtitle { font-size:1.2em; color:#555 }
  .slide-type-title { display:flex; align-items:center; justify-content:center; text-align:center; height:100% }
  .slide-title-content { display:flex; flex-direction:column; gap:12px }
  .slide-layer-num,.slide-node-layer { position:absolute; top:20px; right:28px; font-size:.75em; color:#9fa8da; font-weight:600; letter-spacing:1px; text-transform:uppercase }
  ul { list-style:none; display:flex; flex-direction:column; gap:8px }
  li { font-size:.9em; color:#333; line-height:1.4 }
  li strong { color:#1a237e }
  .node-desc { font-size:.92em; color:#444; line-height:1.7; margin-top:8px }
  .slide-status { position:absolute; bottom:20px; right:28px; font-size:.72em; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:3px 10px; border-radius:10px; border:1.5px solid }
  .status-stable { color:#2e7d32; border-color:#2e7d32 }
  .status-evolving { color:#e65100; border-color:#e65100 }
  .status-emerging { color:#1565c0; border-color:#1565c0 }
  .status-deprecated { color:#b71c1c; border-color:#b71c1c }
  .stat { font-size:1.4em; font-weight:700; color:#3949ab }
  .generated-from { font-size:.85em; color:#999; margin-top:12px }
  #nav { display:flex; align-items:center; gap:20px; margin-top:20px }
  .nav-btn { background:#3949ab; color:#fff; border:none; border-radius:8px; padding:10px 24px; font-size:1em; cursor:pointer; transition:background .15s }
  .nav-btn:hover { background:#283593 }
  .nav-btn:disabled { background:#555; cursor:default }
  #counter { color:#aaa; font-size:.9em; min-width:80px; text-align:center }
  #progress { position:absolute; bottom:0; left:0; height:3px; background:#3949ab; transition:width .3s; border-radius:0 0 0 12px }
  #lang-toggle { position:fixed; top:16px; right:16px; display:flex; gap:6px }
  .lang-btn { background:none; border:1px solid #555; border-radius:4px; color:#aaa; padding:4px 10px; font-size:12px; cursor:pointer }
  .lang-btn.active { background:white; color:#1a237e; border-color:white }
</style>

<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>AI Coding Assistants</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 2</div><h2>TOOLS</h2><ul><li>\ud83d\udfe2 <strong>GitHub Copilot</strong> \u2014 Microsoft/GitHub's AI coding tool \u2014 the most widely deployed (>1.8M paid users).\nIntegrates into VS Code, JetBrains, Neovim, Visual Studio.\nPowered by GPT-4o and Claude (choice depends on task).</li><li>\ud83d\udfe1 <strong>Cursor</strong> \u2014 VS Code fork rebuilt for AI-first development.</li><li>\ud83d\udfe1 <strong>Windsurf (Codeium)</strong> \u2014 Codeium's agentic IDE.</li><li>\ud83d\udfe1 <strong>Claude Code</strong> \u2014 Anthropic's CLI coding agent.</li><li>\ud83d\udfe2 <strong>Aider</strong> \u2014 Open-source CLI coding assistant.</li><li>\ud83d\udfe2 <strong>Codeium (free)</strong> \u2014 Free AI code completion plugin for 70+ editors.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>CATEGORIES</h2><ul><li>\ud83d\udfe2 <strong>IDE Plugins</strong> \u2014 Plugins that add AI assistance to your existing editor (VS Code, JetBrains, Neovim\u2026).\nCore features: inline completion, chat sidebar, code explanation, test generation.\nYou stay in your editor \u2014 the AI assists without taking over.\nBest for: developers who want AI help without changing their workflow..</li><li>\ud83d\udfe1 <strong>Agentic IDEs</strong> \u2014 Full IDE experiences rebuilt around AI.</li><li>\ud83d\udfe1 <strong>CLI Agents</strong> \u2014 AI coding agents that run in the terminal.</li></ul>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe2 GitHub Copilot</h2><p class=\"node-desc\">Microsoft/GitHub's AI coding tool \u2014 the most widely deployed (>1.8M paid users).<br>Integrates into VS Code, JetBrains, Neovim, Visual Studio.<br>Powered by GPT-4o and Claude (choice depends on task). GitHub Context: understands your entire repo.<br>Copilot Workspace: agentic task completion from issue to PR.<br>Enterprise plan: self-hosted option, policy controls, audit logs. The \"safe\" enterprise choice.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe1 Cursor</h2><p class=\"node-desc\">VS Code fork rebuilt for AI-first development. The most popular agentic IDE.<br>Cmd+K: inline edit with natural language. Chat: ask questions about your codebase.<br>Composer/Agent: multi-file autonomous implementation. @codebase: semantic search over your repo.<br>Uses Claude 3.5 Sonnet, GPT-4o and its own cursor-small model.<br>Fastest-growing dev tool of 2024 \u2014 the reference for \"AI-native\" development.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe1 Windsurf (Codeium)</h2><p class=\"node-desc\">Codeium's agentic IDE. Direct Cursor competitor with a \"Cascade\" agent that maintains<br>full awareness of your codebase and actions taken.<br>Key differentiator: \"Flow\" paradigm \u2014 the agent proactively suggests what to do next,<br>not just reacting to commands.<br>Generous free tier. Acquired by OpenAI in 2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe1 Claude Code</h2><p class=\"node-desc\">Anthropic's CLI coding agent. Runs in the terminal with full access to files, shell, and git.<br>Agentic by design: can plan, implement, test and commit multi-step tasks autonomously.<br>Deep integration with Claude's extended context (200k tokens) \u2014 understands large codebases.<br>Supports MCP servers: extend with custom tools (databases, APIs, internal services).<br>Headless mode: scriptable for CI/CD automation. The power-user and DevOps choice.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe2 Aider</h2><p class=\"node-desc\">Open-source CLI coding assistant. Works with any LLM (Claude, GPT-4, Gemini, local models via Ollama).<br>Git-native: automatically commits changes with meaningful messages.<br>Architect mode: separates planning (expensive model) from editing (cheaper model) for efficiency.<br>No subscription \u2014 you pay only for the API tokens you use.<br>Best for: open-source enthusiasts, cost-conscious developers, custom model setups.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">TOOLS</div><h2>\ud83d\udfe2 Codeium (free)</h2><p class=\"node-desc\">Free AI code completion plugin for 70+ editors. Not agentic \u2014 focused on inline completion and chat.<br>Unlimited free tier makes it the default choice for individual developers and students.<br>Supports VS Code, JetBrains, Vim, Emacs, and more.<br>Enterprise version: self-hosted deployment option for data-sensitive environments.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CATEGORIES</div><h2>\ud83d\udfe2 IDE Plugins</h2><p class=\"node-desc\">Plugins that add AI assistance to your existing editor (VS Code, JetBrains, Neovim\u2026).<br>Core features: inline completion, chat sidebar, code explanation, test generation.<br>You stay in your editor \u2014 the AI assists without taking over.<br>Best for: developers who want AI help without changing their workflow.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CATEGORIES</div><h2>\ud83d\udfe1 Agentic IDEs</h2><p class=\"node-desc\">Full IDE experiences rebuilt around AI. Not just completion \u2014 the AI can read your entire codebase,<br>make multi-file edits, run commands, and iterate autonomously.<br>Composer/Agent mode: describe a feature, the AI implements it across multiple files.<br>Best for: teams ready to deeply integrate AI into their dev workflow.<br>Trade-off: vendor lock-in, steeper learning curve, subscription cost.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CATEGORIES</div><h2>\ud83d\udfe1 CLI Agents</h2><p class=\"node-desc\">AI coding agents that run in the terminal. Full access to the file system, shell commands,<br>git, and any CLI tool. No GUI \u2014 pure terminal workflow.<br>Can be run headlessly in CI/CD pipelines for automated coding tasks.<br>Best for: backend/devops engineers, power users, automated workflows.<br>Claude Code and Aider are the leading options.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">9 concepts</p><p class=\"stat\">2 layers</p><p class=\"generated-from\">AI Coding Assistants</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>Assistants de Code IA</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 2</div><h2>OUTILS</h2><ul><li>\ud83d\udfe2 <strong>GitHub Copilot</strong> \u2014 L'outil de code IA de Microsoft/GitHub \u2014 le plus d\u00e9ploy\u00e9 (>1,8M utilisateurs payants).\nS'int\u00e8gre dans VS Code, JetBrains, Neovim, Visual Studio.\nPropuls\u00e9 par GPT-4o et Claude.</li><li>\ud83d\udfe1 <strong>Cursor</strong> \u2014 Fork de VS Code reconstruit pour le d\u00e9veloppement IA-first.</li><li>\ud83d\udfe1 <strong>Windsurf (Codeium)</strong> \u2014 L'IDE agentique de Codeium.</li><li>\ud83d\udfe1 <strong>Claude Code</strong> \u2014 L'agent de code CLI d'Anthropic.</li><li>\ud83d\udfe2 <strong>Aider</strong> \u2014 Assistant de code CLI open source.</li><li>\ud83d\udfe2 <strong>Codeium (gratuit)</strong> \u2014 Plugin gratuit de compl\u00e9tion de code IA pour 70+ \u00e9diteurs.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>CAT\u00c9GORIES</h2><ul><li>\ud83d\udfe2 <strong>Plugins IDE</strong> \u2014 Plugins qui ajoutent l'assistance IA \u00e0 votre \u00e9diteur existant (VS Code, JetBrains, Neovim\u2026).\nFonctionnalit\u00e9s principales : compl\u00e9tion inline, chat sidebar, explication de code, g\u00e9n\u00e9ration de tests.\nVous restez dans votre \u00e9diteur \u2014 l'IA assiste sans prendre le contr\u00f4le.\nId\u00e9al pour : les d\u00e9veloppeurs qui veulent de l'aide IA sans changer leur workflow..</li><li>\ud83d\udfe1 <strong>IDEs Agentiques</strong> \u2014 Exp\u00e9riences IDE compl\u00e8tes reconstruites autour de l'IA.</li><li>\ud83d\udfe1 <strong>Agents CLI</strong> \u2014 Agents de code IA qui tournent dans le terminal.</li></ul>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe2 GitHub Copilot</h2><p class=\"node-desc\">L'outil de code IA de Microsoft/GitHub \u2014 le plus d\u00e9ploy\u00e9 (>1,8M utilisateurs payants).<br>S'int\u00e8gre dans VS Code, JetBrains, Neovim, Visual Studio.<br>Propuls\u00e9 par GPT-4o et Claude. GitHub Context : comprend toute votre base de code.<br>Copilot Workspace : compl\u00e9tion de t\u00e2che agentique de l'issue \u00e0 la PR.<br>Plan Enterprise : option self-hosted, contr\u00f4les de politique, logs d'audit.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe1 Cursor</h2><p class=\"node-desc\">Fork de VS Code reconstruit pour le d\u00e9veloppement IA-first. L'IDE agentique le plus populaire.<br>Cmd+K : \u00e9dition inline en langage naturel. Chat : posez des questions sur votre base de code.<br>Composer/Agent : impl\u00e9mentation autonome multi-fichiers.<br>Utilise Claude 3.5 Sonnet, GPT-4o et son propre mod\u00e8le cursor-small.<br>L'outil de dev \u00e0 la croissance la plus rapide de 2024.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe1 Windsurf (Codeium)</h2><p class=\"node-desc\">L'IDE agentique de Codeium. Concurrent direct de Cursor avec un agent \"Cascade\"<br>qui maintient une conscience compl\u00e8te de votre base de code et des actions effectu\u00e9es.<br>Diff\u00e9renciateur cl\u00e9 : paradigme \"Flow\" \u2014 l'agent sugg\u00e8re proactivement quoi faire ensuite.<br>G\u00e9n\u00e9reux tier gratuit. Acquis par OpenAI en 2025.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe1 Claude Code</h2><p class=\"node-desc\">L'agent de code CLI d'Anthropic. Tourne dans le terminal avec acc\u00e8s complet aux fichiers, shell et git.<br>Agentique par conception : peut planifier, impl\u00e9menter, tester et commiter des t\u00e2ches multi-\u00e9tapes de fa\u00e7on autonome.<br>Int\u00e9gration profonde avec le contexte \u00e9tendu de Claude (200k tokens) \u2014 comprend les grandes bases de code.<br>Supporte les serveurs MCP : extensible avec des outils personnalis\u00e9s.<br>Mode headless : scriptable pour l'automatisation CI/CD.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe2 Aider</h2><p class=\"node-desc\">Assistant de code CLI open source. Fonctionne avec n'importe quel LLM (Claude, GPT-4, Gemini, mod\u00e8les locaux via Ollama).<br>Git-native : commite automatiquement les modifications avec des messages significatifs.<br>Mode Architect : s\u00e9pare la planification (mod\u00e8le co\u00fbteux) de l'\u00e9dition (mod\u00e8le moins cher).<br>Pas d'abonnement \u2014 vous payez uniquement les tokens API consomm\u00e9s.<br>Id\u00e9al pour : fans d'open source, d\u00e9veloppeurs sensibles aux co\u00fbts, configurations de mod\u00e8les personnalis\u00e9es.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS</div><h2>\ud83d\udfe2 Codeium (gratuit)</h2><p class=\"node-desc\">Plugin gratuit de compl\u00e9tion de code IA pour 70+ \u00e9diteurs. Pas agentique \u2014 focalis\u00e9 sur la compl\u00e9tion inline et le chat.<br>Le tier gratuit illimit\u00e9 en fait le choix par d\u00e9faut pour les d\u00e9veloppeurs individuels et les \u00e9tudiants.<br>Supporte VS Code, JetBrains, Vim, Emacs et plus.<br>Version Enterprise : option de d\u00e9ploiement self-hosted pour les environnements sensibles aux donn\u00e9es.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CAT\u00c9GORIES</div><h2>\ud83d\udfe2 Plugins IDE</h2><p class=\"node-desc\">Plugins qui ajoutent l'assistance IA \u00e0 votre \u00e9diteur existant (VS Code, JetBrains, Neovim\u2026).<br>Fonctionnalit\u00e9s principales : compl\u00e9tion inline, chat sidebar, explication de code, g\u00e9n\u00e9ration de tests.<br>Vous restez dans votre \u00e9diteur \u2014 l'IA assiste sans prendre le contr\u00f4le.<br>Id\u00e9al pour : les d\u00e9veloppeurs qui veulent de l'aide IA sans changer leur workflow.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">CAT\u00c9GORIES</div><h2>\ud83d\udfe1 IDEs Agentiques</h2><p class=\"node-desc\">Exp\u00e9riences IDE compl\u00e8tes reconstruites autour de l'IA. Pas juste de la compl\u00e9tion \u2014 l'IA peut lire<br>toute votre base de code, faire des modifications multi-fichiers, ex\u00e9cuter des commandes et it\u00e9rer de fa\u00e7on autonome.<br>Mode Composer/Agent : d\u00e9crivez une fonctionnalit\u00e9, l'IA l'impl\u00e9mente dans plusieurs fichiers.<br>Id\u00e9al pour : les \u00e9quipes pr\u00eates \u00e0 int\u00e9grer profond\u00e9ment l'IA dans leur workflow de dev.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">CAT\u00c9GORIES</div><h2>\ud83d\udfe1 Agents CLI</h2><p class=\"node-desc\">Agents de code IA qui tournent dans le terminal. Acc\u00e8s complet au syst\u00e8me de fichiers, commandes shell,<br>git et tout outil CLI. Pas de GUI \u2014 workflow pur terminal.<br>Peut \u00eatre ex\u00e9cut\u00e9 en mode headless dans les pipelines CI/CD pour des t\u00e2ches de code automatis\u00e9es.<br>Id\u00e9al pour : ing\u00e9nieurs backend/devops, power users, workflows automatis\u00e9s.<br>Claude Code et Aider sont les options phares.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">9 concepts</p><p class=\"stat\">2 couches</p><p class=\"generated-from\">Assistants de Code IA</p></div></div>"] };
let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
</body></html>
