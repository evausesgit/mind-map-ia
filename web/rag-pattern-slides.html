<script>
const ALL_SLIDES = { en: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>RAG \u2014 Retrieval-Augmented Generation</h1><p class=\"subtitle\">AI / LLM Ecosystem</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>TOOLS & FRAMEWORKS</h2><ul><li>\ud83d\udfe2 <strong>LangChain</strong> \u2014 The most widely adopted LLM orchestration framework.</li><li>\ud83d\udfe2 <strong>LlamaIndex</strong> \u2014 Framework purpose-built for RAG and knowledge-intensive applications.\nStronger than LangChain for complex indexing strategies (hierarchical, multi-document, graph-based).\nProvides QueryEngine, RetrieverRouter, SubQuestionQueryEngine for advanced retrieval.\nBetter abstraction for production RAG pipelines, especially with structured/unstructured mixed data..</li><li>\ud83d\udfe2 <strong>pgvector</strong> \u2014 PostgreSQL extension adding vector similarity search.</li><li>\ud83d\udfe2 <strong>Pinecone</strong> \u2014 Managed vector database built for production RAG at scale.\nServerless pricing (pay per query, not per server).</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>KEY COMPONENTS</h2><ul><li>\ud83d\udfe1 <strong>Chunking</strong> \u2014 Splitting documents into pieces small enough for an embedding model to capture their meaning.\nStrategies: fixed size (simple), recursive (respects structure), semantic (groups related sentences).\nChunk size is a critical hyperparameter: too small = lost context, too large = noisy retrieval.\nOverlap between chunks prevents information loss at boundaries..</li><li>\ud83d\udfe2 <strong>Embedding Model</strong> \u2014 The model that converts text to vectors.</li><li>\ud83d\udfe2 <strong>Vector Store</strong> \u2014 Database storing document embeddings and enabling fast similarity search (ANN \u2014 approximate nearest neighbors).\nThe storage backbone of any RAG system.</li><li>\ud83d\udfe1 <strong>Reranker</strong> \u2014 A second-pass model that re-scores retrieved chunks by relevance to the query.\nRetrieval (ANN) optimizes for speed; reranking optimizes for precision.\nTakes top-k retrieved chunks (e.g.</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>PIPELINE STAGES</h2><ul><li>\ud83d\udfe2 <strong>Ingestion</strong> \u2014 Loading and preparing documents before they can be searched.\nSteps: load raw files (PDF, HTML, code, DB\u2026), clean text, split into chunks,\ngenerate embeddings for each chunk, store vectors in a vector database.\nQuality of ingestion determines quality of retrieval \u2014 garbage in, garbage out..</li><li>\ud83d\udfe2 <strong>Retrieval</strong> \u2014 Finding the most relevant chunks for a user query at runtime.\nThe query is embedded with the same model used at ingestion,\nthen the nearest vectors are retrieved from the database (semantic similarity).\nOptional: reranking \u2014 a second model re-scores the top candidates for precision.\nThis stage is the heart of RAG; poor retrieval = poor answers..</li><li>\ud83d\udfe2 <strong>Generation</strong> \u2014 Producing the final answer by combining the retrieved context with the user query.\nThe retrieved chunks are injected into the LLM prompt as context.\nThe LLM generates an answer grounded in the provided documents \u2014 not from memory.\nKey design choice: how to structure the prompt template to avoid hallucination\nand instruct the model to say \"I don't know\" when the context is insufficient..</li></ul>", "<div class=\"slide-node-layer\">TOOLS & FRAMEWORKS</div><h2>\ud83d\udfe2 LangChain</h2><p class=\"node-desc\">The most widely adopted LLM orchestration framework. Provides ready-made components<br>for every RAG stage: document loaders, text splitters, embedding wrappers, vector store integrations,<br>retriever abstractions, and chain/pipeline composition.<br>Large ecosystem, but can be verbose and hard to debug.<br>LangGraph (from LangChain) adds stateful agent workflows on top.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">TOOLS & FRAMEWORKS</div><h2>\ud83d\udfe2 LlamaIndex</h2><p class=\"node-desc\">Framework purpose-built for RAG and knowledge-intensive applications.<br>Stronger than LangChain for complex indexing strategies (hierarchical, multi-document, graph-based).<br>Provides QueryEngine, RetrieverRouter, SubQuestionQueryEngine for advanced retrieval.<br>Better abstraction for production RAG pipelines, especially with structured/unstructured mixed data.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">TOOLS & FRAMEWORKS</div><h2>\ud83d\udfe2 pgvector</h2><p class=\"node-desc\">PostgreSQL extension adding vector similarity search. The pragmatic enterprise choice:<br>no new infrastructure, vectors live alongside relational data in your existing Postgres.<br>Supports L2, cosine and inner product distance. Works with all Postgres-compatible services<br>(AWS RDS, Supabase, Neon, Railway). Best for teams with existing Postgres and moderate scale.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">TOOLS & FRAMEWORKS</div><h2>\ud83d\udfe2 Pinecone</h2><p class=\"node-desc\">Managed vector database built for production RAG at scale.<br>Serverless pricing (pay per query, not per server). Sub-10ms latency at any scale.<br>Supports hybrid search (dense + sparse vectors) and metadata filtering.<br>No infrastructure to manage. Best choice for teams wanting a fully managed, battle-tested vector store<br>without operational burden.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY COMPONENTS</div><h2>\ud83d\udfe1 Chunking</h2><p class=\"node-desc\">Splitting documents into pieces small enough for an embedding model to capture their meaning.<br>Strategies: fixed size (simple), recursive (respects structure), semantic (groups related sentences).<br>Chunk size is a critical hyperparameter: too small = lost context, too large = noisy retrieval.<br>Overlap between chunks prevents information loss at boundaries.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">KEY COMPONENTS</div><h2>\ud83d\udfe2 Embedding Model</h2><p class=\"node-desc\">The model that converts text to vectors. Used twice: at ingestion (documents) and retrieval (queries).<br>Must be the same model for both \u2014 different models produce incompatible vector spaces.<br>Top choices: OpenAI text-embedding-3-large, Voyage-3, Cohere embed-v3, nomic-embed-text.<br>MTEB leaderboard ranks models by retrieval quality across domains and languages.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY COMPONENTS</div><h2>\ud83d\udfe2 Vector Store</h2><p class=\"node-desc\">Database storing document embeddings and enabling fast similarity search (ANN \u2014 approximate nearest neighbors).<br>The storage backbone of any RAG system. Supports metadata filtering to combine vector and keyword search.<br>Managed options: Pinecone, Weaviate, Qdrant. Self-hosted: Chroma, Milvus. SQL extensions: pgvector.<br>Choice depends on scale, latency requirements, and existing infrastructure.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">KEY COMPONENTS</div><h2>\ud83d\udfe1 Reranker</h2><p class=\"node-desc\">A second-pass model that re-scores retrieved chunks by relevance to the query.<br>Retrieval (ANN) optimizes for speed; reranking optimizes for precision.<br>Takes top-k retrieved chunks (e.g. 20), re-scores them, keeps top-n (e.g. 5) for the prompt.<br>Significantly improves answer quality at the cost of added latency.<br>Best options: Cohere Rerank, Jina Reranker, ColBERT.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">PIPELINE STAGES</div><h2>\ud83d\udfe2 Ingestion</h2><p class=\"node-desc\">Loading and preparing documents before they can be searched.<br>Steps: load raw files (PDF, HTML, code, DB\u2026), clean text, split into chunks,<br>generate embeddings for each chunk, store vectors in a vector database.<br>Quality of ingestion determines quality of retrieval \u2014 garbage in, garbage out.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PIPELINE STAGES</div><h2>\ud83d\udfe2 Retrieval</h2><p class=\"node-desc\">Finding the most relevant chunks for a user query at runtime.<br>The query is embedded with the same model used at ingestion,<br>then the nearest vectors are retrieved from the database (semantic similarity).<br>Optional: reranking \u2014 a second model re-scores the top candidates for precision.<br>This stage is the heart of RAG; poor retrieval = poor answers.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">PIPELINE STAGES</div><h2>\ud83d\udfe2 Generation</h2><p class=\"node-desc\">Producing the final answer by combining the retrieved context with the user query.<br>The retrieved chunks are injected into the LLM prompt as context.<br>The LLM generates an answer grounded in the provided documents \u2014 not from memory.<br>Key design choice: how to structure the prompt template to avoid hallucination<br>and instruct the model to say \"I don't know\" when the context is insufficient.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>Summary</h2><p class=\"stat\">11 concepts</p><p class=\"stat\">3 layers</p><p class=\"generated-from\">RAG \u2014 Retrieval-Augmented Generation</p></div></div>"], fr: ["<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h1>RAG \u2014 G\u00e9n\u00e9ration Augment\u00e9e par R\u00e9cup\u00e9ration</h1><p class=\"subtitle\">\u00c9cosyst\u00e8me IA / LLM</p></div></div>", "<div class=\"slide-layer-num\">Layer 3</div><h2>OUTILS & FRAMEWORKS</h2><ul><li>\ud83d\udfe2 <strong>LangChain</strong> \u2014 Le framework d'orchestration LLM le plus adopt\u00e9.</li><li>\ud83d\udfe2 <strong>LlamaIndex</strong> \u2014 Framework con\u00e7u sp\u00e9cifiquement pour RAG et les applications \u00e0 forte intensit\u00e9 de connaissance.\nPlus puissant que LangChain pour les strat\u00e9gies d'indexation complexes (hi\u00e9rarchique, multi-documents, graphe).\nFournit QueryEngine, RetrieverRouter, SubQuestionQueryEngine pour une r\u00e9cup\u00e9ration avanc\u00e9e.\nMeilleure abstraction pour les pipelines RAG en production, notamment avec des donn\u00e9es mixtes..</li><li>\ud83d\udfe2 <strong>pgvector</strong> \u2014 Extension PostgreSQL ajoutant la recherche de similarit\u00e9 vectorielle.</li><li>\ud83d\udfe2 <strong>Pinecone</strong> \u2014 Base de donn\u00e9es vectorielle manag\u00e9e con\u00e7ue pour RAG en production \u00e0 grande \u00e9chelle.\nTarification serverless (paiement par requ\u00eate).</li></ul>", "<div class=\"slide-layer-num\">Layer 2</div><h2>COMPOSANTS CL\u00c9S</h2><ul><li>\ud83d\udfe1 <strong>Chunking</strong> \u2014 D\u00e9couper les documents en morceaux assez petits pour qu'un mod\u00e8le d'embedding en capture le sens.\nStrat\u00e9gies : taille fixe (simple), r\u00e9cursif (respecte la structure), s\u00e9mantique (regroupe les phrases li\u00e9es).\nLa taille du chunk est un hyperparam\u00e8tre critique : trop petit = contexte perdu, trop grand = r\u00e9cup\u00e9ration bruit\u00e9e.\nLe chevauchement entre chunks \u00e9vite les pertes d'information aux fronti\u00e8res..</li><li>\ud83d\udfe2 <strong>Mod\u00e8le d'Embedding</strong> \u2014 Le mod\u00e8le qui convertit le texte en vecteurs.</li><li>\ud83d\udfe2 <strong>Base Vectorielle</strong> \u2014 Base de donn\u00e9es stockant les embeddings et permettant une recherche de similarit\u00e9 rapide (ANN).\nL'\u00e9pine dorsale du stockage de tout syst\u00e8me RAG.</li><li>\ud83d\udfe1 <strong>Reranker</strong> \u2014 Un mod\u00e8le de second passage qui re-score les chunks r\u00e9cup\u00e9r\u00e9s par pertinence \u00e0 la requ\u00eate.\nLa r\u00e9cup\u00e9ration (ANN) optimise la vitesse ; le reranking optimise la pr\u00e9cision.\nPrend les top-k chunks r\u00e9cup\u00e9r\u00e9s (ex : 20), les re-score, garde les top-n (ex : 5) pour le prompt.\nAm\u00e9liore significativement la qualit\u00e9 des r\u00e9ponses au prix d'une latence suppl\u00e9mentaire.\nMeilleures options : Cohere Rerank, Jina Reranker, ColBERT..</li></ul>", "<div class=\"slide-layer-num\">Layer 1</div><h2>\u00c9TAPES DU PIPELINE</h2><ul><li>\ud83d\udfe2 <strong>Ingestion</strong> \u2014 Chargement et pr\u00e9paration des documents avant qu'ils puissent \u00eatre recherch\u00e9s.\n\u00c9tapes : charger les fichiers bruts (PDF, HTML, code, BDD\u2026), nettoyer le texte,\nd\u00e9couper en chunks, g\u00e9n\u00e9rer des embeddings pour chaque chunk, stocker dans une base vectorielle.\nLa qualit\u00e9 de l'ingestion d\u00e9termine la qualit\u00e9 de la r\u00e9cup\u00e9ration..</li><li>\ud83d\udfe2 <strong>R\u00e9cup\u00e9ration</strong> \u2014 Trouver les chunks les plus pertinents pour une requ\u00eate utilisateur au moment de l'ex\u00e9cution.\nLa requ\u00eate est embedd\u00e9e avec le m\u00eame mod\u00e8le qu'\u00e0 l'ingestion,\npuis les vecteurs les plus proches sont r\u00e9cup\u00e9r\u00e9s (similarit\u00e9 s\u00e9mantique).\nOptionnel : reranking \u2014 un second mod\u00e8le re-score les candidats pour plus de pr\u00e9cision.\nCette \u00e9tape est le c\u0153ur de RAG ; une mauvaise r\u00e9cup\u00e9ration = de mauvaises r\u00e9ponses..</li><li>\ud83d\udfe2 <strong>G\u00e9n\u00e9ration</strong> \u2014 Production de la r\u00e9ponse finale en combinant le contexte r\u00e9cup\u00e9r\u00e9 avec la requ\u00eate utilisateur.\nLes chunks r\u00e9cup\u00e9r\u00e9s sont inject\u00e9s dans le prompt LLM comme contexte.\nLe LLM g\u00e9n\u00e8re une r\u00e9ponse ancr\u00e9e dans les documents fournis \u2014 pas depuis sa m\u00e9moire.\nChoix de conception cl\u00e9 : structurer le prompt pour \u00e9viter les hallucinations\net dire \"Je ne sais pas\" quand le contexte est insuffisant..</li></ul>", "<div class=\"slide-node-layer\">OUTILS & FRAMEWORKS</div><h2>\ud83d\udfe2 LangChain</h2><p class=\"node-desc\">Le framework d'orchestration LLM le plus adopt\u00e9. Fournit des composants pr\u00eats \u00e0 l'emploi<br>pour chaque \u00e9tape RAG : chargeurs de documents, d\u00e9coupeurs de texte, wrappers d'embedding,<br>int\u00e9grations de bases vectorielles, abstractions de retrievers et composition de pipelines.<br>Grand \u00e9cosyst\u00e8me, mais peut \u00eatre verbeux et difficile \u00e0 d\u00e9boguer.<br>LangGraph ajoute des workflows d'agents avec \u00e9tat par-dessus.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS & FRAMEWORKS</div><h2>\ud83d\udfe2 LlamaIndex</h2><p class=\"node-desc\">Framework con\u00e7u sp\u00e9cifiquement pour RAG et les applications \u00e0 forte intensit\u00e9 de connaissance.<br>Plus puissant que LangChain pour les strat\u00e9gies d'indexation complexes (hi\u00e9rarchique, multi-documents, graphe).<br>Fournit QueryEngine, RetrieverRouter, SubQuestionQueryEngine pour une r\u00e9cup\u00e9ration avanc\u00e9e.<br>Meilleure abstraction pour les pipelines RAG en production, notamment avec des donn\u00e9es mixtes.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS & FRAMEWORKS</div><h2>\ud83d\udfe2 pgvector</h2><p class=\"node-desc\">Extension PostgreSQL ajoutant la recherche de similarit\u00e9 vectorielle. Le choix pragmatique en entreprise :<br>pas de nouvelle infrastructure, les vecteurs coexistent avec les donn\u00e9es relationnelles dans votre Postgres existant.<br>Supporte les distances L2, cosinus et produit scalaire. Fonctionne avec tous les services compatibles Postgres<br>(AWS RDS, Supabase, Neon, Railway). Id\u00e9al pour les \u00e9quipes avec Postgres existant et une \u00e9chelle mod\u00e9r\u00e9e.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">OUTILS & FRAMEWORKS</div><h2>\ud83d\udfe2 Pinecone</h2><p class=\"node-desc\">Base de donn\u00e9es vectorielle manag\u00e9e con\u00e7ue pour RAG en production \u00e0 grande \u00e9chelle.<br>Tarification serverless (paiement par requ\u00eate). Latence sous 10ms \u00e0 toute \u00e9chelle.<br>Supporte la recherche hybride (vecteurs denses + creux) et le filtrage par m\u00e9tadonn\u00e9es.<br>Aucune infrastructure \u00e0 g\u00e9rer. Meilleur choix pour les \u00e9quipes voulant un vector store enti\u00e8rement manag\u00e9.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">COMPOSANTS CL\u00c9S</div><h2>\ud83d\udfe1 Chunking</h2><p class=\"node-desc\">D\u00e9couper les documents en morceaux assez petits pour qu'un mod\u00e8le d'embedding en capture le sens.<br>Strat\u00e9gies : taille fixe (simple), r\u00e9cursif (respecte la structure), s\u00e9mantique (regroupe les phrases li\u00e9es).<br>La taille du chunk est un hyperparam\u00e8tre critique : trop petit = contexte perdu, trop grand = r\u00e9cup\u00e9ration bruit\u00e9e.<br>Le chevauchement entre chunks \u00e9vite les pertes d'information aux fronti\u00e8res.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">COMPOSANTS CL\u00c9S</div><h2>\ud83d\udfe2 Mod\u00e8le d'Embedding</h2><p class=\"node-desc\">Le mod\u00e8le qui convertit le texte en vecteurs. Utilis\u00e9 deux fois : \u00e0 l'ingestion (documents) et \u00e0 la r\u00e9cup\u00e9ration (requ\u00eates).<br>Doit \u00eatre le m\u00eame mod\u00e8le pour les deux \u2014 des mod\u00e8les diff\u00e9rents produisent des espaces vectoriels incompatibles.<br>Top choices : OpenAI text-embedding-3-large, Voyage-3, Cohere embed-v3, nomic-embed-text.<br>Le classement MTEB \u00e9value les mod\u00e8les par qualit\u00e9 de r\u00e9cup\u00e9ration.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">COMPOSANTS CL\u00c9S</div><h2>\ud83d\udfe2 Base Vectorielle</h2><p class=\"node-desc\">Base de donn\u00e9es stockant les embeddings et permettant une recherche de similarit\u00e9 rapide (ANN).<br>L'\u00e9pine dorsale du stockage de tout syst\u00e8me RAG. Supporte le filtrage par m\u00e9tadonn\u00e9es pour combiner recherche vectorielle et par mots-cl\u00e9s.<br>Options manag\u00e9es : Pinecone, Weaviate, Qdrant. Auto-h\u00e9berg\u00e9es : Chroma, Milvus. Extensions SQL : pgvector.<br>Le choix d\u00e9pend de l'\u00e9chelle, des exigences de latence et de l'infrastructure existante.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">COMPOSANTS CL\u00c9S</div><h2>\ud83d\udfe1 Reranker</h2><p class=\"node-desc\">Un mod\u00e8le de second passage qui re-score les chunks r\u00e9cup\u00e9r\u00e9s par pertinence \u00e0 la requ\u00eate.<br>La r\u00e9cup\u00e9ration (ANN) optimise la vitesse ; le reranking optimise la pr\u00e9cision.<br>Prend les top-k chunks r\u00e9cup\u00e9r\u00e9s (ex : 20), les re-score, garde les top-n (ex : 5) pour le prompt.<br>Am\u00e9liore significativement la qualit\u00e9 des r\u00e9ponses au prix d'une latence suppl\u00e9mentaire.<br>Meilleures options : Cohere Rerank, Jina Reranker, ColBERT.</p><span class=\"slide-status status-evolving\">evolving</span>", "<div class=\"slide-node-layer\">\u00c9TAPES DU PIPELINE</div><h2>\ud83d\udfe2 Ingestion</h2><p class=\"node-desc\">Chargement et pr\u00e9paration des documents avant qu'ils puissent \u00eatre recherch\u00e9s.<br>\u00c9tapes : charger les fichiers bruts (PDF, HTML, code, BDD\u2026), nettoyer le texte,<br>d\u00e9couper en chunks, g\u00e9n\u00e9rer des embeddings pour chaque chunk, stocker dans une base vectorielle.<br>La qualit\u00e9 de l'ingestion d\u00e9termine la qualit\u00e9 de la r\u00e9cup\u00e9ration.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">\u00c9TAPES DU PIPELINE</div><h2>\ud83d\udfe2 R\u00e9cup\u00e9ration</h2><p class=\"node-desc\">Trouver les chunks les plus pertinents pour une requ\u00eate utilisateur au moment de l'ex\u00e9cution.<br>La requ\u00eate est embedd\u00e9e avec le m\u00eame mod\u00e8le qu'\u00e0 l'ingestion,<br>puis les vecteurs les plus proches sont r\u00e9cup\u00e9r\u00e9s (similarit\u00e9 s\u00e9mantique).<br>Optionnel : reranking \u2014 un second mod\u00e8le re-score les candidats pour plus de pr\u00e9cision.<br>Cette \u00e9tape est le c\u0153ur de RAG ; une mauvaise r\u00e9cup\u00e9ration = de mauvaises r\u00e9ponses.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-node-layer\">\u00c9TAPES DU PIPELINE</div><h2>\ud83d\udfe2 G\u00e9n\u00e9ration</h2><p class=\"node-desc\">Production de la r\u00e9ponse finale en combinant le contexte r\u00e9cup\u00e9r\u00e9 avec la requ\u00eate utilisateur.<br>Les chunks r\u00e9cup\u00e9r\u00e9s sont inject\u00e9s dans le prompt LLM comme contexte.<br>Le LLM g\u00e9n\u00e8re une r\u00e9ponse ancr\u00e9e dans les documents fournis \u2014 pas depuis sa m\u00e9moire.<br>Choix de conception cl\u00e9 : structurer le prompt pour \u00e9viter les hallucinations<br>et dire \"Je ne sais pas\" quand le contexte est insuffisant.</p><span class=\"slide-status status-stable\">stable</span>", "<div class=\"slide-type-title\"><div class=\"slide-title-content\"><h2>R\u00e9capitulatif</h2><p class=\"stat\">11 concepts</p><p class=\"stat\">3 couches</p><p class=\"generated-from\">RAG \u2014 G\u00e9n\u00e9ration Augment\u00e9e par R\u00e9cup\u00e9ration</p></div></div>"] };
let lang = 'en', cur = 0;
function slides() { return ALL_SLIDES[lang]; }
function render() {
  document.getElementById('slide-content').innerHTML = slides()[cur];
  document.getElementById('counter').textContent = (cur+1) + ' / ' + slides().length;
  document.getElementById('prev').disabled = cur === 0;
  document.getElementById('next').disabled = cur === slides().length - 1;
  document.getElementById('progress').style.width = ((cur+1)/slides().length*100) + '%';
}
function go(d) { cur = Math.max(0, Math.min(slides().length-1, cur+d)); render(); }
function setLang(l) {
  lang = l; cur = 0;
  document.querySelectorAll('#lang-toggle .lang-btn').forEach(b => b.classList.toggle('active', b.textContent === l.toUpperCase()));
  render();
}
document.getElementById('prev').onclick = () => go(-1);
document.getElementById('next').onclick = () => go(1);
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') go(1);
  if (e.key==='ArrowLeft'||e.key==='ArrowUp') go(-1);
});
render();
</script>
